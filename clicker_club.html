<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>POOPATROPAS &amp; THE CLICKER CLUB — Pixel Forge Games</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#05030f;color:#fff;font-family:'Courier New',monospace;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;}
canvas{display:block;cursor:default;}
#ui{width:700px;display:flex;gap:10px;padding:4px 0;font-size:10px;color:#444;justify-content:space-between;align-items:center;}
#ui b{color:#bbb;} a{color:#cc44ff;text-decoration:none;font-size:9px;}a:hover{color:#fff;}
</style>
</head>
<body>
<div id="ui">
  <span>🏫 <b id="h-day">DAY 1</b></span>
  <span>⭐ REP <b id="h-rep">0</b></span>
  <span>💰 <b id="h-coins">0</b> coins</span>
  <span>🤝 Members: <b id="h-members">1</b></span>
  <span style="color:#333;font-size:9px;">Click chars to interact · manage the club!</span>
  <a href="index.html">← Back</a>
</div>
<canvas id="c" width="700" height="480"></canvas>
<script>
const C=document.getElementById('c'),ctx=C.getContext('2d');
const W=700,H=480;
let tick=0,state='intro'; // intro|school|club|event
let day=1,rep=0,coins=0,energy=100;
let tick60=0; // counts seconds
let introPg=0,introTimer=0;
let fxMsgs=[],particles=[];
let hiRep=parseInt(localStorage.getItem('cc_hirep')||0);

// ── CHARACTERS ──
const CHARS_DEF={
  nico: {name:'NICO',  col:'#cc3333',skin:'#ffddaa',beanie:true,  role:'Club Owner',
         x:350,y:300,vx:0,mood:'happy',moodTimer:0,
         dialog:["Yo, welcome to the Clicker Club!","Rep is everything here.","We gotta grow the club!","My beanie gives me powers fr."]},
  blueguy:{name:'BLUE GUY',col:'#2255cc',skin:'#ffcc88',helmet:true,role:'Vice President',
         x:180,y:310,vx:0,mood:'cool',moodTimer:0,
         dialog:["Let's get this club popping.","I handle the strategy.","Nobody messes with us.","Blue power activated."]},
  dru:   {name:'DRU',  col:'#ff6600',skin:'#ffcc88',puffs:true,   role:'Hype Man',
         x:520,y:315,vx:0,mood:'hype',moodTimer:0,
         dialog:["AYYYY let's GO!!","Dru's in the building!","Watch me spin on these haters.","Puffy hair don't care!!"]},
};
let chars={};
Object.keys(CHARS_DEF).forEach(k=>chars[k]={...CHARS_DEF[k]});

// ── CLUB UPGRADES / EVENTS ──
const UPGRADES=[
  {id:'flyers',name:'Print Flyers',desc:'Boost daily rep gain',cost:40,rep:0,bought:false,repBonus:3},
  {id:'snacks',name:'Club Snacks',desc:'Members stay longer',cost:80,rep:20,bought:false,energyBonus:20},
  {id:'sign',name:'Club Sign',desc:'Permanent +5 rep/day',cost:150,rep:50,bought:false,repBonus:5},
  {id:'banner',name:'Big Banner',desc:'School-wide attention',cost:300,rep:100,bought:false,repBonus:10},
  {id:'HQ',name:'Club HQ Room',desc:'Unlock secret room',cost:600,rep:200,bought:false,repBonus:20},
  {id:'legend',name:'LEGEND STATUS',desc:'Everyone knows the club',cost:1500,rep:500,bought:false,repBonus:50},
];

const EVENTS=[
  {id:'bully',name:'Bully at the door!',desc:'Someone\'s blocking the entrance.',choices:['Blue Guy handles it','Nico talks it out','Run away'],outcomes:[{rep:15,coins:0,txt:'Blue Guy PUNCHES the problem away! 💪'},{rep:8,coins:5,txt:'Nico talks sense. Respect++'},{rep:-5,coins:0,txt:'Cowards run... shameful.'}]},
  {id:'teacher',name:'Teacher inspection!',desc:'Mr. Patterson is checking the club.',choices:['Show off the sign','Offer snacks','Pretend to study'],outcomes:[{rep:12,coins:0,txt:'He loves the sign. Approved! ✅'},{rep:6,coins:-10,txt:'He takes the snacks. Rude.'},{rep:20,coins:0,txt:'He\'s impressed by dedication!'}]},
  {id:'rival',name:'Rival club forming!',desc:'The Debate Club wants your members.',choices:['Challenge them','Recruit faster','Ignore them'],outcomes:[{rep:20,coins:-20,txt:'You WIN the challenge! Club grows!'},{rep:8,coins:-30,txt:'Spent all coins on recruitment...'},{rep:-10,coins:0,txt:'Lost 2 members to debate club.'}]},
  {id:'lunch',name:'Lunch fundraiser!',desc:'Sell cookies to raise coins.',choices:['Sell for 5 coins','Sell for 10 coins','Give them free'],outcomes:[{rep:5,coins:30,txt:'Good profit! 🍪 +30 coins'},{rep:-3,coins:50,txt:'+50 coins but people grumbled.'},{rep:25,coins:-10,txt:'Everyone loves you! Rep skyrockets!'}]},
  {id:'dru_hype',name:'Dru starts a hype moment!',desc:'Dru is doing something... loud.',choices:['Let him cook','Stop him','Join in'],outcomes:[{rep:18,coins:0,txt:'DRU GOES OFF!! Everyone cheers!'},{rep:-5,coins:0,txt:'Party pooper. Dru is sad.'},{rep:30,coins:0,txt:'THE WHOLE SCHOOL IS WATCHING! 🔥'}]},
];

let activeEvent=null,eventCd=0;
let memberList=['Nico','Blue Guy','Dru'];
const RECRUITABLE=['Sam','Kai','Zoe','Max','Lily','Theo','Mia','Jake','Emma','Tyler'];
let recruits=[...RECRUITABLE];
let repPerDay=2,energyRegen=1;

// ── INTRO PAGES ──
const INTRO_PAGES=[
  {draw:intro0},{draw:intro1},{draw:intro2},{draw:intro3},
];

function intro0(t){
  // Establishing shot - school exterior
  ctx.fillStyle='#1a1a2a';ctx.fillRect(0,0,W,H);
  // Sky
  const sg=ctx.createLinearGradient(0,0,0,H*.6);
  sg.addColorStop(0,'#4466cc');sg.addColorStop(1,'#88aaff');
  ctx.fillStyle=sg;ctx.fillRect(0,0,W,H*.65);
  // Ground
  ctx.fillStyle='#3a7020';ctx.fillRect(0,H*.65,W,H*.35);
  ctx.fillStyle='#558830';ctx.fillRect(0,H*.65,W,12);
  // School building
  ctx.fillStyle='#cc8844';ctx.fillRect(120,60,460,340);
  ctx.fillStyle='#bb7733';
  for(let i=0;i<5;i++) ctx.fillRect(140+i*88,80,70,100); // windows
  ctx.fillStyle='#88aaff';
  for(let i=0;i<5;i++){ctx.fillRect(148+i*88,88,54,84);ctx.fillStyle='rgba(255,255,255,.15)';ctx.fillRect(150+i*88,90,20,30);ctx.fillStyle='#88aaff';}
  // Entrance
  ctx.fillStyle='#443322';ctx.fillRect(280,240,140,160);
  ctx.fillStyle='#6655aa';ctx.fillRect(290,250,120,140);
  // Sign
  ctx.fillStyle='#fff';ctx.fillRect(240,30,220,40);
  ctx.fillStyle='#4422aa';ctx.font='bold 14px monospace';ctx.textAlign='center';
  ctx.fillText('PIXEL PEAK MIDDLE SCHOOL',W/2,57);
  // Text overlay
  ctx.fillStyle='rgba(0,0,0,.5)';ctx.fillRect(0,H-90,W,90);
  ctx.fillStyle='#fff';ctx.font='11px monospace';ctx.textAlign='left';
  typeText2('It started like any other Tuesday at Pixel Peak Middle School...',20,H-60,t,11);
  typeText2('Nobody expected what Nico had planned.',20,H-36,Math.max(0,t-80),11);
  ctx.fillStyle='#ffd700';ctx.font='9px monospace';ctx.textAlign='right';
  if(t>140)ctx.fillText('[Click to continue]',W-20,H-14);
}

function intro1(t){
  ctx.fillStyle='#0a0518';ctx.fillRect(0,0,W,H);
  // Hallway
  ctx.fillStyle='#ccaa88';ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#bb9977';for(let i=0;i<8;i++)ctx.fillRect(i*88,0,3,H);
  ctx.fillStyle='#886644';ctx.fillRect(0,H*.6,W,H*.4);
  // Lockers
  for(let i=0;i<10;i++){ctx.fillStyle='#4488cc';ctx.fillRect(i*72,0,65,H*.55);ctx.fillStyle='#2266aa';ctx.fillRect(i*72,H*.55-20,65,20);}
  // Nico
  drawCharSmall('nico',260,H*.6-80,1.2,t);
  // Speech bubble
  if(t>40){
    ctx.fillStyle='#fff';ctx.beginPath();ctx.roundRect(300,80,280,70,10);ctx.fill();
    ctx.fillStyle='#222';ctx.font='10px monospace';ctx.textAlign='left';
    typeText2('NICO: Alright. Today I start the Clicker Club.',308,104,Math.max(0,t-40),10);
    typeText2('A place for everyone who clicks different.',308,122,Math.max(0,t-100),10);
  }
  ctx.fillStyle='rgba(0,0,0,.45)';ctx.fillRect(0,H-60,W,60);
  ctx.fillStyle='#fff';ctx.font='10px monospace';ctx.textAlign='left';
  typeText2('Nico\'s been planning this for weeks. The beanie was just the beginning.',20,H-35,t,10);
  ctx.fillStyle='#ffd700';ctx.font='9px monospace';ctx.textAlign='right';
  if(t>160)ctx.fillText('[Click to continue]',W-20,H-14);
}

function intro2(t){
  ctx.fillStyle='#0a0815';ctx.fillRect(0,0,W,H);
  // Cafeteria setting
  ctx.fillStyle='#887755';ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#776644';for(let i=0;i<4;i++)ctx.fillRect(40+i*160,100,140,200); // tables
  ctx.fillStyle='#aa9966';ctx.fillRect(0,H-80,W,80);
  // Blue Guy appears
  const slide=Math.max(0,1-t/30)*(-120);
  ctx.save();ctx.translate(slide,0);
  drawCharSmall('blueguy',160,H*.55-80,1.2,t);
  ctx.restore();
  // Dru jumps in
  const drujump=t>60?Math.max(0,1-(t-60)/20)*(-80):0;
  ctx.save();ctx.translate(0,drujump);
  drawCharSmall('dru',480,H*.55-80,1.2,t);
  ctx.restore();

  if(t>50){
    ctx.fillStyle='#fff';ctx.beginPath();ctx.roundRect(50,60,250,55,8);ctx.fill();
    ctx.strokeStyle='#2255cc';ctx.lineWidth=2;ctx.stroke();
    ctx.fillStyle='#2255cc';ctx.font='bold 9px monospace';ctx.textAlign='left';
    typeText2('BLUE GUY: Yo Nico. I\'m in.',58,84,Math.max(0,t-50),10);
    typeText2('On one condition — I\'m VP.',58,100,Math.max(0,t-90),10);
  }
  if(t>110){
    ctx.fillStyle='#fff';ctx.beginPath();ctx.roundRect(400,60,260,55,8);ctx.fill();
    ctx.strokeStyle='#ff6600';ctx.lineWidth=2;ctx.stroke();
    ctx.fillStyle='#ff6600';ctx.font='bold 9px monospace';ctx.textAlign='left';
    typeText2('DRU: AAYYY I HEARD CLUB',408,84,Math.max(0,t-110),10);
    typeText2('I\'M THE HYPE MAN, no debate!!',408,100,Math.max(0,t-140),10);
  }
  ctx.fillStyle='rgba(0,0,0,.5)';ctx.fillRect(0,H-60,W,60);
  ctx.fillStyle='#fff';ctx.font='10px monospace';ctx.textAlign='left';
  typeText2('The crew assembles. The Clicker Club is officially born.',20,H-35,t,10);
  ctx.fillStyle='#ffd700';ctx.font='9px monospace';ctx.textAlign='right';
  if(t>180)ctx.fillText('[Click to continue]',W-20,H-14);
}

function intro3(t){
  ctx.fillStyle='#000010';ctx.fillRect(0,0,W,H);
  // Stars
  for(let i=0;i<50;i++){ctx.globalAlpha=.5+Math.sin(tick*.04+i)*.3;ctx.fillStyle='#fff';ctx.beginPath();ctx.arc((i*137)%W,(i*71)%H,.6+i%2*.4,0,Math.PI*2);ctx.fill();}
  ctx.globalAlpha=1;
  // All 3 together
  const s=1.5;
  const bob=Math.sin(t*.08)*6;
  drawCharSmall('blueguy',160,H*.6-bob,s,t);
  drawCharSmall('nico',350,H*.6-bob*.8,s,t);
  drawCharSmall('dru',540,H*.6-bob*1.2,s,t);

  ctx.shadowColor='#cc44ff';ctx.shadowBlur=30;
  ctx.fillStyle='#cc44ff';ctx.font='bold 26px monospace';ctx.textAlign='center';
  if(t>30)ctx.fillText('THE CLICKER CLUB',W/2,80);
  ctx.shadowColor='#ffd700';ctx.shadowBlur=15;
  ctx.fillStyle='#ffd700';ctx.font='bold 14px monospace';
  if(t>70)ctx.fillText('Rep. Coins. Clout. Let\'s build it.',W/2,114);
  ctx.shadowBlur=0;

  ctx.fillStyle='rgba(0,0,0,.6)';ctx.fillRect(0,H-80,W,80);
  ctx.fillStyle='#ffe600';ctx.font='bold 13px monospace';
  if(t>130)ctx.fillText('Click to start building the club!',W/2,H-44);
  ctx.fillStyle='#555';ctx.font='9px monospace';
  if(t>150)ctx.fillText('Best rep ever: '+hiRep,W/2,H-20);
}

function typeText2(str,x,y,t,spd){
  const n=Math.floor(t/(spd||10));
  ctx.fillText(str.slice(0,n),x,y);
}

function drawCharSmall(id,x,y,sc,t){
  const ch=chars[id]||CHARS_DEF[id];
  ctx.save();ctx.translate(x,y);ctx.scale(sc,sc);
  const bob=Math.sin(t*.1+x*.01)*4;
  const leg=Math.sin(tick*.2)*7;
  ctx.fillStyle='#222';ctx.fillRect(-8+leg,-24,8,24);ctx.fillRect(1-leg,-24,8,24);
  ctx.fillStyle='#111';ctx.fillRect(-10+leg,0,10,6);ctx.fillRect(-1-leg,0,10,6);
  ctx.fillStyle=ch.col+'dd';ctx.fillRect(-11,-55+bob,22,33);
  ctx.fillStyle='rgba(255,255,255,.1)';ctx.fillRect(-11,-55+bob,22,5);
  // Arms
  const arm=Math.sin(tick*.2+Math.PI)*8;
  ctx.fillStyle=ch.col+'dd';ctx.fillRect(-17+arm,-52+bob,8,20);ctx.fillRect(9-arm,-52+bob,8,20);
  // Head
  ctx.fillStyle=ch.skin;ctx.beginPath();ctx.arc(0,-66+bob,11,0,Math.PI*2);ctx.fill();
  // Hat/hair
  if(ch.beanie){
    ctx.fillStyle='#cc3333';ctx.fillRect(-12,-78+bob,24,14);ctx.fillRect(-12,-81+bob,24,5);
    ctx.fillStyle='rgba(255,255,255,.5)';ctx.fillRect(-12,-76+bob,24,2);ctx.fillRect(-12,-71+bob,24,2);
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(0,-84+bob,5,0,Math.PI*2);ctx.fill();
  } else if(ch.helmet){
    ctx.fillStyle='#2255cc';ctx.fillRect(-12,-78+bob,24,14);ctx.fillRect(-8,-82+bob,16,6);
    ctx.fillStyle='rgba(180,220,255,.8)';ctx.fillRect(-10,-76+bob,20,8);
  } else if(ch.puffs){
    ctx.fillStyle='#ff6600';
    [[-8,-74],[-1,-80],[7,-77],[-11,-68],[10,-68],[-3,-72],[5,-73]].forEach(([px,py])=>{
      ctx.beginPath();ctx.arc(px,py+bob,7,0,Math.PI*2);ctx.fill();
    });
  }
  ctx.fillStyle='#000';ctx.beginPath();ctx.arc(4,-64+bob,2.5,0,Math.PI*2);ctx.fill();
  // Mood icon
  const moodIcons={happy:'😊',cool:'😎',hype:'🔥',thinking:'🤔',sad:'😢'};
  ctx.font='12px serif';ctx.textAlign='center';ctx.fillText(moodIcons[ch.mood]||'😊',0,-90+bob);
  ctx.restore();
}

// ── SCHOOL/CLUB MAIN VIEW ──
const ROOM_BG=[
  {name:'Classroom',skyA:'#ccaa88',skyB:'#bb9966'},
  {name:'Hallway',skyA:'#aabb88',skyB:'#99aa66'},
  {name:'Cafeteria',skyA:'#aacc88',skyB:'#88aa66'},
  {name:'Club Room',skyA:'#8866cc',skyB:'#6644aa'},
];

let room=3; // Club Room
let dayProgress=0; // 0-1
let dayTick=0;

function drawRoom(){
  // Background
  const rm=ROOM_BG[room];
  ctx.fillStyle=rm.skyA;ctx.fillRect(0,0,W,H);
  // Floor
  ctx.fillStyle='#886644';ctx.fillRect(0,H*.7,W,H*.3);
  // Tiles
  for(let i=0;i<W/60+1;i++) for(let j=0;j<3;j++){
    ctx.strokeStyle='#775533';ctx.lineWidth=1;
    ctx.strokeRect(i*60,H*.7+j*40,60,40);
  }
  // Wall decorations based on upgrades
  const signBought=UPGRADES.find(u=>u.id==='sign')?.bought;
  const bannerBought=UPGRADES.find(u=>u.id==='banner')?.bought;
  if(bannerBought){
    ctx.fillStyle='#cc44ff';ctx.fillRect(200,20,300,50);
    ctx.fillStyle='#fff';ctx.font='bold 14px monospace';ctx.textAlign='center';
    ctx.fillText('🏠 THE CLICKER CLUB 🏠',W/2,52);
  } else if(signBought){
    ctx.fillStyle='#442266';ctx.fillRect(270,30,160,36);
    ctx.fillStyle='#cc88ff';ctx.font='10px monospace';ctx.textAlign='center';
    ctx.fillText('CLICKER CLUB',W/2,55);
  }
  // Chairs/tables
  for(let i=0;i<3;i++){
    ctx.fillStyle='#553322';ctx.fillRect(80+i*180,H*.62,100,28);
    ctx.fillStyle='#442211';ctx.fillRect(90+i*180,H*.7,14,30);ctx.fillRect(164+i*180,H*.7,14,30);
  }
  // Day progress bar
  ctx.fillStyle='rgba(0,0,0,.4)';ctx.fillRect(0,H-28,W,28);
  ctx.fillStyle='#2a1040';ctx.fillRect(0,H-24,W,20);
  ctx.fillStyle='#cc44ff';ctx.fillRect(0,H-24,W*dayProgress,20);
  ctx.fillStyle='rgba(255,255,255,.6)';ctx.font='bold 9px monospace';ctx.textAlign='center';
  ctx.fillText('DAY '+day+' PROGRESS  —  '+memberList.length+' members  —  REP: '+rep,W/2,H-9);
}

function drawHUD(){
  ctx.fillStyle='rgba(0,0,0,.65)';ctx.fillRect(0,0,W,24);
  ctx.fillStyle='#cc44ff';ctx.font='bold 10px monospace';ctx.textAlign='left';
  ctx.fillText('🏠 CLICKER CLUB   ⭐ REP: '+rep+'   💰 '+coins+' coins   ⚡ Energy: '+Math.round(energy)+'/'+getMaxEnergy(),8,15);
  ctx.fillStyle='#443355';ctx.font='9px monospace';ctx.textAlign='right';
  ctx.fillText('Best rep: '+hiRep,W-8,15);
}

function getMaxEnergy(){return 100+(UPGRADES.find(u=>u.id==='snacks')?.bought?20:0);}

// Upgrade/action panels
const BTN_ACTIONS=[
  {label:'TALK TO NICO',x:20,y:35,w:130,h:26,fn:()=>doDialog('nico')},
  {label:'HYPE WITH DRU',x:160,y:35,w:130,h:26,fn:()=>doDialog('dru')},
  {label:'STRATEGIZE w/ BG',x:300,y:35,w:155,h:26,fn:()=>doDialog('blueguy')},
  {label:'RECRUIT MEMBER',x:465,y:35,w:120,h:26,fn:()=>recruitMember()},
  {label:'END DAY',x:595,y:35,w:90,h:26,fn:()=>endDay()},
];
let hovBtn=-1;

// Upgrade panel state
let showUpgrades=false;

function drawActions(){
  BTN_ACTIONS.forEach((b,i)=>{
    const hot=i===hovBtn;
    ctx.fillStyle=hot?'#2a1040':'#160824';
    ctx.fillRect(b.x,b.y,b.w,b.h);
    ctx.strokeStyle=hot?'#cc44ff':'#331155';ctx.lineWidth=1;ctx.strokeRect(b.x,b.y,b.w,b.h);
    ctx.fillStyle=hot?'#cc88ff':'#774499';ctx.font='7px monospace';ctx.textAlign='center';
    ctx.fillText(b.label,b.x+b.w/2,b.y+16);
  });
  // Upgrade toggle button
  const ub={x:W-80,y:62,w:72,h:22};
  ctx.fillStyle=showUpgrades?'#2a1040':'#160824';ctx.fillRect(ub.x,ub.y,ub.w,ub.h);
  ctx.strokeStyle='#cc44ff';ctx.lineWidth=1;ctx.strokeRect(ub.x,ub.y,ub.w,ub.h);
  ctx.fillStyle='#cc44ff';ctx.font='7px monospace';ctx.textAlign='center';
  ctx.fillText(showUpgrades?'▲ UPGRADES':'▼ UPGRADES',ub.x+ub.w/2,ub.y+14);
  // Upgrade panel
  if(showUpgrades){
    ctx.fillStyle='rgba(10,5,20,.95)';ctx.fillRect(W-310,84,302,220);
    ctx.strokeStyle='#441166';ctx.lineWidth=1;ctx.strokeRect(W-310,84,302,220);
    ctx.fillStyle='#cc44ff';ctx.font='bold 9px monospace';ctx.textAlign='left';
    ctx.fillText('UPGRADES',W-304,100);
    UPGRADES.forEach((u,i)=>{
      const uy=108+i*34;
      const can=coins>=u.cost&&rep>=u.rep&&!u.bought;
      ctx.fillStyle=u.bought?'#110a1a':can?'#1a0a2a':'#080410';
      ctx.fillRect(W-308,uy,296,30);
      ctx.strokeStyle=u.bought?'#44ff88':can?'#cc44ff':'#221133';ctx.lineWidth=1;ctx.strokeRect(W-308,uy,296,30);
      ctx.fillStyle=u.bought?'#44ff88':can?'#cc88ff':'#443';ctx.font='bold 8px monospace';ctx.textAlign='left';
      ctx.fillText((u.bought?'✅ ':'')+(can?'★ ':'')+u.name,W-304,uy+12);
      ctx.fillStyle='#445';ctx.font='7px monospace';ctx.fillText(u.desc,W-304,uy+24);
      ctx.fillStyle=can?'#ffd700':'#443';ctx.font='7px monospace';ctx.textAlign='right';
      ctx.fillText(u.bought?'OWNED':'💰'+u.cost+(u.rep>rep?' (need REP '+u.rep+')':''),W-14,uy+24);
      u._y=uy;
    });
  }
}

function drawChars(){
  Object.entries(chars).forEach(([id,ch])=>{
    ch.x+=ch.vx;ch.vx*=.85;if(Math.abs(ch.vx)<.1)ch.vx=0;
    ch.x=Math.max(50,Math.min(W-50,ch.x));
    drawCharSmall(id,ch.x,H*.7-10,1.3,tick);
    ctx.fillStyle='rgba(0,0,0,.5)';ctx.fillRect(ch.x-40,H*.7+38,80,14);
    ctx.fillStyle=ch.col;ctx.font='bold 7px monospace';ctx.textAlign='center';
    ctx.fillText(ch.role,ch.x,H*.7+48);
  });
  // Extra members
  memberList.slice(3).forEach((m,i)=>{
    const mx=100+i*80,my=H*.7-10;
    ctx.fillStyle='#888';ctx.beginPath();ctx.arc(mx,my-50,14,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#aaa';ctx.beginPath();ctx.arc(mx,my-30,18,Math.PI,0);ctx.fill();
    ctx.fillStyle='rgba(0,0,0,.4)';ctx.fillRect(mx-28,my+10,56,12);
    ctx.fillStyle='#888';ctx.font='6px monospace';ctx.textAlign='center';ctx.fillText(m,mx,my+20);
  });
}

function drawFX(){
  fxMsgs=fxMsgs.filter(f=>{
    ctx.globalAlpha=Math.min(1,f.life/20);
    ctx.fillStyle=f.col;ctx.font=(f.big?'bold 18px':'bold 11px')+' monospace';ctx.textAlign='center';
    ctx.shadowColor=f.col;ctx.shadowBlur=f.big?14:6;
    ctx.fillText(f.txt,f.x,f.y);
    ctx.shadowBlur=0;f.y-=.8;f.life--;return f.life>0;
  });ctx.globalAlpha=1;
  particles=particles.filter(p=>{
    ctx.globalAlpha=p.life/20;ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(p.x,p.y,p.sz,0,Math.PI*2);ctx.fill();
    p.x+=p.vx;p.y+=p.vy;p.vy+=.1;p.life--;return p.life>0;
  });ctx.globalAlpha=1;
}

// ── ACTIONS ──
let dialogText='',dialogTimer=0,dialogChar='';
function doDialog(id){
  const ch=chars[id];
  const d=ch.dialog[Math.floor(Math.random()*ch.dialog.length)];
  dialogText=ch.name+': "'+d+'"';dialogTimer=160;dialogChar=id;
  energy=Math.max(0,energy-5);
  ch.vx=(Math.random()-.5)*6;
  ch.mood=['happy','cool','hype','thinking'][Math.floor(Math.random()*4)];
  rep+=1;fxMsgs.push({txt:'+1 REP',x:ch.x,y:H*.6,col:'#cc44ff',life:40});
  updHUD2();
}

function recruitMember(){
  if(energy<20){fxMsgs.push({txt:'Too tired! End day first.',x:W/2,y:H/2,col:'#ff4444',life:60});return;}
  if(recruits.length===0){fxMsgs.push({txt:'Club is full! Max members!',x:W/2,y:H/2,col:'#ffd700',life:60});return;}
  if(coins<30&&rep<10){fxMsgs.push({txt:'Need 30 coins OR 10 rep to recruit!',x:W/2,y:H/2,col:'#ff8800',life:60});return;}
  const cost=coins>=30?30:0;
  const rr=recruits.splice(Math.floor(Math.random()*recruits.length),1)[0];
  coins-=cost;memberList.push(rr);energy-=20;
  rep+=3;
  fxMsgs.push({txt:rr+' joined the Club! +3 REP',x:W/2,y:H*.5,col:'#44ff88',life:80,big:true});
  for(let i=0;i<12;i++) particles.push({x:W/2+(Math.random()-.5)*100,y:H*.5,vx:(Math.random()-.5)*8,vy:-Math.random()*6,col:['#cc44ff','#ffd700','#44ff88'][i%3],life:30,sz:4});
  updHUD2();
}

function endDay(){
  day++;dayProgress=0;energy=Math.min(getMaxEnergy(),energy+40+energyRegen*10);
  const dailyRep=repPerDay+UPGRADES.filter(u=>u.bought).reduce((a,u)=>a+(u.repBonus||0),0);
  const dailyCoins=Math.floor(memberList.length*2+rep*.05);
  rep+=dailyRep;coins+=dailyCoins;
  if(rep>hiRep){hiRep=rep;localStorage.setItem('cc_hirep',hiRep);}
  fxMsgs.push({txt:'Day '+day+'! +'+dailyRep+' rep, +'+dailyCoins+' coins',x:W/2,y:H*.4,col:'#ffd700',life:100,big:true});
  // Random event
  if(Math.random()<.6&&!activeEvent){
    activeEvent=EVENTS[Math.floor(Math.random()*EVENTS.length)];
  }
  chars.nico.mood='happy';chars.blueguy.mood='cool';chars.dru.mood='hype';
  updHUD2();
}

function updHUD2(){
  document.getElementById('h-day').textContent='DAY '+day;
  document.getElementById('h-rep').textContent=rep;
  document.getElementById('h-coins').textContent=coins;
  document.getElementById('h-members').textContent=memberList.length;
}

// ── DRAW EVENT ──
function drawEvent(){
  if(!activeEvent)return;
  ctx.fillStyle='rgba(0,0,0,.8)';ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#1a0a2a';ctx.fillRect(W*.1,H*.15,W*.8,H*.7);
  ctx.strokeStyle='#cc44ff';ctx.lineWidth=2;ctx.strokeRect(W*.1,H*.15,W*.8,H*.7);
  ctx.fillStyle='#ffd700';ctx.font='bold 14px monospace';ctx.textAlign='center';
  ctx.fillText('⚡ '+activeEvent.name,W/2,H*.22);
  ctx.fillStyle='#aaa';ctx.font='10px monospace';
  ctx.fillText(activeEvent.desc,W/2,H*.3);
  activeEvent.choices.forEach((c,i)=>{
    const bx=W*.15,by=H*.37+i*62,bw=W*.7,bh=50;
    ctx.fillStyle='#110820';ctx.fillRect(bx,by,bw,bh);
    ctx.strokeStyle='#773399';ctx.lineWidth=1;ctx.strokeRect(bx,by,bw,bh);
    ctx.fillStyle='#cc88ff';ctx.font='bold 10px monospace';ctx.textAlign='center';
    ctx.fillText((i+1)+'. '+c,W/2,by+22);
    ctx.fillStyle='#554';ctx.font='8px monospace';
    const o=activeEvent.outcomes[i];
    ctx.fillText((o.rep>0?'REP +'+o.rep:o.rep<0?'REP '+o.rep:'')+'  '+(o.coins!==0?'Coins '+o.coins:''),W/2,by+40);
    // Store for click detection
    activeEvent.choices[i]._bx=bx;activeEvent.choices[i]._by=by;activeEvent.choices[i]._bw=bw;activeEvent.choices[i]._bh=bh;
  });
  ctx.fillStyle='#443355';ctx.font='9px monospace';
  ctx.fillText('[Click a choice]',W/2,H*.87);
}

// ── DIALOG BUBBLE ──
function drawDialog(){
  if(dialogTimer<=0)return;
  dialogTimer--;
  const ch=chars[dialogChar];
  if(!ch)return;
  const bx=ch.x-130,by=H*.7-140,bw=260,bh=60;
  ctx.fillStyle='rgba(10,5,20,.9)';ctx.fillRect(bx,by,bw,bh);
  ctx.strokeStyle=ch.col;ctx.lineWidth=1.5;ctx.strokeRect(bx,by,bw,bh);
  // Triangle pointer
  ctx.fillStyle=ch.col+'44';ctx.beginPath();ctx.moveTo(ch.x-8,by+bh);ctx.lineTo(ch.x+8,by+bh);ctx.lineTo(ch.x,by+bh+10);ctx.fill();
  ctx.fillStyle='#ddd';ctx.font='8px monospace';ctx.textAlign='left';
  // Word wrap simple
  const words=dialogText.split(' ');let line='',lines=[];
  words.forEach(w=>{if((line+w).length>36){lines.push(line);line=w+' ';}else line+=w+' ';});
  lines.push(line);
  lines.slice(0,3).forEach((l,i)=>ctx.fillText(l,bx+6,by+16+i*14));
}

// ── INPUT ──
C.addEventListener('click',e=>{
  const r=C.getBoundingClientRect();
  const mx=e.clientX-r.left,my=e.clientY-r.top;

  if(state==='intro'){introPg++;introTimer=0;
    if(introPg>=INTRO_PAGES.length)state='school';return;}

  if(activeEvent){
    activeEvent.choices.forEach((c,i)=>{
      if(mx>c._bx&&mx<c._bx+c._bw&&my>c._by&&my<c._by+c._bh){
        const o=activeEvent.outcomes[i];
        rep=Math.max(0,rep+o.rep);coins=Math.max(0,coins+o.coins);
        if(rep>hiRep){hiRep=rep;localStorage.setItem('cc_hirep',hiRep);}
        fxMsgs.push({txt:o.txt,x:W/2,y:H*.4,col:o.rep>0?'#44ff88':'#ff4444',life:100,big:true});
        activeEvent=null;updHUD2();
      }
    });
    return;
  }

  BTN_ACTIONS.forEach(b=>{
    if(mx>b.x&&mx<b.x+b.w&&my>b.y&&my<b.y+b.h)b.fn();
  });
  // Upgrade toggle
  if(mx>W-80&&mx<W-8&&my>62&&my<84)showUpgrades=!showUpgrades;
  // Buy upgrade
  if(showUpgrades) UPGRADES.forEach(u=>{
    if(u._y&&mx>W-308&&mx<W-12&&my>u._y&&my<u._y+30&&!u.bought&&coins>=u.cost&&rep>=u.rep){
      coins-=u.cost;u.bought=true;
      fxMsgs.push({txt:'✅ '+u.name+' bought!',x:W/2,y:H*.4,col:'#ffd700',life:80,big:true});
      updHUD2();
    }
  });
});
C.addEventListener('mousemove',e=>{
  const r=C.getBoundingClientRect();
  const mx=e.clientX-r.left,my=e.clientY-r.top;
  hovBtn=-1;
  BTN_ACTIONS.forEach((b,i)=>{if(mx>b.x&&mx<b.x+b.w&&my>b.y&&my<b.y+b.h)hovBtn=i;});
});

// ── UPDATE ──
function update(){
  tick++;dayTick++;
  dayProgress=Math.min(1,(dayTick%(60*60*3))/(60*60*3));
  // Passive rep tick
  if(tick%60===0){
    rep+=Math.floor(memberList.length*.1);
    energy=Math.min(getMaxEnergy(),energy+energyRegen);
    if(rep>hiRep){hiRep=rep;localStorage.setItem('cc_hirep',hiRep);}
  }
  // Random char movement
  if(tick%90===0){const ids=Object.keys(chars);const id=ids[Math.floor(Math.random()*ids.length)];chars[id].vx=(Math.random()-.5)*8;}
}

// ── MAIN LOOP ──
function loop(){
  update();
  if(state==='intro'){
    const pg=INTRO_PAGES[introPg];if(pg)pg.draw(introTimer);
    introTimer++;
  } else if(state==='school'){
    drawRoom();drawChars();drawActions();drawDialog();drawFX();drawHUD();
    if(activeEvent)drawEvent();
  }
  requestAnimationFrame(loop);
}
updHUD2();
loop();
</script>
</body>
