<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Drift Zone</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0a0a0a;overflow:hidden;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Segoe UI',sans-serif;}
canvas{display:block;}
#hud{width:640px;height:40px;background:#0d0d0d;border:2px solid #222;border-bottom:none;display:flex;align-items:center;justify-content:space-between;padding:0 16px;}
#hud span{font-size:11px;letter-spacing:2px;color:#555;}
#hud b{color:#ffcc00;}
#msg{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0a0a0aee;z-index:20;}
#msg h1{font-size:52px;font-weight:900;letter-spacing:4px;color:#ffcc00;margin-bottom:8px;text-align:center;text-shadow:0 0 30px #ffcc0044;}
#msg p{color:#444;font-size:13px;margin-bottom:22px;text-align:center;line-height:2.2;}
.btn{background:transparent;border:2px solid #ffcc00;color:#ffcc00;padding:12px 36px;font-size:14px;letter-spacing:3px;cursor:pointer;transition:all .2s;}
.btn:hover{background:#ffcc0022;}
</style>
</head>
<body>
<div id="hud">
  <span>LAP <b id="lapV">1/3</b></span>
  <span>DRIFT <b id="driftV">0</b> pts</span>
  <span>SCORE <b id="scoreV">0</b></span>
  <span>BEST <b id="bestV">0</b></span>
  <span>SPEED <b id="spdV">0</b></span>
</div>
<canvas id="cv" width="640" height="480"></canvas>
<div id="msg">
  <h1>DRIFT ZONE</h1>
  <p>Arrows/WASD to steer. Hold to drift!<br>Score points by drifting through corners.<br>3 laps — biggest drift score wins!</p>
  <button class="btn" onclick="startGame()">▶ RACE</button>
</div>
<script>
var cv=document.getElementById('cv'),ctx=cv.getContext('2d');
var W=640,H=480;
var keys={};
var gameState='menu';
var car,lap,totalScore,driftScore,driftActive,frame,bestScore,lapResetFrame;
var skidMarks=[],parts=[];

// Track defined as centerline waypoints
var TRACK=[
  {x:320,y:80},{x:520,y:80},{x:580,y:140},{x:580,y:200},{x:520,y:220},
  {x:460,y:200},{x:420,y:240},{x:440,y:300},{x:500,y:340},{x:540,y:400},
  {x:500,y:440},{x:380,y:440},{x:320,y:400},{x:260,y:440},{x:140,y:440},
  {x:100,y:400},{x:140,y:340},{x:200,y:300},{x:220,y:240},{x:180,y:200},
  {x:120,y:220},{x:60,y:200},{x:60,y:140},{x:120,y:80},{x:220,y:60},
];
var TW=54; // track half-width
var checkpoints=[];

function buildCheckpoints(){
  checkpoints=[];
  for(var i=0;i<TRACK.length;i++){
    var a=TRACK[i],b=TRACK[(i+1)%TRACK.length];
    checkpoints.push({x:(a.x+b.x)/2,y:(a.y+b.y)/2,passed:false});
  }
}

function startGame(){
  document.getElementById('msg').style.display='none';
  bestScore=bestScore||0;
  lap=1;totalScore=0;driftScore=0;driftActive=false;frame=0;skidMarks=[];parts=[];lapResetFrame=0;
  buildCheckpoints();
  var start=TRACK[0];
  car={x:start.x,y:start.y+30,angle:-Math.PI/2,spd:0,steer:0,
    vx:0,vy:0,driftT:0,driftAngle:0,prevSeg:0,lapProgress:0};
  gameState='play';
  updateHUD();
}

function ptLineDist(px,py,ax,ay,bx,by){
  var dx=bx-ax,dy=by-ay,len2=dx*dx+dy*dy;
  if(len2===0)return Math.hypot(px-ax,py-ay);
  var t=Math.max(0,Math.min(1,((px-ax)*dx+(py-ay)*dy)/len2));
  return Math.hypot(px-(ax+t*dx),py-(ay+t*dy));
}

function onTrack(x,y){
  for(var i=0;i<TRACK.length;i++){
    var a=TRACK[i],b=TRACK[(i+1)%TRACK.length];
    if(ptLineDist(x,y,a.x,a.y,b.x,b.y)<TW) return true;
  }
  return false;
}

function nearestTrackDist(x,y){
  var min=Infinity;
  for(var i=0;i<TRACK.length;i++){
    var a=TRACK[i],b=TRACK[(i+1)%TRACK.length];
    var d=ptLineDist(x,y,a.x,a.y,b.x,b.y);
    if(d<min)min=d;
  }
  return min;
}

function update(){
  if(gameState!=='play') return;
  frame++;
  var LEFT=keys['ArrowLeft']||keys['a'];
  var RIGHT=keys['ArrowRight']||keys['d'];
  var UP=keys['ArrowUp']||keys['w'];
  var DOWN=keys['ArrowDown']||keys['s'];

  // Arcade drift physics
  var grip=0.85,driftGrip=0.6;
  var accel=0.22,brake=0.15,maxSpd=6.5;
  var steerSpd=0.065;

  if(UP) car.spd=Math.min(maxSpd,car.spd+accel);
  else if(DOWN) car.spd=Math.max(-2,car.spd-brake);
  else car.spd*=0.97;

  if(LEFT) car.angle-=steerSpd*(0.4+Math.abs(car.spd)/maxSpd*.6)*(car.spd<0?-1:1);
  if(RIGHT) car.angle+=steerSpd*(0.4+Math.abs(car.spd)/maxSpd*.6)*(car.spd<0?-1:1);

  // Velocity
  var targetVx=Math.cos(car.angle)*car.spd;
  var targetVy=Math.sin(car.angle)*car.spd;
  var gCoeff=(LEFT||RIGHT)?driftGrip:grip;
  car.vx=car.vx*(1-gCoeff)+targetVx*gCoeff;
  car.vy=car.vy*(1-gCoeff)+targetVy*gCoeff;

  // Drift detection
  var vel=Math.hypot(car.vx,car.vy);
  var velAngle=Math.atan2(car.vy,car.vx);
  var angleDiff=Math.abs(Math.atan2(Math.sin(velAngle-car.angle),Math.cos(velAngle-car.angle)));
  var isDrifting=angleDiff>0.25&&vel>2;

  if(isDrifting){
    car.driftT++;
    driftActive=true;
    var dpts=Math.floor(angleDiff*vel*1.5);
    driftScore+=dpts;
    // skid marks
    if(frame%3===0){
      skidMarks.push({x:car.x-Math.cos(car.angle)*8,y:car.y-Math.sin(car.angle)*8,
        x2:car.x-Math.cos(car.angle)*8+Math.sin(car.angle)*5,
        y2:car.y-Math.sin(car.angle)*8-Math.cos(car.angle)*5,a:.5});
      skidMarks.push({x:car.x-Math.cos(car.angle)*8,y:car.y-Math.sin(car.angle)*8,
        x2:car.x-Math.cos(car.angle)*8-Math.sin(car.angle)*5,
        y2:car.y-Math.sin(car.angle)*8+Math.cos(car.angle)*5,a:.5});
    }
  } else if(driftActive){
    // score the drift
    if(driftScore>0){totalScore+=driftScore;
      parts.push({txt:'+'+driftScore,x:car.x,y:car.y-20,life:60,vy:-1});}
    driftScore=0;driftActive=false;car.driftT=0;
  }

  car.x+=car.vx;car.y+=car.vy;

  // Off track penalty
  if(!onTrack(car.x,car.y)){
    car.vx*=0.85;car.vy*=0.85;car.spd*=0.9;
    car.x-=car.vx*.3;car.y-=car.vy*.3;
  }

  // Clamp
  car.x=Math.max(0,Math.min(W,car.x));
  car.y=Math.max(0,Math.min(H,car.y));

  // Checkpoint / lap
  checkpoints.forEach(function(cp,i){
    if(!cp.passed&&Math.hypot(car.x-cp.x,car.y-cp.y)<40){
      cp.passed=true;
    }
  });
  // Lap completion: after passing all checkpoints, cross cp[0] again
  var allOthersPassed=checkpoints.slice(1).every(function(c){return c.passed;});
  if(allOthersPassed&&checkpoints[0].passed&&frame>lapResetFrame+60){
    lap++;
    lapResetFrame=frame;
    if(lap>3){finishRace();return;}
    checkpoints.forEach(function(c){c.passed=false;});
  }

  // age skidmarks
  for(var i=skidMarks.length-1;i>=0;i--){skidMarks[i].a-=.002;if(skidMarks[i].a<=0)skidMarks.splice(i,1);}
  for(var i2=parts.length-1;i2>=0;i2--){var p=parts[i2];p.y+=p.vy;p.life--;if(p.life<=0)parts.splice(i2,1);}

  updateHUD();
}

function finishRace(){
  if(driftActive){totalScore+=driftScore;driftScore=0;driftActive=false;}
  if(totalScore>bestScore)bestScore=totalScore;
  gameState='over';
  document.getElementById('msg').style.display='flex';
  document.getElementById('msg').innerHTML=
    '<h1 style="color:#ffcc00">RACE OVER!</h1>'+
    '<p style="color:#444">Drift Score: '+totalScore+'<br>Best: '+bestScore+'</p>'+
    '<button class="btn" onclick="startGame()">RACE AGAIN</button>';
}

function updateHUD(){
  document.getElementById('lapV').textContent=Math.min(3,lap)+'/3';
  document.getElementById('driftV').textContent=driftScore;
  document.getElementById('scoreV').textContent=totalScore;
  document.getElementById('bestV').textContent=bestScore||0;
  document.getElementById('spdV').textContent=Math.round(Math.hypot(car.vx,car.vy)*20);
}

function drawTrack(){
  // shadow
  ctx.strokeStyle='#1a1a1a';ctx.lineWidth=TW*2+16;ctx.lineCap='round';ctx.lineJoin='round';
  ctx.beginPath();TRACK.forEach(function(p,i){i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y);});ctx.closePath();ctx.stroke();
  // asphalt
  ctx.strokeStyle='#1e1e1e';ctx.lineWidth=TW*2;
  ctx.beginPath();TRACK.forEach(function(p,i){i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y);});ctx.closePath();ctx.stroke();
  // lane lines
  ctx.strokeStyle='#333333';ctx.lineWidth=1;ctx.setLineDash([14,10]);
  ctx.beginPath();TRACK.forEach(function(p,i){i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y);});ctx.closePath();ctx.stroke();
  ctx.setLineDash([]);
  // edge lines
  ctx.strokeStyle='#444';ctx.lineWidth=2;ctx.setLineDash([]);
  // start/finish
  var sf=TRACK[0];
  ctx.strokeStyle='#ffffff33';ctx.lineWidth=TW*2;ctx.lineCap='butt';
  ctx.beginPath();ctx.moveTo(sf.x-4,sf.y-TW);ctx.lineTo(sf.x-4,sf.y+TW);ctx.stroke();
  ctx.strokeStyle='#ffcc0066';ctx.lineWidth=4;
  ctx.beginPath();ctx.moveTo(sf.x,sf.y-TW);ctx.lineTo(sf.x,sf.y+TW);ctx.stroke();
}

function draw(){
  ctx.clearRect(0,0,W,H);
  // bg
  ctx.fillStyle='#111';ctx.fillRect(0,0,W,H);
  // bg grid
  ctx.strokeStyle='#161616';ctx.lineWidth=.5;
  for(var x=0;x<W;x+=40)ctx.strokeRect(x,0,40,H);

  drawTrack();

  // skid marks
  skidMarks.forEach(function(s){
    ctx.globalAlpha=s.a;ctx.strokeStyle='#000';ctx.lineWidth=3;
    ctx.beginPath();ctx.moveTo(s.x,s.y);ctx.lineTo(s.x2,s.y2);ctx.stroke();
  });ctx.globalAlpha=1;

  if(gameState!=='play') return;

  // Car
  ctx.save();ctx.translate(car.x,car.y);ctx.rotate(car.angle);
  // body glow
  ctx.shadowColor='#ffcc00';ctx.shadowBlur=driftActive?18:8;
  ctx.fillStyle=driftActive?'#ffcc00':'#ff4422';
  ctx.fillRect(-14,-8,28,16);
  ctx.fillStyle=driftActive?'#ffee88':'#ff8866';
  ctx.fillRect(-10,-7,20,5);
  // wheels
  ctx.shadowBlur=0;ctx.fillStyle='#333';
  ctx.fillRect(-14,-11,7,5);ctx.fillRect(7,-11,7,5);
  ctx.fillRect(-14,6,7,5);ctx.fillRect(7,6,7,5);
  ctx.restore();

  // drift score popup
  parts.forEach(function(p){
    ctx.globalAlpha=p.life/60;ctx.fillStyle='#ffcc00';
    ctx.font='bold 16px sans-serif';ctx.textAlign='center';ctx.fillText(p.txt,p.x,p.y);
  });ctx.globalAlpha=1;ctx.textAlign='left';

  // drift indicator
  if(driftActive){
    ctx.fillStyle='rgba(255,204,0,0.8)';
    ctx.font='bold 14px sans-serif';ctx.textAlign='center';
    ctx.fillText('DRIFT x'+Math.max(1,Math.round(driftScore/10)),car.x,car.y-30);
    ctx.textAlign='left';
  }
}

document.addEventListener('keydown',function(e){keys[e.key]=true;if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key))e.preventDefault();});
document.addEventListener('keyup',function(e){keys[e.key]=false;});
function loop(){update();draw();requestAnimationFrame(loop);}
loop();
</script>
</body>
</html>
