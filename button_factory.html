<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Button Factory</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0d0520;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;overflow:hidden;font-family:'Nunito',sans-serif;color:#fff;}
#wrap{position:relative;width:720px;background:#0d0520;border:2px solid #3a1a6a;border-radius:6px;overflow:hidden;}
#hud{height:38px;background:#110825;border-bottom:2px solid #2a1050;display:flex;align-items:center;justify-content:space-between;padding:0 14px;font-size:12px;letter-spacing:1px;color:#9966ff;flex-shrink:0;}
#hud b{color:#fff;}
#gc{display:block;}
#btnPanel{height:84px;background:#0d0520;border-top:2px solid #2a1050;display:flex;align-items:center;justify-content:center;gap:6px;padding:4px 8px;flex-wrap:wrap;overflow:hidden;flex-shrink:0;}
.gbtn{padding:6px 11px;border:2px solid;border-radius:7px;font-family:'Fredoka One',cursive;font-size:11px;cursor:pointer;background:#080318;white-space:nowrap;transition:all .12s;}
.gbtn:hover{transform:scale(1.08);filter:brightness(1.3);}
.gbtn.used{opacity:.28;cursor:default;transform:none!important;filter:none!important;}
#fx{position:absolute;top:42px;right:6px;display:flex;flex-direction:column;gap:3px;pointer-events:none;z-index:5;}
.ftag{background:#0d0520ee;border:1px solid #9966ff55;padding:2px 7px;font-size:9px;color:#bb88ff;border-radius:3px;}
#msg{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0d0520ee;z-index:20;border-radius:4px;}
#msg h1{font-family:'Fredoka One',cursive;font-size:46px;margin-bottom:8px;text-align:center;}
#msg p{color:#bb88ff;font-size:13px;margin-bottom:20px;text-align:center;line-height:2;}
.sbtn{background:#5533aa;border:none;color:#fff;padding:12px 36px;font-family:'Fredoka One',cursive;font-size:18px;cursor:pointer;border-radius:10px;transition:all .2s;}
.sbtn:hover{background:#7755cc;transform:scale(1.06);}
</style>
</head>
<body>
<div id="wrap">
  <div id="hud">
    <span>LEVEL <b id="lvlN">-</b></span>
    <span id="fxList">No active effects</span>
    <span>BUTTONS: <b id="btnCount">-</b></span>
  </div>
  <canvas id="gc"></canvas>
  <div id="btnPanel"></div>
  <div id="fx"></div>
  <div id="msg">
    <h1 style="color:#cc88ff">BUTTON<br>FACTORY</h1>
    <p>Buttons do <b style="color:#ffdd44">weird things.</b><br>Reach the <span style="color:#ffdd44">✦ EXIT ✦</span> to escape!<br>WASD / Arrows to move, Space to jump.</p>
    <button class="sbtn" onclick="startGame()">PRESS START</button>
    <a href="index.html" style="display:inline-block;margin-top:8px;color:#6644aa;font-size:10px;letter-spacing:2px;text-decoration:none;font-family:monospace;">← BACK TO ARCADE</a>
  </div>
</div>

<script>
// ---- CANVAS SETUP ----
const C = document.getElementById('gc'), ctx = C.getContext('2d');
const T = 30;          // tile size px
const COLS = 24;       // grid columns
const ROWS = 12;       // grid rows (play area only)
const CW = COLS * T;   // 720
const CH = ROWS * T;   // 360
C.width = CW; C.height = CH;

// ---- BUTTON DEFS ----
const BTNS = [
  {id:'flip',   label:'FLIP CTRL', col:'#ff6644',bc:'#ff2200', fn:()=>{addFx('flip',300);  notif('Controls Flipped! ↔');}},
  {id:'wall',   label:'WALL',      col:'#ff8844',bc:'#cc4400', fn:()=>{spawnWall();         notif('Wall Spawned!');}},
  {id:'freeze', label:'FREEZE',    col:'#44ccff',bc:'#0088cc', fn:()=>{addFx('freeze',110); notif('Time Frozen! ❄');}},
  {id:'warp',   label:'WARP',      col:'#ff44ff',bc:'#cc00cc', fn:()=>{teleport();          notif('Teleported! 💫');}},
  {id:'shrink', label:'SHRINK',    col:'#ffff44',bc:'#aaaa00', fn:()=>{addFx('shrink',240); notif('You Shrunk!');}},
  {id:'bounce', label:'BOING',     col:'#ff9944',bc:'#cc5500', fn:()=>{addFx('bounce',220); notif('Super Jump! ↑');}},
  {id:'dark',   label:'LIGHTS OUT',col:'#8844ff',bc:'#5500cc', fn:()=>{addFx('dark',180);   notif('Lights Out! 🌑');}},
  {id:'mirror', label:'MIRROR',    col:'#44ffff',bc:'#00aaaa', fn:()=>{addFx('mirror',240); notif('Mirror! 👥');}},
  {id:'speed',  label:'SPEED UP',  col:'#ffaa00',bc:'#cc7700', fn:()=>{addFx('speed',200);  notif('Speed Boost! ⚡');}},
  {id:'grav',   label:'ANTI-GRAV', col:'#00ffaa',bc:'#00aa66', fn:()=>{addFx('grav',220);   notif('Gravity Flipped! 🔼');}},
  {id:'fake',   label:'CLONE EXIT',col:'#ff88cc',bc:'#cc0088', fn:()=>{spawnFake();          notif('Fake Exit! 😈');}},
  {id:'swap',   label:'SWAP EXIT', col:'#aaffaa',bc:'#44cc44', fn:()=>{swapExit();           notif('Swapped! 🔀');}},
  {id:'spin',   label:'DIZZY',     col:'#ffaaff',bc:'#cc44cc', fn:()=>{addFx('spin',160);   notif('Getting Dizzy! 💫');}},
  {id:'invis',  label:'VANISH',    col:'#aaaaaa',bc:'#666666', fn:()=>{addFx('invis',160);  notif('You Vanished! 👁');}},
];

// ---- GAME STATE ----
const keys = {};
let state = 'menu';
let level = 1;
let player, exit_, walls, fakeExits, fx, notifs, usedBtns, availBtns, frame, jumpHeld;

// safe defaults so draw() never crashes before startGame()
function resetState() {
  player    = {x:T*1.5, y:T*1.5, w:18, h:18, vx:0, vy:0, onGround:false};
  exit_     = {x:T*(COLS-3), y:T*(ROWS-3), w:T, h:T};
  walls     = [];
  fakeExits = [];
  fx        = {};
  notifs    = [];
  usedBtns  = new Set();
  availBtns = [];
  frame     = 0;
  jumpHeld  = false;
}
resetState();

// ---- START ----
function startGame() {
  document.getElementById('msg').style.display = 'none';
  level = 1;
  initLevel();
}

function initLevel() {
  state = 'play';
  frame = 0; fx = {}; fakeExits = []; notifs = [];
  usedBtns = new Set();
  buildRoom();
  const n = Math.min(14, level + 1);
  const shuffled = [...BTNS].sort(() => Math.random() - .5);
  availBtns = shuffled.slice(0, n);
  renderBtns();
  document.getElementById('lvlN').textContent = level;
  document.getElementById('btnCount').textContent = n;
  updateFxDisplay();
}

// ---- ROOM BUILDER ----
const PATS = [
  [{c:5,r:3,w:4,h:1},{c:10,r:5,w:1,h:4},{c:3,r:7,w:5,h:1},{c:15,r:4,w:1,h:4},{c:8,r:9,w:5,h:1},{c:18,r:6,w:3,h:1}],
  [{c:4,r:4,w:1,h:5},{c:7,r:2,w:5,h:1},{c:12,r:5,w:1,h:4},{c:16,r:3,w:1,h:5},{c:5,r:9,w:5,h:1},{c:19,r:6,w:3,h:1}],
  [{c:3,r:3,w:6,h:1},{c:9,r:2,w:1,h:5},{c:13,r:5,w:4,h:1},{c:14,r:6,w:1,h:4},{c:5,r:8,w:5,h:1},{c:19,r:3,w:2,h:5}],
  [{c:6,r:2,w:1,h:6},{c:10,r:5,w:5,h:1},{c:14,r:5,w:1,h:4},{c:3,r:5,w:4,h:1},{c:8,r:9,w:5,h:1},{c:18,r:3,w:3,h:1}],
  [{c:4,r:2,w:7,h:1},{c:4,r:5,w:1,h:4},{c:8,r:7,w:5,h:1},{c:12,r:3,w:1,h:4},{c:16,r:5,w:4,h:1},{c:7,r:10,w:7,h:1}],
];

function mkWall(col, row) { return {x: col*T, y: row*T, w:T, h:T}; }

function buildRoom() {
  walls = [];
  // border walls
  for (let c=0; c<COLS; c++) { walls.push(mkWall(c,0)); walls.push(mkWall(c,ROWS-1)); }
  for (let r=1; r<ROWS-1; r++) { walls.push(mkWall(0,r)); walls.push(mkWall(COLS-1,r)); }
  // pattern
  const pat = PATS[(level-1) % PATS.length];
  for (const b of pat)
    for (let dc=0; dc<b.w; dc++)
      for (let dr=0; dr<b.h; dr++)
        walls.push(mkWall(b.c+dc, b.r+dr));
  // extra walls for higher levels
  if (level > 3) {
    for (let i=0; i<(level-3)*2; i++) {
      let c,r,t=0;
      do { c=2+Math.floor(Math.random()*(COLS-4)); r=2+Math.floor(Math.random()*(ROWS-4)); t++; }
      while (t<40 && (dist2(c*T,r*T,2*T,2*T)<80 || dist2(c*T,r*T,exit_.x,exit_.y)<80));
      walls.push(mkWall(c,r));
    }
  }
  player = {x:T*1.5+4, y:T*1.5+4, w:18, h:18, vx:0, vy:0, onGround:false};
  exit_ = {x:T*(COLS-3), y:T*(ROWS-3), w:T, h:T};
}

function dist2(ax,ay,bx,by) { return Math.hypot(ax-bx,ay-by); }

// ---- EFFECTS ----
function addFx(name, dur) { fx[name] = (fx[name]||0) + dur; updateFxDisplay(); }
function updateFxDisplay() {
  const el = document.getElementById('fx'); el.innerHTML = '';
  const lab = {flip:'FLIP ↔',freeze:'FROZEN ❄',shrink:'TINY',bounce:'BOUNCY ↑',dark:'DARK 🌑',mirror:'MIRROR',speed:'FAST ⚡',grav:'ANTI-GRAV 🔼',spin:'DIZZY',invis:'INVISIBLE'};
  const list = [];
  for (const [k,v] of Object.entries(fx)) if (v>0) {
    list.push(lab[k]||k);
    const t=document.createElement('div'); t.className='ftag'; t.textContent=lab[k]||k; el.appendChild(t);
  }
  document.getElementById('fxList').textContent = list.join(' | ') || 'No active effects';
}

// ---- BUTTON ACTIONS ----
function spawnWall() {
  let c,r,t=0;
  do { c=2+Math.floor(Math.random()*(COLS-4)); r=2+Math.floor(Math.random()*(ROWS-4)); t++; }
  while (t<40 && (dist2(c*T,r*T,player.x,player.y)<40 || dist2(c*T,r*T,exit_.x,exit_.y)<40));
  walls.push({x:c*T,y:r*T,w:T,h:T,temp:true,life:300});
}
function teleport() {
  let c,r,t=0;
  do { c=2+Math.floor(Math.random()*(COLS-4)); r=2+Math.floor(Math.random()*(ROWS-4)); t++; }
  while (t<40 && walls.some(w=>dist2(c*T,r*T,w.x,w.y)<T));
  player.x=c*T+6; player.y=r*T+6; player.vx=0; player.vy=0;
}
function spawnFake() {
  let c,r,t=0;
  do { c=2+Math.floor(Math.random()*(COLS-4)); r=2+Math.floor(Math.random()*(ROWS-4)); t++; }
  while (t<30 && (dist2(c*T,r*T,exit_.x,exit_.y)<60 || walls.some(w=>dist2(c*T,r*T,w.x,w.y)<T)));
  fakeExits.push({x:c*T,y:r*T,w:T,h:T,life:260});
}
function swapExit() {
  const ox=player.x, oy=player.y;
  player.x=exit_.x+6; player.y=exit_.y+6;
  exit_.x=ox; exit_.y=oy;
}

// ---- RENDER BUTTONS ----
function renderBtns() {
  const p = document.getElementById('btnPanel'); p.innerHTML = '';
  for (const b of availBtns) {
    const el = document.createElement('button');
    el.className = 'gbtn' + (usedBtns.has(b.id) ? ' used' : '');
    el.textContent = b.label;
    el.style.borderColor = b.bc; el.style.color = b.col;
    el.style.boxShadow = `0 0 5px ${b.bc}55`;
    el.onclick = () => { if (usedBtns.has(b.id)) return; b.fn(); usedBtns.add(b.id); renderBtns(); };
    p.appendChild(el);
  }
}

// ---- PHYSICS ----
const GRAV=0.55, SPD=3.4;

function rr(a,b) { return a.x<b.x+b.w && a.x+a.w>b.x && a.y<b.y+b.h && a.y+a.h>b.y; }

function update() {
  if (state !== 'play') return;
  frame++;

  // decay effects
  let changed = false;
  for (const k in fx) { if(fx[k]>0){fx[k]--; if(fx[k]<=0){delete fx[k]; changed=true;}} }
  if (changed) updateFxDisplay();
  if (fx.freeze) return;

  const flip  = !!fx.flip;
  const sp    = fx.speed ? SPD*1.9 : SPD;
  const shrunk= !!fx.shrink;
  const gFlip = !!fx.grav;
  const g     = gFlip ? -GRAV : GRAV;
  const jspd  = fx.bounce ? (gFlip?14:-14) : (gFlip?9:-11);
  const pw    = shrunk ? 10 : player.w;
  const ph    = shrunk ? 10 : player.h;

  const L = keys['ArrowLeft']||keys['a'];
  const R = keys['ArrowRight']||keys['d'];
  const J = keys['ArrowUp']||keys['w']||keys[' '];

  if (flip?R:L)      { player.vx = -sp; }
  else if (flip?L:R) { player.vx =  sp; }
  else                 player.vx *= .72;

  if (J && player.onGround && !jumpHeld) { player.vy = jspd; jumpHeld = true; }
  if (!J) jumpHeld = false;

  player.vy += g;
  player.x  += player.vx;
  player.y  += player.vy;

  // wall collisions
  player.onGround = false;
  for (const w of walls) {
    if (rr({x:player.x,y:player.y,w:pw,h:ph}, w)) {
      const cx=player.x+pw/2, cy=player.y+ph/2;
      const wx=w.x+w.w/2,     wy=w.y+w.h/2;
      const overX = pw/2+w.w/2 - Math.abs(cx-wx);
      const overY = ph/2+w.h/2 - Math.abs(cy-wy);
      if (overX < overY) {
        player.x += cx>wx ? overX : -overX;
        player.vx = 0;
      } else {
        player.y += cy>wy ? overY : -overY;
        player.vy = 0;
        // onGround: player is above wall (cy < wy) in normal gravity
        if (!gFlip && cy < wy) player.onGround = true;
        if  (gFlip && cy > wy) player.onGround = true;
      }
    }
  }

  // hard clamp inside border
  player.x = Math.max(T, Math.min(CW-T-pw, player.x));
  player.y = Math.max(T, Math.min(CH-T-ph, player.y));

  // temp walls
  for (let i=walls.length-1; i>=0; i--)
    if (walls[i].temp && --walls[i].life <= 0) walls.splice(i,1);

  // fake exits
  for (let i=fakeExits.length-1; i>=0; i--) {
    fakeExits[i].life--;
    if (fakeExits[i].life <= 0) { fakeExits.splice(i,1); continue; }
    if (rr({x:player.x,y:player.y,w:pw,h:ph}, fakeExits[i])) {
      notif('FAKE EXIT! 😈'); fakeExits.splice(i,1);
    }
  }

  // real exit
  if (exit_ && rr({x:player.x,y:player.y,w:pw,h:ph}, exit_)) nextLevel();

  // notif decay
  for (let i=notifs.length-1; i>=0; i--) { notifs[i].t--; if(notifs[i].t<=0) notifs.splice(i,1); }
}

function nextLevel() {
  level++;
  if (level > 15) {
    state = 'win';
    document.getElementById('msg').style.display = 'flex';
    document.getElementById('msg').innerHTML = `<h1 style="color:#ffdd44;font-family:'Fredoka One',cursive;">YOU ESCAPED!</h1><p style="color:#bb88ff">All 15 levels cleared! 🎉</p><button class="sbtn" onclick="level=1;startGame()">PLAY AGAIN</button><br><a href="index.html" style="display:inline-block;margin-top:8px;color:#6644aa;font-size:10px;letter-spacing:2px;text-decoration:none;font-family:monospace;">← BACK TO ARCADE</a>`;
    return;
  }
  initLevel(); notif('LEVEL ' + level + '! 🎉');
}
function notif(txt) { notifs.push({txt, t:130}); }

// ---- DRAW ----
function draw() {
  ctx.clearRect(0,0,CW,CH);

  if (state === 'menu') {
    ctx.fillStyle='#0d0520'; ctx.fillRect(0,0,CW,CH);
    return;
  }

  const dark = !!fx.dark, spin = !!fx.spin, gFlip = !!fx.grav;
  if (spin) { ctx.save(); ctx.translate(CW/2,CH/2); ctx.rotate(Math.sin(frame*.09)*.18); ctx.translate(-CW/2,-CH/2); }

  ctx.fillStyle = dark ? '#000' : '#0d0520';
  ctx.fillRect(0,0,CW,CH);
  if (!dark) {
    ctx.fillStyle = '#1e0a38';
    for (let x=0; x<CW; x+=T) for (let y=0; y<CH; y+=T) {
      ctx.beginPath(); ctx.arc(x,y,1,0,Math.PI*2); ctx.fill();
    }
  }

  // walls
  for (const w of walls) {
    const a = w.temp ? Math.min(1, w.life/50) : 1;
    ctx.globalAlpha = a;
    ctx.fillStyle   = dark ? '#330d22' : (w.temp ? '#442200' : '#1e0a40');
    ctx.fillRect(w.x,w.y,w.w,w.h);
    ctx.strokeStyle = dark ? '#771133' : (w.temp ? '#ff6600' : '#5522aa');
    ctx.lineWidth=1.5; ctx.strokeRect(w.x+.5,w.y+.5,w.w-1,w.h-1);
    ctx.globalAlpha=1;
  }

  // fake exits
  for (const fe of fakeExits) {
    ctx.globalAlpha = Math.min(1, fe.life/30);
    drawExit(fe.x, fe.y, '#ff4444');
    ctx.globalAlpha=1;
  }

  // real exit
  drawExit(exit_.x, exit_.y, '#ffdd44');

  // mirror
  if (fx.mirror) {
    const pw=fx.shrink?10:player.w, ph=fx.shrink?10:player.h;
    ctx.globalAlpha=.35;
    drawPlayer(CW-player.x-pw, player.y, pw, ph, '#aaffff');
    ctx.globalAlpha=1;
  }

  // player
  const pw=fx.shrink?10:player.w, ph=fx.shrink?10:player.h;
  ctx.globalAlpha = fx.invis ? .15 : 1;
  drawPlayer(player.x, player.y, pw, ph, '#cc88ff');
  ctx.globalAlpha=1;

  if (gFlip) { ctx.fillStyle='#00ffaa33'; ctx.fillRect(0,0,CW,3); ctx.fillRect(0,CH-3,CW,3); }
  if (spin) ctx.restore();

  // notifs
  for (let i=0; i<notifs.length; i++) {
    ctx.globalAlpha = Math.min(1, notifs[i].t/20);
    ctx.font='bold 20px Fredoka One,cursive'; ctx.fillStyle='#ffdd44'; ctx.textAlign='center';
    ctx.fillText(notifs[i].txt, CW/2, CH/2-30-i*26);
    ctx.globalAlpha=1;
  }
  ctx.textAlign='left';
}

function drawPlayer(x,y,pw,ph,col) {
  ctx.shadowColor=col; ctx.shadowBlur=13;
  ctx.fillStyle=col; ctx.fillRect(x,y,pw,ph);
  if(pw>=14) { ctx.fillStyle='#fff8'; ctx.fillRect(x+3,y+3,pw-6,4); }
  ctx.shadowBlur=0;
}

function drawExit(x,y,col) {
  const p = .6+Math.sin(frame*.09)*.4;
  ctx.shadowColor=col; ctx.shadowBlur=14*p;
  ctx.fillStyle=col+'33'; ctx.fillRect(x,y,T,T);
  ctx.strokeStyle=col; ctx.lineWidth=2; ctx.strokeRect(x+1,y+1,T-2,T-2);
  ctx.fillStyle=col; ctx.font='16px sans-serif'; ctx.textAlign='center';
  ctx.fillText('✦', x+T/2, y+T/2+6);
  ctx.shadowBlur=0; ctx.textAlign='left';
}

document.addEventListener('keydown', e => { keys[e.key]=true; if(e.key===' ')e.preventDefault(); });
document.addEventListener('keyup',   e => { keys[e.key]=false; });

function loop() { update(); draw(); requestAnimationFrame(loop); }
loop();
</script>
</body>
</html>
