<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ragdoll Archers</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#1a1a2e;overflow:hidden;height:100vh;width:100vw;font-family:'Segoe UI',sans-serif;}
canvas{display:block;}
#ui{position:fixed;top:0;left:0;right:0;height:48px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;background:linear-gradient(#0d0d1aee,transparent);pointer-events:none;z-index:10;}
#ui span{font-size:13px;letter-spacing:2px;color:#8888cc;}
#ui b{color:#fff;}
#aim{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);color:#33335566;font-size:11px;letter-spacing:2px;pointer-events:none;z-index:10;}
#msg{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#1a1a2eee;z-index:20;}
#msg h1{font-size:54px;font-weight:900;letter-spacing:4px;color:#ff8844;margin-bottom:8px;text-align:center;}
#msg p{color:#555588;font-size:13px;margin-bottom:24px;text-align:center;line-height:2.2;}
.btn{background:transparent;border:2px solid #ff8844;color:#ff8844;padding:12px 38px;font-size:15px;letter-spacing:3px;cursor:pointer;transition:all .2s;}
.btn:hover{background:#ff884422;box-shadow:0 0 20px #ff884444;}
</style>
</head>
<body>
<canvas id="cv"></canvas>
<div id="ui">
  <span>ROUND <b id="rnd">1</b></span>
  <span>PLAYER <b id="pscore">0</b> — <b id="escore">0</b> CPU</span>
  <span>ARROWS <b id="arrows">5</b></span>
</div>
<div id="aim">HOLD TO AIM · RELEASE TO SHOOT · MOUSE TO DRAG AIM</div>
<div id="msg">
  <h1>RAGDOLL<br>ARCHERS</h1>
  <p>Hold & drag to aim. Release to shoot.<br>Hit the enemy to score. First to 5 wins!<br>Arrows are affected by wind and gravity.</p>
  <button class="btn" onclick="startGame()">▶ PLAY</button>
</div>
<script>
var cv=document.getElementById('cv'),ctx=cv.getContext('2d');
var W,H;
function resize(){W=cv.width=window.innerWidth;H=cv.height=window.innerHeight;}
resize();window.addEventListener('resize',resize);

var GRAV=0.18;
var gameState='menu';
var round=1,pScore=0,eScore=0,arrowsLeft=5,eArrowsLeft=5;
var wind=0;
var player,enemy;
var arrows=[];
var particles=[];
var mouseX=0,mouseY=0,dragging=false,dragStart={x:0,y:0};
var aimLine={active:false,angle:0,power:0};
var turnTimer=0,eTurn=false,eTurnDelay=0;
var groundY;
var bgObjs=[];

// --- RAGDOLL ---
function makeRagdoll(x,flipX){
  return{
    x:x,y:0, // y set on init
    flip:flipX,
    // joints: head, torso, larm, rarm, lleg, rleg
    joints:{
      head:{x:x,y:0,vx:0,vy:0},
      torso:{x:x,y:0,vx:0,vy:0},
      larm:{x:x,y:0,vx:0,vy:0},
      rarm:{x:x,y:0,vx:0,vy:0},
      lleg:{x:x,y:0,vx:0,vy:0},
      rleg:{x:x,y:0,vx:0,vy:0},
    },
    hp:3,maxHp:3,
    dead:false,deadTimer:0,
    hitAnim:0,
    bowAngle:flipX?2.4:0.7,
  };
}

function initRagdollPos(r){
  var gY=groundY-2;
  r.joints.torso.x=r.x; r.joints.torso.y=gY-40;
  r.joints.head.x=r.x;  r.joints.head.y=gY-70;
  r.joints.larm.x=r.x-18;r.joints.larm.y=gY-38;
  r.joints.rarm.x=r.x+18;r.joints.rarm.y=gY-38;
  r.joints.lleg.x=r.x-10;r.joints.lleg.y=gY-10;
  r.joints.rleg.x=r.x+10;r.joints.rleg.y=gY-10;
  // zero velocity
  for(var k in r.joints){r.joints[k].vx=0;r.joints[k].vy=0;}
}

function startGame(){
  document.getElementById('msg').style.display='none';
  round=1;pScore=0;eScore=0;
  wind=(Math.random()-.5)*2;
  makeBG();
  initRound();
}

function initRound(){
  gameState='play';
  arrowsLeft=5;eArrowsLeft=5;
  arrows=[];particles=[];
  groundY=H*.7+Math.sin(round*.8)*30;
  player=makeRagdoll(W*.2,false);
  enemy=makeRagdoll(W*.8,true);
  initRagdollPos(player);
  initRagdollPos(enemy);
  eTurn=false; eTurnDelay=0; turnTimer=0;
  dragging=false; aimLine.active=false;
  wind=(Math.random()-.5)*2.5;
  updateUI();
}

function makeBG(){
  bgObjs=[];
  for(var i=0;i<12;i++)
    bgObjs.push({x:Math.random()*W,y:H*.3+Math.random()*H*.4,r:8+Math.random()*30,a:Math.random()*.15+.04,col:Math.random()<.5?'#8844aa':'#334488'});
}

// --- PHYSICS ---
function updateRagdoll(r){
  if(!r.dead) return;
  r.deadTimer++;
  for(var k in r.joints){
    var j=r.joints[k];
    j.vy+=GRAV*2; j.vx+=wind*.01;
    j.x+=j.vx; j.y+=j.vy;
    if(j.y>groundY){j.y=groundY;j.vy*=-.3;j.vx*=.7;}
    if(j.x<0)j.x=0; if(j.x>W)j.x=W;
  }
}

function updateArrow(a){
  a.vy+=GRAV; a.vx+=wind*.03;
  a.x+=a.vx; a.y+=a.vy;
  a.trail.push({x:a.x,y:a.y});
  if(a.trail.length>12)a.trail.shift();
  if(a.y>groundY){a.stuck=true;a.y=groundY;}
  if(a.x<-50||a.x>W+50)a.stuck=true;
}

function checkHit(a,r){
  if(r.dead||a.fromEnemy===r.isEnemy) return false; // wait — fix ownership
  var cx=r.joints.torso.x, cy=r.joints.torso.y;
  var hx=r.joints.head.x, hy=r.joints.head.y;
  if(Math.hypot(a.x-hx,a.y-hy)<18){a.stuck=true;hitRagdoll(r,true);return true;}
  if(Math.hypot(a.x-cx,a.y-cy)<22){a.stuck=true;hitRagdoll(r,false);return true;}
  return false;
}

function hitRagdoll(r,isHead){
  r.hp--;r.hitAnim=20;
  spawnParticles(r.joints.head.x,r.joints.head.y,'#ff4444',14);
  if(r.hp<=0){
    r.dead=true;r.deadTimer=0;
    // ragdoll effect
    for(var k in r.joints){
      r.joints[k].vx=(Math.random()-.5)*8;
      r.joints[k].vy=-Math.random()*7-3;
    }
    setTimeout(function(){
      if(r===player)eScore++;else pScore++;
      updateUI();
      if(pScore>=5||eScore>=5){gameOver();}
      else{round++;setTimeout(initRound,1800);}
    },1200);
  }
}

// --- ENEMY AI ---
function doEnemyTurn(){
  if(!eTurn||eTurnDelay>0){eTurnDelay--;return;}
  // aim at player with slight randomness
  var dx=player.joints.torso.x-enemy.x;
  var dy=player.joints.torso.y-(enemy.joints.torso.y-20);
  // solve for angle (simplified, ignore wind for now, add wind correction)
  var dist=Math.hypot(dx,dy);
  var power=Math.min(18,Math.max(6,dist*.025+2));
  var baseAng=Math.atan2(dy,dx);
  // compensate for gravity and wind
  var gravComp=power*0.4;
  var windComp=-(wind*.3);
  var scatter=(Math.random()-.5)*.35;
  var angle=baseAng-gravComp*0.05+windComp+scatter;
  fireArrow(enemy,Math.cos(angle)*power,Math.sin(angle)*power,true);
  eTurn=false;
}

// --- FIRE ---
function fireArrow(r,vx,vy,fromEnemy){
  if(fromEnemy?eArrowsLeft<=0:arrowsLeft<=0) return;
  if(fromEnemy)eArrowsLeft--;else{arrowsLeft--;updateUI();}
  var sx=r.flip?(r.x-22):(r.x+22);
  var sy=r.joints.head.y-10;
  arrows.push({x:sx,y:sy,vx:vx,vy:vy,fromEnemy:fromEnemy,stuck:false,trail:[]});
  // recoil
  r.joints.rarm.vx+=fromEnemy?3:-3;
  r.joints.rarm.vy-=2;
}

// --- PARTICLES ---
function spawnParticles(x,y,col,n){
  for(var i=0;i<n;i++){
    var a=Math.random()*Math.PI*2,s=2+Math.random()*5;
    particles.push({x:x,y:y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-3,col:col,life:30+Math.random()*20,ml:50});
  }
}

// --- UPDATE ---
var frame=0;
function update(){
  if(gameState!=='play')return;
  frame++;

  updateRagdoll(player);
  updateRagdoll(enemy);

  // arrow updates
  for(var i=arrows.length-1;i>=0;i--){
    var a=arrows[i];
    if(a.stuck)continue;
    updateArrow(a);
    // hit check
    if(!a.fromEnemy) checkHit(a,enemy);
    else checkHit(a,player);
  }
  // clean old stuck arrows
  if(arrows.length>30)arrows.splice(0,5);

  // particles
  for(var i2=particles.length-1;i2>=0;i2--){
    var p=particles[i2];p.x+=p.vx;p.y+=p.vy;p.vy+=.2;p.life--;
    if(p.life<=0)particles.splice(i2,1);
  }

  // enemy turn
  if(eTurn) doEnemyTurn();

  // auto-trigger enemy turn when player arrows used up
  if(!eTurn&&arrowsLeft<=0&&!player.dead){
    // check all player arrows are settled
    var settled=arrows.filter(function(a){return!a.fromEnemy;}).every(function(a){return a.stuck;});
    if(settled&&eArrowsLeft>0&&!enemy.dead){
      eTurn=true;eTurnDelay=60+Math.floor(Math.random()*60);
      var capturedRound=round;
      // fire multiple arrows with delay, checking round hasn't changed
      for(var s=0;s<3;s++){
        (function(delay){setTimeout(function(){
          if(round===capturedRound&&!enemy.dead&&!player.dead&&eArrowsLeft>0) doEnemyTurn();
        },delay);})(s*800+500);
      }
    }
  }

  // player hitanim
  if(player.hitAnim>0)player.hitAnim--;
  if(enemy.hitAnim>0)enemy.hitAnim--;
}

// --- DRAW ---
function draw(){
  ctx.clearRect(0,0,W,H);

  // sky gradient
  var sky=ctx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,'#0d0d22');sky.addColorStop(1,'#1a0a2a');
  ctx.fillStyle=sky;ctx.fillRect(0,0,W,H);

  // bg objects
  for(var i=0;i<bgObjs.length;i++){
    var b=bgObjs[i];
    ctx.globalAlpha=b.a;ctx.fillStyle=b.col;
    ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.fill();
  }ctx.globalAlpha=1;

  // wind indicator
  ctx.fillStyle='#33336688';
  ctx.font='11px sans-serif';ctx.textAlign='center';
  ctx.fillText('WIND '+(wind>0?'→':'←')+' '+Math.abs(wind).toFixed(1),W/2,32);
  ctx.textAlign='left';

  // ground
  var gg=ctx.createLinearGradient(0,groundY,0,H);
  gg.addColorStop(0,'#2a1a3a');gg.addColorStop(1,'#1a0a2a');
  ctx.fillStyle=gg;ctx.fillRect(0,groundY,W,H-groundY);
  ctx.strokeStyle='#6633aa';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(0,groundY);ctx.lineTo(W,groundY);ctx.stroke();

  // particles
  for(var i2=0;i2<particles.length;i2++){
    var p=particles[i2];
    ctx.globalAlpha=p.life/p.ml;ctx.fillStyle=p.col;
    ctx.beginPath();ctx.arc(p.x,p.y,2.5,0,Math.PI*2);ctx.fill();
  }ctx.globalAlpha=1;

  // arrows
  for(var i3=0;i3<arrows.length;i3++){
    var a=arrows[i3];
    // trail
    if(!a.stuck&&a.trail.length>1){
      ctx.globalAlpha=.3;ctx.strokeStyle=a.fromEnemy?'#ff6644':'#44aaff';
      ctx.lineWidth=1.5;ctx.beginPath();
      ctx.moveTo(a.trail[0].x,a.trail[0].y);
      for(var t=1;t<a.trail.length;t++)ctx.lineTo(a.trail[t].x,a.trail[t].y);
      ctx.stroke();ctx.globalAlpha=1;
    }
    var ang=a.stuck?-Math.PI/6:Math.atan2(a.vy,a.vx);
    ctx.save();ctx.translate(a.x,a.y);ctx.rotate(ang);
    ctx.strokeStyle=a.fromEnemy?'#ff8844':'#88ccff';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(-14,0);ctx.lineTo(14,0);ctx.stroke();
    ctx.fillStyle=a.fromEnemy?'#ff4422':'#4488ff';
    ctx.beginPath();ctx.moveTo(14,0);ctx.lineTo(6,-5);ctx.lineTo(6,5);ctx.closePath();ctx.fill();
    ctx.restore();
  }

  // ragdolls
  drawRagdoll(player,false);
  drawRagdoll(enemy,true);

  // aim line
  if(aimLine.active&&!player.dead){
    var ax=player.flip?(player.x-22):(player.x+22);
    var ay=player.joints.head.y-10;
    var endX=ax+Math.cos(aimLine.angle)*aimLine.power*12;
    var endY=ay+Math.sin(aimLine.angle)*aimLine.power*12;
    ctx.strokeStyle='#ffffff33';ctx.lineWidth=1.5;ctx.setLineDash([6,4]);
    ctx.beginPath();ctx.moveTo(ax,ay);ctx.lineTo(endX,endY);ctx.stroke();
    ctx.setLineDash([]);
    // power ring
    ctx.strokeStyle='rgba(255,200,100,'+aimLine.power/20+')';ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(ax,ay,aimLine.power*2,0,Math.PI*2);ctx.stroke();
  }

  // HP bars
  drawHP(player,W*.1);
  drawHP(enemy,W*.75);
}

function drawRagdoll(r,isEnemy){
  var j=r.joints;
  var col=isEnemy?'#ff6644':'#4488ff';
  var hitFlash=r.hitAnim>0&&Math.floor(r.hitAnim/3)%2===0;
  var dc=hitFlash?'#ffffff':(r.dead?'#666':col);
  var alpha=r.dead?Math.max(.3,1-r.deadTimer/80):1;
  ctx.globalAlpha=alpha;

  // body connections
  ctx.strokeStyle=dc;ctx.lineWidth=4;ctx.lineCap='round';
  line(j.head,j.torso);
  line(j.torso,j.lleg);line(j.torso,j.rleg);
  ctx.lineWidth=3;
  line(j.torso,j.larm);line(j.torso,j.rarm);

  // bow arm extended
  var bowEnd={
    x:j.rarm.x+(r.flip?-28:28)*Math.cos(r.bowAngle),
    y:j.rarm.y+28*Math.sin(r.bowAngle)
  };
  ctx.strokeStyle='#aa7733';ctx.lineWidth=2;
  line(j.rarm,bowEnd);
  // bow curve
  ctx.strokeStyle='#cc9944';ctx.lineWidth=2;
  ctx.beginPath();
  ctx.arc(bowEnd.x,bowEnd.y,14,r.bowAngle-0.9,r.bowAngle+0.9);
  ctx.stroke();

  // head
  ctx.fillStyle=dc;ctx.beginPath();ctx.arc(j.head.x,j.head.y,11,0,Math.PI*2);ctx.fill();
  // eye
  var ex=j.head.x+(r.flip?-6:6),ey=j.head.y-2;
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(ex,ey,4,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#000';ctx.beginPath();ctx.arc(ex+(r.flip?-1:1),ey,2,0,Math.PI*2);ctx.fill();

  ctx.globalAlpha=1;
}

function line(a,b){
  ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();
}

function drawHP(r,x){
  var y=groundY+24;
  ctx.fillStyle='#220000';ctx.fillRect(x,y,80,8);
  ctx.fillStyle=r.hp>1?'#44ff44':'#ff2222';
  ctx.fillRect(x,y,80*(r.hp/r.maxHp),8);
  ctx.strokeStyle='#666';ctx.lineWidth=1;ctx.strokeRect(x,y,80,8);
}

function updateUI(){
  document.getElementById('rnd').textContent=round;
  document.getElementById('pscore').textContent=pScore;
  document.getElementById('escore').textContent=eScore;
  document.getElementById('arrows').textContent=arrowsLeft;
}

function gameOver(){
  gameState='over';
  var won=pScore>=5;
  document.getElementById('msg').style.display='flex';
  document.getElementById('msg').innerHTML=
    '<h1 style="color:'+(won?'#44ff88':'#ff4444')+'">'+(won?'VICTORY!':'DEFEATED')+'</h1>'+
    '<p style="color:#555588">Score: '+pScore+' — '+eScore+' CPU<br>Rounds played: '+round+'</p>'+
    '<button class="btn" onclick="startGame()">PLAY AGAIN</button>';
}

// --- INPUT ---
cv.addEventListener('mousedown',function(e){
  if(gameState!=='play'||player.dead||eTurn) return;
  dragging=true;
  dragStart={x:e.clientX,y:e.clientY};
  aimLine.active=true;
});
cv.addEventListener('mousemove',function(e){
  mouseX=e.clientX;mouseY=e.clientY;
  if(dragging){
    var dx=player.x-e.clientX,dy=player.joints.head.y-e.clientY;
    aimLine.angle=Math.atan2(dy,dx)+Math.PI; // shoot opposite to drag dir
    // flip for enemy side
    aimLine.angle=Math.atan2(-(e.clientY-player.joints.head.y+10),e.clientX-(player.x+22));
    aimLine.power=Math.min(18,Math.hypot(e.clientX-dragStart.x,e.clientY-dragStart.y)/8);
  }
});
cv.addEventListener('mouseup',function(e){
  if(!dragging)return;
  dragging=false;aimLine.active=false;
  if(gameState!=='play'||player.dead||eTurn||arrowsLeft<=0) return;
  var power=Math.min(18,Math.max(3,Math.hypot(e.clientX-dragStart.x,e.clientY-dragStart.y)/8));
  fireArrow(player,Math.cos(aimLine.angle)*power,Math.sin(aimLine.angle)*power,false);
  // update bow angle
  player.bowAngle=aimLine.angle;
});

// touch support
cv.addEventListener('touchstart',function(e){e.preventDefault();var t=e.touches[0];cv.dispatchEvent(new MouseEvent('mousedown',{clientX:t.clientX,clientY:t.clientY}));},{passive:false});
cv.addEventListener('touchmove',function(e){e.preventDefault();var t=e.touches[0];cv.dispatchEvent(new MouseEvent('mousemove',{clientX:t.clientX,clientY:t.clientY}));},{passive:false});
cv.addEventListener('touchend',function(e){e.preventDefault();var t=e.changedTouches[0];cv.dispatchEvent(new MouseEvent('mouseup',{clientX:t.clientX,clientY:t.clientY}));},{passive:false});

function loop(){update();draw();requestAnimationFrame(loop);}
loop();
</script>
</body>
</html>
