<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CHAIN REACTION — Pixel Forge Games</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:"Courier New",monospace;color:#eee;overflow:hidden;user-select:none;}
#ui{display:flex;gap:24px;padding:8px 16px;font-size:13px;align-items:center;flex-wrap:wrap;justify-content:center;margin-bottom:8px;}
b{color:#fff;}
#turn-display{font-size:16px;letter-spacing:2px;}
canvas{display:block;cursor:pointer;}
#msg{font-size:20px;letter-spacing:3px;min-height:28px;text-align:center;margin-top:8px;}
a{color:#aaa;font-size:11px;text-decoration:none;}a:hover{color:#fff;}
</style>
</head>
<body>
<div id="ui">
  <span id="turn-display">YOUR TURN</span>
  <span>YOU <b id="yc" style="color:#00fff5;">0</b></span>
  <span>AI <b id="ac" style="color:#ff3fa4;">0</b></span>
  <span>ROUND <b id="rn">1</b></span>
  <a href="index.html">← Back</a>
</div>
<canvas id="c"></canvas>
<div id="msg"></div>
<script>
const C=document.getElementById('c'),ctx=C.getContext('2d');
const COLS=9,ROWS=7,SZ=64,PAD=4;
C.width=COLS*SZ;C.height=ROWS*SZ;

const P1='#00fff5',P2='#ff3fa4',EMPTY='#222';
let grid,turn,explosions,animating,round,gameOver;
let p1score=0,p2score=0;

function maxOrbs(r,c){
  let n=4;
  if(r===0||r===ROWS-1)n--;
  if(c===0||c===COLS-1)n--;
  return n;
}

function initGrid(){
  grid=Array.from({length:ROWS},(_,r)=>Array.from({length:COLS},(_,c)=>({owner:0,orbs:0,r,c})));
}

function reset(){
  initGrid();turn=1;explosions=[];animating=false;gameOver=false;round++;
  document.getElementById('rn').textContent=round;
  document.getElementById('msg').textContent='';
  setTurnUI();
}

function setTurnUI(){
  const d=document.getElementById('turn-display');
  d.textContent=turn===1?'YOUR TURN':'AI THINKING...';
  d.style.color=turn===1?P1:P2;
}

function addOrb(r,c,player){
  const cell=grid[r][c];
  if(cell.owner!==0&&cell.owner!==player)return false;
  cell.owner=player;cell.orbs++;
  if(cell.orbs>=maxOrbs(r,c)){
    cell.orbs=0;cell.owner=0;
    explosions.push({r,c,player,delay:0});
  }
  return true;
}

function spreadExplosion(r,c,player){
  [[r-1,c],[r+1,c],[r,c-1],[r,c+1]].forEach(([nr,nc])=>{
    if(nr<0||nr>=ROWS||nc<0||nc>=COLS)return;
    const cell=grid[nr][nc];
    cell.owner=player;cell.orbs++;
    if(cell.orbs>=maxOrbs(nr,nc)){
      cell.orbs=0;cell.owner=0;
      explosions.push({r:nr,c:nc,player,delay:explosions.length*2});
    }
  });
}

let particles=[],flashCells=[];
function boom(r,c,col){
  const cx=c*SZ+SZ/2,cy=r*SZ+SZ/2;
  for(let i=0;i<20;i++)particles.push({x:cx,y:cy,vx:(Math.random()-.5)*14,vy:(Math.random()-.5)*14,col,life:40,sz:3});
  flashCells.push({r,c,life:15,col});
}

function processExplosions(){
  if(explosions.length===0){
    animating=false;
    checkWin();
    if(!gameOver&&turn===2)setTimeout(aiTurn,400);
    return;
  }
  const ex=explosions.shift();
  boom(ex.r,ex.c,ex.player===1?P1:P2);
  spreadExplosion(ex.r,ex.c,ex.player);
  countScores();
  setTimeout(processExplosions,80);
}

function countScores(){
  let y=0,a=0;
  grid.forEach(row=>row.forEach(cell=>{if(cell.owner===1)y+=cell.orbs;else if(cell.owner===2)a+=cell.orbs;}));
  document.getElementById('yc').textContent=y;
  document.getElementById('ac').textContent=a;
}

function checkWin(){
  // Count owned cells
  let p1=0,p2=0,total=0;
  grid.forEach(row=>row.forEach(c=>{total++;if(c.owner===1)p1++;else if(c.owner===2)p2++;}));
  // After first moves both have placed, check domination
  if(p1>0&&p2===0){endGame('YOU WIN! 🎉');}
  else if(p2>0&&p1===0){endGame('AI WINS 😈');}
}

function endGame(msg){
  gameOver=true;
  if(msg.includes('YOU')){p1score++;document.getElementById('yc').style.textShadow='0 0 20px '+P1;}
  else{p2score++;document.getElementById('ac').style.textShadow='0 0 20px '+P2;}
  document.getElementById('msg').textContent=msg;
  document.getElementById('msg').style.color=msg.includes('YOU')?P1:P2;
  setTimeout(()=>{reset();},2200);
}

// AI: pick best move
function aiTurn(){
  if(gameOver||turn!==2)return;
  // Find all valid cells (owned by AI or empty)
  let candidates=[];
  grid.forEach(row=>row.forEach(cell=>{
    if(cell.owner===0||cell.owner===2){
      // Score: prefer cells near max, prefer corners/edges, prefer cells near player cells
      let s=cell.orbs*3;
      if(maxOrbs(cell.r,cell.c)-cell.orbs===1)s+=10; // about to explode
      if(cell.owner===2)s+=5;
      // Prefer cells near P1 cells
      [[cell.r-1,cell.c],[cell.r+1,cell.c],[cell.r,cell.c-1],[cell.r,cell.c+1]].forEach(([nr,nc])=>{
        if(nr>=0&&nr<ROWS&&nc>=0&&nc<COLS&&grid[nr][nc].owner===1)s+=7;
      });
      candidates.push({r:cell.r,c:cell.c,s});
    }
  }));
  if(!candidates.length)return;
  // Add some randomness
  candidates.forEach(c=>c.s+=Math.random()*4);
  candidates.sort((a,b)=>b.s-a.s);
  const pick=candidates[0];
  addOrb(pick.r,pick.c,2);
  countScores();
  animating=true;
  turn=1;setTurnUI();
  setTimeout(processExplosions,120);
}

C.addEventListener('click',e=>{
  if(animating||gameOver||turn!==1)return;
  const rect=C.getBoundingClientRect();
  const mx=e.clientX-rect.left,my=e.clientY-rect.top;
  const c=Math.floor(mx/SZ),r=Math.floor(my/SZ);
  if(r<0||r>=ROWS||c<0||c>=COLS)return;
  if(grid[r][c].owner===2)return;
  if(!addOrb(r,c,1))return;
  countScores();
  animating=true;turn=2;setTurnUI();
  setTimeout(processExplosions,120);
});

function draw(){
  ctx.fillStyle='#050010';ctx.fillRect(0,0,C.width,C.height);

  // Cells
  grid.forEach(row=>row.forEach(cell=>{
    const x=cell.c*SZ,y=cell.r*SZ;
    const col=cell.owner===1?P1:cell.owner===2?P2:EMPTY;

    ctx.fillStyle=cell.owner===0?'#0a0015':'rgba(0,0,0,.3)';
    ctx.fillRect(x+1,y+1,SZ-2,SZ-2);

    // Grid lines
    ctx.strokeStyle='#1a1a2e';ctx.lineWidth=1;
    ctx.strokeRect(x+1,y+1,SZ-2,SZ-2);

    // Max indicator (corners are dim)
    const mx=maxOrbs(cell.r,cell.c);
    ctx.fillStyle='rgba(255,255,255,0.04)';
    for(let i=0;i<mx;i++){
      const dots=[[x+12,y+12],[x+SZ-12,y+12],[x+12,y+SZ-12],[x+SZ-12,y+SZ-12]];
      ctx.beginPath();ctx.arc(dots[i][0],dots[i][1],3,0,Math.PI*2);ctx.fill();
    }

    // Orbs
    if(cell.orbs>0){
      ctx.shadowColor=col;ctx.shadowBlur=14;
      const orbPos=[
        [[32,32]],
        [[22,22],[42,42]],
        [[18,18],[32,32],[46,46]],
        [[18,18],[46,18],[18,46],[46,46]],
      ];
      const pos=orbPos[Math.min(cell.orbs-1,3)];
      pos.forEach(([ox,oy])=>{
        ctx.fillStyle=col;ctx.beginPath();ctx.arc(x+ox,y+oy,8,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='rgba(255,255,255,0.4)';ctx.beginPath();ctx.arc(x+ox-2,y+oy-2,2.5,0,Math.PI*2);ctx.fill();
      });
      ctx.shadowBlur=0;
    }
  }));

  // Flash cells
  flashCells=flashCells.filter(f=>f.life>0);
  flashCells.forEach(f=>{
    ctx.fillStyle=f.col;ctx.globalAlpha=f.life/15*.6;
    ctx.fillRect(f.c*SZ,f.r*SZ,SZ,SZ);f.life-=3;
  });ctx.globalAlpha=1;

  // Particles
  particles=particles.filter(p=>p.life>0);
  particles.forEach(p=>{
    ctx.globalAlpha=p.life/40;ctx.fillStyle=p.col;ctx.shadowColor=p.col;ctx.shadowBlur=8;
    ctx.beginPath();ctx.arc(p.x,p.y,p.sz,0,Math.PI*2);ctx.fill();
    p.x+=p.vx;p.y+=p.vy;p.vx*=.9;p.vy*=.9;p.life-=2;
  });ctx.globalAlpha=1;ctx.shadowBlur=0;

  // Turn border glow
  ctx.strokeStyle=turn===1?`rgba(0,255,245,${.3+Math.sin(Date.now()*.004)*.2})`:`rgba(255,63,164,${.3+Math.sin(Date.now()*.004)*.2})`;
  ctx.lineWidth=3;ctx.strokeRect(2,2,C.width-4,C.height-4);

  requestAnimationFrame(draw);
}

// Intro screen overlay
function drawIntro(){
  ctx.fillStyle='rgba(0,0,0,.88)';ctx.fillRect(0,0,C.width,C.height);
  ctx.shadowColor='#00fff5';ctx.shadowBlur=40;
  ctx.fillStyle='#00fff5';ctx.font='bold 36px monospace';ctx.textAlign='center';ctx.fillText('CHAIN',C.width/2,C.height/2-60);
  ctx.fillStyle='#ff3fa4';ctx.fillText('REACTION',C.width/2,C.height/2-15);
  ctx.shadowBlur=0;ctx.fillStyle='#aaa';ctx.font='13px monospace';
  ['Click any empty cell to add an orb.','When a cell hits its max it EXPLODES','and spreads to neighbors!','Eliminate the AI by taking all cells.','','Click to start!'].forEach((l,i)=>ctx.fillText(l,C.width/2,C.height/2+40+i*22));
}

let intro=true;
C.addEventListener('click',()=>{if(intro){intro=false;}},true);

const _draw=draw;
function loop(){
  if(intro){ctx.fillStyle='#050010';ctx.fillRect(0,0,C.width,C.height);grid.forEach(row=>row.forEach(cell=>{ctx.fillStyle='#0a0015';ctx.fillRect(cell.c*SZ+1,cell.r*SZ+1,SZ-2,SZ-2);ctx.strokeStyle='#1a1a2e';ctx.strokeRect(cell.c*SZ+1,cell.r*SZ+1,SZ-2,SZ-2);}));drawIntro();}
  else{return;}
  requestAnimationFrame(loop);
}

round=0;reset();
loop();
_draw();
</script>
</body>
</html>
