<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BLOONS POP — Pixel Forge Games</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0a0a1a;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:'Courier New',monospace;overflow:hidden;user-select:none;}
canvas{display:block;cursor:crosshair;}
#ui{display:flex;gap:16px;padding:6px;font-size:11px;color:#aaa;align-items:center;justify-content:center;flex-wrap:wrap;}
#ui b{color:#fff;} a{color:#ff88aa;text-decoration:none;font-size:10px;}a:hover{color:#fff;}
</style>
</head>
<body>
<div id="ui">
  <span>🎯 LEVEL <b id="h-lv">1</b></span>
  <span>💣 DARTS <b id="h-darts">3</b></span>
  <span>🎈 POPS <b id="h-pops">0</b></span>
  <span>⭐ SCORE <b id="h-score">0</b></span>
  <span>🏆 BEST <b id="h-best">0</b></span>
  <span style="color:#555;font-size:10px;">Click to shoot · Pop all balloons to advance · Chain pops for bonus!</span>
  <a href="index.html">← Back</a>
</div>
<canvas id="c" width="620" height="480"></canvas>
<script>
const C=document.getElementById('c'),ctx=C.getContext('2d');
const W=620,H=480;
let hiScore=parseInt(localStorage.getItem('bloons_hi')||0);

let state='menu',tick=0,level=1,score=0,darts=0,totalPops=0;
let balloons=[],darts_fired=[],particles=[],fx=[];
let chainCount=0,chainTimer=0;

const COLORS=['#ff4444','#ff8800','#ffee00','#44cc44','#44aaff','#cc44ff','#ff44aa','#ffffff'];
const SIZES=[18,24,32]; // small, medium, large
const SPEED_BY_LV=(lv)=>0.6+lv*.15;

function mkBalloon(x,y,col,sz,vx,vy,lives,lv){
  return{x,y,vx:vx||((Math.random()-.5)*SPEED_BY_LV(lv)),
    vy:vy||(-.8-Math.random()*SPEED_BY_LV(lv)),
    r:SIZES[sz]||SIZES[1],col:col||COLORS[Math.floor(Math.random()*COLORS.length)],
    lives:lives||1, popAnim:0, bob:Math.random()*Math.PI*2, sz:sz||1};
}

function mkLevel(lv){
  darts=Math.max(4,10-Math.floor(lv/2));
  balloons=[];
  const count=Math.min(4+lv*2, 20); // cap at 20 balloons
  for(let i=0;i<count;i++){
    const sz=lv>=3?(Math.random()<.25?2:Math.random()<.5?0:1):(Math.random()<.3?0:1);
    const lives=sz===2?3:sz===1?2:1;
    const r=SIZES[sz]||SIZES[1];
    balloons.push(mkBalloon(
      r+20+Math.random()*(W-r*2-40), // keep well inside screen
      60+r+Math.random()*(H*0.45),
      COLORS[Math.floor(Math.random()*COLORS.length)],sz,0,0,lives,lv
    ));
  }
  document.getElementById('h-darts').textContent=darts;
  document.getElementById('h-lv').textContent=lv;
}

function startGame(){
  level=1;score=0;totalPops=0;tick=0;chainCount=0;chainTimer=0;
  darts_fired=[];particles=[];fx=[];
  mkLevel(1);
  state='playing';
}

function update(){
  if(state!=='playing')return;
  tick++;
  if(chainTimer>0)chainTimer--;else chainCount=0;

  // Move balloons
  balloons.forEach(b=>{
    b.x+=b.vx;b.y+=b.vy;b.bob+=.04;
    // Bounce off walls
    if(b.x-b.r<0){b.x=b.r;b.vx=Math.abs(b.vx);}
    if(b.x+b.r>W){b.x=W-b.r;b.vx=-Math.abs(b.vx);}
    // Bounce off top and float down
    if(b.y-b.r<20){b.y=20+b.r;b.vy=Math.abs(b.vy)*.5;}
    if(b.y+b.r>H-20){b.y=H-20-b.r;b.vy=-Math.abs(b.vy);}
    // Gentle gravity float
    b.vy+=.012;
    b.x+=Math.sin(b.bob*.3)*.3;
  });

  // Move darts
  for(let i=darts_fired.length-1;i>=0;i--){
    const d=darts_fired[i];
    d.x+=d.vx;d.y+=d.vy;d.vy+=.15;d.life--;
    if(d.life<=0||d.x<0||d.x>W||d.y>H){darts_fired.splice(i,1);continue;}
    if(d.hit){darts_fired.splice(i,1);continue;}

    // Hit balloons — find closest first, don't splice here
    let hitIdx=-1;
    for(let j=0;j<balloons.length;j++){
      const b=balloons[j];
      if(Math.hypot(d.x-b.x,d.y-b.y)<b.r+3){hitIdx=j;break;}
    }
    if(hitIdx>=0){
      d.hit=true;
      popBalloon(balloons[hitIdx],hitIdx);
    }
  }

  // Chain reaction — pop adjacent balloons
  // (handled in popBalloon)

  // Check win
  if(balloons.length===0&&darts_fired.length===0){
    const bonus=darts*50;score+=bonus;
    if(bonus>0)fx.push({txt:'+'+bonus+' DARTS LEFT!',x:W/2,y:H/2,col:'#ffd700',life:80});
    state='levelclear';
    setTimeout(()=>{level++;mkLevel(level);state='playing';},2000);
  }
  // Check lose
  if(balloons.length>0&&darts<=0&&darts_fired.length===0){state='gameover';gameOver();}

  particles=particles.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.1;p.life--;return p.life>0;});
  for(let i=fx.length-1;i>=0;i--){fx[i].life--;if(fx[i].life<=0)fx.splice(i,1);}
}

function popBalloon(b,idx){
  // Pop animation
  for(let i=0;i<12;i++){
    const a=i/12*Math.PI*2;
    particles.push({x:b.x,y:b.y,vx:Math.cos(a)*(2+Math.random()*4),vy:Math.sin(a)*(2+Math.random()*4),col:b.col,life:20+Math.random()*15,sz:4+Math.random()*4});
  }

  if(b.lives>1){
    // Shrink and split
    const newSz=b.sz-1;
    balloons[idx]=mkBalloon(b.x,b.y,b.col,newSz,b.vx+(Math.random()-.5)*2,b.vy-(1+Math.random()),b.lives-1,level);
    if(newSz>=0){
      balloons.push(mkBalloon(b.x+10,b.y,b.col,newSz,b.vx+(Math.random()-.5)*2,b.vy-(1+Math.random()),b.lives-1,level));
    }
  } else {
    balloons.splice(idx,1);
  }

  // Scoring
  chainCount++;chainTimer=30;
  const pts=10*(b.lives)*(chainCount>1?chainCount:1);
  score+=pts;totalPops++;
  if(score>hiScore){hiScore=score;localStorage.setItem('bloons_hi',hiScore);}

  if(chainCount>1)fx.push({txt:'CHAIN x'+chainCount+' +'+pts,x:b.x,y:b.y-20,col:'#ffd700',life:40});
  else fx.push({txt:'+'+pts,x:b.x,y:b.y-16,col:b.col,life:30});

  document.getElementById('h-pops').textContent=totalPops;
  document.getElementById('h-score').textContent=score;
  document.getElementById('h-best').textContent=hiScore;
}

function gameOver(){
  if(score>hiScore){hiScore=score;localStorage.setItem('bloons_hi',hiScore);}
}

function shootDart(mx,my){
  if(state!=='playing'||darts<=0)return;
  darts--;
  const angle=Math.atan2(my-H+40,mx-80);
  const spd=14;
  darts_fired.push({x:80,y:H-30,vx:Math.cos(angle)*spd,vy:Math.sin(angle)*spd,life:90});
  document.getElementById('h-darts').textContent=darts;
}

function draw(){
  ctx.fillStyle='#0a0a1a';ctx.fillRect(0,0,W,H);
  // Sky gradient
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#0a0a2a');g.addColorStop(1,'#0a1a0a');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);

  // Clouds
  [100,250,400,520].forEach((cx,i)=>{
    ctx.fillStyle='rgba(255,255,255,.04)';
    ctx.beginPath();ctx.arc(cx+Math.sin(tick*.005+i)*20,80+i*30,30+i*5,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(cx+20+Math.sin(tick*.005+i)*20,80+i*30,20+i*3,0,Math.PI*2);ctx.fill();
  });

  // Launcher
  const launchCol='#664400';
  ctx.fillStyle=launchCol;ctx.fillRect(60,H-50,40,50);
  ctx.fillStyle='#332200';ctx.fillRect(72,H-70,16,24);
  // Arrow pointing to mouse
  ctx.strokeStyle='rgba(255,200,0,.3)';ctx.lineWidth=1;ctx.setLineDash([4,4]);
  ctx.beginPath();ctx.moveTo(80,H-30);ctx.lineTo(lastMx||W/2,lastMy||H/2);ctx.stroke();
  ctx.setLineDash([]);

  // Balloons
  balloons.forEach(b=>{
    const bob=Math.sin(b.bob)*3;
    // String
    ctx.strokeStyle='rgba(255,255,255,.3)';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(b.x,b.y+b.r);ctx.quadraticCurveTo(b.x+5,b.y+b.r+10,b.x,b.y+b.r+20);ctx.stroke();
    // Balloon body
    ctx.shadowColor=b.col;ctx.shadowBlur=8;
    ctx.fillStyle=b.col;
    ctx.beginPath();ctx.ellipse(b.x,b.y+bob,b.r,b.r*1.15,0,0,Math.PI*2);ctx.fill();
    // Shine
    ctx.fillStyle='rgba(255,255,255,.4)';
    ctx.beginPath();ctx.ellipse(b.x-b.r*.3,b.y+bob-b.r*.3,b.r*.25,b.r*.2,-0.5,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;
    // Lives indicator
    if(b.lives>1){
      ctx.fillStyle='rgba(0,0,0,.6)';ctx.font='bold '+(b.r*.5)+'px monospace';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(b.lives,b.x,b.y+bob);ctx.textBaseline='alphabetic';
    }
  });

  // Darts
  darts_fired.forEach(d=>{
    ctx.save();ctx.translate(d.x,d.y);ctx.rotate(Math.atan2(d.vy,d.vx));
    ctx.fillStyle='#88aaff';ctx.fillRect(-8,-2,16,4);
    ctx.fillStyle='#cc4400';ctx.fillRect(6,-3,4,6);
    ctx.restore();
  });

  // Particles
  particles.forEach(p=>{
    ctx.globalAlpha=p.life/35;ctx.fillStyle=p.col;
    ctx.beginPath();ctx.arc(p.x,p.y,p.sz,0,Math.PI*2);ctx.fill();
  });ctx.globalAlpha=1;

  // FX text
  fx.forEach(f=>{
    ctx.globalAlpha=f.life/40;ctx.fillStyle=f.col;ctx.font='bold 14px monospace';ctx.textAlign='center';
    ctx.fillText(f.txt,f.x,f.y-(40-f.life)*.4);
  });ctx.globalAlpha=1;

  // HUD bar
  ctx.fillStyle='rgba(0,0,0,.6)';ctx.fillRect(0,0,W,22);
  ctx.fillStyle='#ff88aa';ctx.font='bold 11px monospace';ctx.textAlign='center';
  ctx.fillText('LEVEL '+level+' — '+balloons.length+' balloons left',W/2,14);

  if(state==='menu'){
    ctx.fillStyle='rgba(0,0,0,.88)';ctx.fillRect(0,0,W,H);
    ctx.shadowColor='#ff4488';ctx.shadowBlur=30;
    ctx.fillStyle='#ff4488';ctx.font='bold 56px monospace';ctx.textAlign='center';
    ctx.fillText('BLOONS',W/2,H/2-60);ctx.fillText('POP',W/2,H/2-4);
    ctx.shadowBlur=0;ctx.fillStyle='#555';ctx.font='12px monospace';
    ctx.fillText('Shoot darts to pop all balloons · Chain pops for big bonuses!',W/2,H/2+32);
    ctx.fillStyle='#ffd700';ctx.font='11px monospace';ctx.fillText('Best: '+hiScore,W/2,H/2+56);
    ctx.fillStyle='#ffe600';ctx.font='bold 14px monospace';ctx.fillText('CLICK OR PRESS ENTER',W/2,H/2+96);
  }
  if(state==='levelclear'){
    ctx.fillStyle='rgba(0,0,0,.6)';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#ffd700';ctx.font='bold 48px monospace';ctx.textAlign='center';
    ctx.fillText('LEVEL CLEAR! 🎈',W/2,H/2-20);
    ctx.fillStyle='#aaa';ctx.font='14px monospace';ctx.fillText('Score: '+score,W/2,H/2+26);
  }
  if(state==='gameover'){
    ctx.fillStyle='rgba(0,0,0,.82)';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#ff4488';ctx.font='bold 46px monospace';ctx.textAlign='center';
    ctx.fillText('OUT OF DARTS',W/2,H/2-46);
    ctx.fillStyle='#fff';ctx.font='16px monospace';
    ctx.fillText('Level: '+level+' · Score: '+score,W/2,H/2+4);
    ctx.fillStyle=score>=hiScore&&score>0?'#ffd700':'#888';ctx.font='13px monospace';
    ctx.fillText(score>=hiScore&&score>0?'🏆 NEW BEST!':'Best: '+hiScore,W/2,H/2+30);
    ctx.fillStyle='#ffe600';ctx.font='13px monospace';
    ctx.fillText('ENTER: Retry    ESC: Menu',W/2,H/2+78);
  }
}

let lastMx=W/2,lastMy=H/2;
C.addEventListener('mousemove',e=>{const r=C.getBoundingClientRect();lastMx=e.clientX-r.left;lastMy=e.clientY-r.top;});
C.addEventListener('click',e=>{
  if(state==='menu'){startGame();return;}
  const r=C.getBoundingClientRect();shootDart(e.clientX-r.left,e.clientY-r.top);
});
document.addEventListener('keydown',e=>{
  if(e.code==='Enter'){if(state==='menu'||state==='gameover')startGame();}
  if(e.code==='Escape'&&state==='gameover')state='menu';
});
function loop(){update();draw();requestAnimationFrame(loop);}
loop();
</script>
</body>
</html>
