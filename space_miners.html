<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Space Miner</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#030308;overflow:hidden;height:100vh;width:100vw;font-family:'Segoe UI',sans-serif;}
canvas{position:absolute;top:0;left:0;}
#hud{position:fixed;top:0;left:0;right:0;height:48px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;background:linear-gradient(#030308dd,transparent);pointer-events:none;z-index:10;}
.hb{display:flex;flex-direction:column;align-items:center;}
.hl{font-size:8px;letter-spacing:2px;color:#1a2244;}
.hv{font-size:15px;font-weight:700;color:#4488ff;}
#shopBtn{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:#0a0a22;border:2px solid #4488ff;color:#4488ff;padding:8px 28px;font-size:12px;letter-spacing:3px;cursor:pointer;pointer-events:all;z-index:15;transition:all .2s;}
#shopBtn:hover{background:#4488ff22;}
#shop{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:#030308dd;z-index:20;}
#shopPanel{background:#060612;border:2px solid #4488ff;padding:28px;min-width:340px;}
#shopPanel h2{font-size:22px;font-weight:900;letter-spacing:4px;color:#4488ff;margin-bottom:16px;}
.upg{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #0a1a44;}
.upg-name{color:#88aaff;font-size:13px;letter-spacing:1px;}
.upg-info{color:#1a2a66;font-size:11px;margin-top:2px;}
.ubtn{background:transparent;border:1px solid #4488ff;color:#4488ff;padding:6px 14px;font-size:11px;letter-spacing:2px;cursor:pointer;transition:all .15s;}
.ubtn:hover{background:#4488ff22;}
.ubtn:disabled{opacity:.3;cursor:default;}
#closeShop{display:block;margin-top:16px;width:100%;background:transparent;border:1px solid #222;color:#333;padding:8px;font-size:11px;letter-spacing:2px;cursor:pointer;}
#closeShop:hover{color:#666;}
#msg{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#030308ee;z-index:30;}
#msg h1{font-size:54px;font-weight:900;letter-spacing:4px;color:#4488ff;margin-bottom:8px;text-align:center;}
#msg p{color:#1a2244;font-size:13px;margin-bottom:22px;text-align:center;line-height:2.2;}
.btn{background:transparent;border:2px solid #4488ff;color:#4488ff;padding:12px 36px;font-size:14px;letter-spacing:3px;cursor:pointer;transition:all .2s;}
.btn:hover{background:#4488ff22;}
</style>
</head>
<body>
<canvas id="cv"></canvas>
<div id="hud">
  <div class="hb"><div class="hv" id="hHP">100</div><div class="hl">HULL</div></div>
  <div class="hb"><div class="hv" id="hMin">0</div><div class="hl">MINERALS</div></div>
  <div class="hb"><div class="hv" id="hWave">1</div><div class="hl">SECTOR</div></div>
  <div class="hb"><div class="hv" id="hScore">0</div><div class="hl">SCORE</div></div>
</div>
<button id="shopBtn" onclick="openShop()">⚙ UPGRADE SHOP</button>
<div id="shop">
  <div id="shopPanel">
    <h2>UPGRADE SHIP</h2>
    <div class="upg"><div><div class="upg-name">⚡ Engine</div><div class="upg-info" id="engInfo">Speed Lv.1</div></div><button class="ubtn" id="engBtn" onclick="buyUpg('engine')">80 💎</button></div>
    <div class="upg"><div><div class="upg-name">🔫 Laser</div><div class="upg-info" id="lasInfo">Dmg Lv.1</div></div><button class="ubtn" id="lasBtn" onclick="buyUpg('laser')">100 💎</button></div>
    <div class="upg"><div><div class="upg-name">🛡 Hull</div><div class="upg-info" id="hulInfo">+50 max HP</div></div><button class="ubtn" id="hulBtn" onclick="buyUpg('hull')">120 💎</button></div>
    <div class="upg"><div><div class="upg-name">💣 Bomb</div><div class="upg-info" id="bombInfo">Area blast (unlocks)</div></div><button class="ubtn" id="bombBtn" onclick="buyUpg('bomb')">200 💎</button></div>
    <div class="upg"><div><div class="upg-name">⚡ Fire Rate</div><div class="upg-info" id="frInfo">Rate Lv.1</div></div><button class="ubtn" id="frBtn" onclick="buyUpg('firerate')">90 💎</button></div>
    <button id="closeShop" onclick="closeShop()">CLOSE [SHOP]</button>
  </div>
</div>
<div id="msg">
  <h1>SPACE<br>MINER</h1>
  <p>WASD/Arrows to fly. Space to shoot.<br>B to drop bomb (after upgrade).<br>Destroy asteroids for minerals. Upgrade your ship!</p>
  <button class="btn" onclick="startGame()">LAUNCH ▶</button>
</div>
<script>
var cv=document.getElementById('cv'),ctx=cv.getContext('2d');
var W,H;function resize(){W=cv.width=window.innerWidth;H=cv.height=window.innerHeight;}
resize();window.addEventListener('resize',resize);

var keys={};
var gameState='menu';
var ship,bullets,asteroids,parts,floats;
var frame,score,minerals,sector;
var upgrades={engine:1,laser:1,hull:1,bomb:0,firerate:1};
var stars=[];

function genStars(){stars=[];for(var i=0;i<120;i++)stars.push({x:Math.random()*W,y:Math.random()*H,r:.5+Math.random()*1.5,twinkle:Math.random()*Math.PI*2});}

function startGame(){
  document.getElementById('msg').style.display='none';
  frame=0;score=0;minerals=0;sector=1;
  ship={x:W/2,y:H/2,angle:-Math.PI/2,vx:0,vy:0,hp:100,maxHp:100,inv:0,shootCd:0,bombs:upgrades.bomb?3:0};
  bullets=[];asteroids=[];parts=[];floats=[];
  genStars();
  spawnAsteroids(5+sector*2);
  updateHUD();
  gameState='play';
}

function spawnAsteroids(n){
  for(var i=0;i<n;i++){
    var side=Math.floor(Math.random()*4);
    var x=side===0?-60:side===1?W+60:Math.random()*W;
    var y=side===2?-60:side===3?H+60:Math.random()*H;
    var r=20+Math.random()*30+sector*3;
    var spd=0.4+Math.random()*0.8+sector*.08;
    var ang=Math.random()*Math.PI*2;
    var hp=Math.floor(r/8);
    asteroids.push({x,y,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,r,rot:Math.random()*Math.PI*2,rotSpd:(Math.random()-.5)*.03,hp,maxHp:hp,type:r>42?'large':r>28?'medium':'small',verts:makeVerts(r)});
  }
}

function makeVerts(r){
  var v=[],n=7+Math.floor(Math.random()*4);
  for(var i=0;i<n;i++){
    var a=i/n*Math.PI*2,rr=r*(0.75+Math.random()*.35);
    v.push({x:Math.cos(a)*rr,y:Math.sin(a)*rr});
  }
  return v;
}

function update(){
  if(gameState!=='play') return;
  frame++;
  var spd=2.2+upgrades.engine*.5;
  var drag=.97;
  if(keys['ArrowLeft']||keys['a'])ship.angle-=.06;
  if(keys['ArrowRight']||keys['d'])ship.angle+=.06;
  if(keys['ArrowUp']||keys['w']){ship.vx+=Math.cos(ship.angle)*.25*spd;ship.vy+=Math.sin(ship.angle)*.25*spd;}
  if(keys['ArrowDown']||keys['s']){ship.vx-=Math.cos(ship.angle)*.15;ship.vy-=Math.sin(ship.angle)*.15;}
  ship.vx*=drag;ship.vy*=drag;
  var maxV=4+upgrades.engine*.6;
  var vel=Math.hypot(ship.vx,ship.vy);
  if(vel>maxV){ship.vx=ship.vx/vel*maxV;ship.vy=ship.vy/vel*maxV;}
  ship.x+=ship.vx;ship.y+=ship.vy;
  ship.x=((ship.x%W)+W)%W;ship.y=((ship.y%H)+H)%H;
  if(ship.inv>0)ship.inv--;
  if(ship.shootCd>0)ship.shootCd--;

  var fireRate=Math.max(6,18-upgrades.firerate*3);
  if(keys[' ']&&ship.shootCd<=0){
    ship.shootCd=fireRate;
    bullets.push({x:ship.x+Math.cos(ship.angle)*18,y:ship.y+Math.sin(ship.angle)*18,
      vx:ship.vx+Math.cos(ship.angle)*10,vy:ship.vy+Math.sin(ship.angle)*10,life:60,dmg:1+upgrades.laser});
  }
  if(keys['b']&&ship.bombs>0&&!keys._bHeld){
    ship.bombs--;keys._bHeld=true;bombBlast();
  }
  if(!keys['b'])keys._bHeld=false;

  // bullets
  for(var i=bullets.length-1;i>=0;i--){
    var b=bullets[i];b.x+=b.vx;b.y+=b.vy;b.life--;
    if(b.life<=0){bullets.splice(i,1);continue;}
    b.x=((b.x%W)+W)%W;b.y=((b.y%H)+H)%H;
    for(var j=asteroids.length-1;j>=0;j--){
      var a=asteroids[j];
      if(Math.hypot(b.x-a.x,b.y-a.y)<a.r){
        a.hp-=b.dmg;
        spawnParts(b.x,b.y,'#88aaff',5);
        bullets.splice(i,1);
        if(a.hp<=0) killAsteroid(j);
        break;
      }
    }
  }

  // asteroids
  asteroids.forEach(function(a){
    a.x=(a.x+a.vx+W)%W;a.y=(a.y+a.vy+H)%H;a.rot+=a.rotSpd;
    if(ship.inv<=0&&Math.hypot(a.x-ship.x,a.y-ship.y)<a.r+12){
      ship.hp-=8+sector*2;ship.inv=45;
      spawnParts(ship.x,ship.y,'#ff4444',10);
      updateHUD();
      if(ship.hp<=0){gameDead();return;}
    }
  });

  // next sector
  if(asteroids.length===0){sector++;spawnAsteroids(5+sector*2);
    floats.push({txt:'SECTOR '+sector,x:W/2,y:H/2,life:120,col:'#4488ff'});updateHUD();}

  for(var i2=parts.length-1;i2>=0;i2--){var p=parts[i2];p.x+=p.vx;p.y+=p.vy;p.life--;if(p.life<=0)parts.splice(i2,1);}
  for(var i3=floats.length-1;i3>=0;i3--){var f=floats[i3];f.y-=.4;f.life--;if(f.life<=0)floats.splice(i3,1);}
}

function killAsteroid(idx){
  var a=asteroids[idx];
  var pts=a.type==='large'?30:a.type==='medium'?15:8;
  var min=a.type==='large'?6:a.type==='medium'?3:1;
  score+=pts*(sector);minerals+=min;
  floats.push({txt:'+'+min+'💎',x:a.x,y:a.y,life:60,col:'#88aaff'});
  spawnParts(a.x,a.y,'#8899cc',20);
  if(a.r>28){// split
    for(var s=0;s<2;s++){
      var ang=Math.random()*Math.PI*2;
      var nr=a.r*.55;
      asteroids.push({x:a.x+Math.cos(ang)*20,y:a.y+Math.sin(ang)*20,
        vx:a.vx+Math.cos(ang)*1.2,vy:a.vy+Math.sin(ang)*1.2,
        r:nr,rot:0,rotSpd:(Math.random()-.5)*.04,hp:Math.floor(nr/8),maxHp:Math.floor(nr/8),
        type:nr>28?'medium':'small',verts:makeVerts(nr)});
    }
  }
  asteroids.splice(idx,1);
  updateHUD();
}

function bombBlast(){
  var blasted=0;
  for(var i=asteroids.length-1;i>=0;i--){
    if(Math.hypot(asteroids[i].x-ship.x,asteroids[i].y-ship.y)<140){killAsteroid(i);blasted++;}
  }
  for(var j=0;j<40;j++){var a=Math.random()*Math.PI*2,s=Math.random()*6+2;parts.push({x:ship.x,y:ship.y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:40,r:3,col:'#ff8800'});}
  floats.push({txt:'BOMB!',x:ship.x,y:ship.y-30,life:80,col:'#ff8800'});
}

function spawnParts(x,y,col,n){
  for(var i=0;i<n;i++){var a=Math.random()*Math.PI*2,s=1+Math.random()*3;
    parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:20+Math.random()*15,r:1+Math.random()*2,col});}
}

function gameDead(){gameState='over';
  document.getElementById('msg').style.display='flex';
  document.getElementById('msg').innerHTML=
    '<h1 style="color:#ff4444">HULL BREACH</h1>'+
    '<p style="color:#1a2244">Sector '+sector+' | Score: '+score+'<br>Minerals: '+minerals+'</p>'+
    '<button class="btn" onclick="startGame()">RELAUNCH</button>';}

function updateHUD(){
  document.getElementById('hHP').textContent=Math.max(0,ship.hp);
  document.getElementById('hMin').textContent=minerals;
  document.getElementById('hWave').textContent=sector;
  document.getElementById('hScore').textContent=score;
}

function openShop(){
  if(gameState!=='play') return;
  gameState='shop';
  document.getElementById('engInfo').textContent='Speed Lv.'+upgrades.engine;
  document.getElementById('lasInfo').textContent='Dmg Lv.'+upgrades.laser;
  document.getElementById('hulInfo').textContent='HP+'+(upgrades.hull*50);
  document.getElementById('bombInfo').textContent=upgrades.bomb?'Bombs: '+ship.bombs:'Area blast';
  document.getElementById('frInfo').textContent='Rate Lv.'+upgrades.firerate;
  document.getElementById('shop').style.display='flex';
}
function closeShop(){document.getElementById('shop').style.display='none';gameState='play';}
var UPG_COSTS={engine:80,laser:100,hull:120,bomb:200,firerate:90};
var UPG_MAXLV={engine:5,laser:5,hull:3,bomb:1,firerate:5};
function buyUpg(type){
  var cost=UPG_COSTS[type]*(upgrades[type]+(type==='bomb'?1:0));
  if(minerals<cost){return;}
  minerals-=cost;
  upgrades[type]++;
  if(type==='hull'){ship.maxHp+=50;ship.hp=Math.min(ship.hp+50,ship.maxHp);}
  if(type==='bomb'){ship.bombs=3;}
  updateHUD();
  openShop();// refresh
}

function draw(){
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#030308';ctx.fillRect(0,0,W,H);
  // stars
  stars.forEach(function(s){
    s.twinkle+=.02;var a=.4+Math.sin(s.twinkle)*.25;
    ctx.globalAlpha=a;ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();
  });ctx.globalAlpha=1;

  // asteroids
  asteroids.forEach(function(a){
    ctx.save();ctx.translate(a.x,a.y);ctx.rotate(a.rot);
    var darken=a.hp/a.maxHp;
    ctx.fillStyle='hsl(220,15%,'+Math.round(12+darken*18)+'%)';
    ctx.strokeStyle='hsl(220,20%,'+Math.round(28+darken*12)+'%)';
    ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(a.verts[0].x,a.verts[0].y);
    a.verts.forEach(function(v){ctx.lineTo(v.x,v.y);});ctx.closePath();ctx.fill();ctx.stroke();
    ctx.restore();
    // hp
    if(a.hp<a.maxHp){ctx.fillStyle='#111';ctx.fillRect(a.x-a.r,a.y-a.r-6,a.r*2,4);ctx.fillStyle='#4488ff';ctx.fillRect(a.x-a.r,a.y-a.r-6,a.r*2*(a.hp/a.maxHp),4);}
  });

  // bullets
  bullets.forEach(function(b){
    ctx.shadowColor='#44ccff';ctx.shadowBlur=8;
    ctx.fillStyle='#88ddff';ctx.beginPath();ctx.arc(b.x,b.y,3,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;
  });

  // particles
  parts.forEach(function(p){
    ctx.globalAlpha=p.life/35;ctx.fillStyle=p.col;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();
  });ctx.globalAlpha=1;

  if(gameState==='play'||gameState==='shop'){
    // ship
    ctx.save();ctx.translate(ship.x,ship.y);ctx.rotate(ship.angle);
    if(!(ship.inv>0&&Math.floor(frame/5)%2)){
      ctx.shadowColor='#4488ff';ctx.shadowBlur=14;
      ctx.fillStyle='#2255cc';
      ctx.beginPath();ctx.moveTo(18,0);ctx.lineTo(-12,-10);ctx.lineTo(-8,0);ctx.lineTo(-12,10);ctx.closePath();ctx.fill();
      ctx.fillStyle='#4488ff';ctx.fillRect(-8,-3,6,6);
      // thrust flame
      if(keys['ArrowUp']||keys['w']){
        ctx.fillStyle='#ff8800';ctx.globalAlpha=.7+Math.random()*.3;
        ctx.beginPath();ctx.moveTo(-8,0);ctx.lineTo(-22,-5);ctx.lineTo(-22,5);ctx.closePath();ctx.fill();
        ctx.globalAlpha=1;
      }
      ctx.shadowBlur=0;
    }
    ctx.restore();
  }

  // floats
  floats.forEach(function(f){
    ctx.globalAlpha=Math.min(1,f.life/30);ctx.fillStyle=f.col;
    ctx.font='bold 15px sans-serif';ctx.textAlign='center';ctx.fillText(f.txt,f.x,f.y);
  });ctx.globalAlpha=1;ctx.textAlign='left';
}

document.addEventListener('keydown',function(e){keys[e.key]=true;if(e.key===' ')e.preventDefault();});
document.addEventListener('keyup',function(e){keys[e.key]=false;});
function loop(){update();draw();requestAnimationFrame(loop);}
loop();
</script>
</body>
</html>
