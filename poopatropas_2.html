<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Poopatropas 2: Chaos Edition</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0a0a1a;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:monospace;overflow:hidden;}
canvas{border:3px solid #ff5500;box-shadow:0 0 30px rgba(255,85,0,.5);image-rendering:pixelated;display:block;}
#ui{color:#fff;font-size:12px;padding:6px 12px;display:flex;gap:16px;align-items:center;flex-wrap:wrap;justify-content:center;}
a{color:#ff5500;font-size:11px;}
</style>
</head>
<body>
<div id="ui">
  <span id="lvlDisplay" style="color:#ffd700">World 1-1</span>
  <span id="ringDisplay">💍 0</span>
  <span id="livesDisplay">💀 3</span>
  <span id="scoreDisplay">⭐ 0</span>
  <span id="charDisplay" style="color:#4fc3f7">Eli</span>
  <span id="powerupDisplay" style="color:#ff8800"></span>
  <span style="color:#555">WASD:Move · Space:Jump · Q:Switch · Z/Shift:Special</span>
  <a href="index.html">← Back</a>
</div>
<canvas id="c" width="960" height="560"></canvas>
<script>
const W=960,H=560,c=document.getElementById('c'),ctx=c.getContext('2d');
const GRAVITY=0.65,JUMP=-16,DJUMP=-13;

const CHARS=[
  {name:'Eli',color:'#1296ff',color2:'#005ec2',skin:'#ffdba0',hair:'#4a2800',speed:5.5,special:'dash',
   icon:'⚡',specialName:'DASH',desc:'Double tap to dash through enemies!'},
  {name:'Liam',color:'#e03030',color2:'#8a0000',skin:'#ffd088',hair:'#5a3000',speed:4.5,special:'stomp',
   icon:'👊',specialName:'STOMP',desc:'Ground pound with massive knockback!'},
  {name:'Sammy',color:'#22b040',color2:'#006020',skin:'#ffe0a0',hair:'#1a0e00',speed:4,special:'shield',
   icon:'🛡',specialName:'SHIELD',desc:'Deploy bubble shield, deflects attacks!'},
  {name:'Kyle',color:'#e0b000',color2:'#7a5500',skin:'#ffc888',hair:'#e8b000',speed:5,special:'fly',
   icon:'🦅',specialName:'FLY',desc:'Hold jump to glide and slow fall!'},
  {name:'Zara',color:'#ff44cc',color2:'#aa0088',skin:'#ffe0e0',hair:'#220022',speed:6,special:'blink',
   icon:'✨',specialName:'BLINK',desc:'Teleport forward instantly!'},
];

const WORLD_THEMES=[
  {name:'Forest',bg:'#1a3010',bg2:'#0e2008',plat:'#4a2800',platTop:'#2a7020',sky:'#223a14',enemies:['🐢','🐛']},
  {name:'Desert',bg:'#8a5c20',bg2:'#6a3c10',plat:'#9a6a30',platTop:'#d4a050',sky:'#c08040',enemies:['🦂','🐍']},
  {name:'Ice World',bg:'#80b0e0',bg2:'#5090c0',plat:'#a0c8e8',platTop:'#dff0ff',sky:'#a0c8f0',enemies:['🐧','⛄']},
  {name:'Volcano',bg:'#3a0a00',bg2:'#280500',plat:'#5a1500',platTop:'#c03000',sky:'#600800',enemies:['🔥','💀']},
  {name:'Space',bg:'#010108',bg2:'#010110',plat:'#222244',platTop:'#4444aa',sky:'#010108',enemies:['👾','🛸']},
  {name:'Candy Land',bg:'#ff88aa',bg2:'#dd6688',plat:'#ffaacc',platTop:'#ff44aa',sky:'#ffaabb',enemies:['🍬','🍭']},
];

// Powerup types
const POWERUPS=[
  {type:'speed',icon:'⚡',col:'#ffee00',name:'SPEED',duration:300,apply:(p)=>{p.speedMult=1.8;}},
  {type:'giant',icon:'🔴',col:'#ff2200',name:'GIANT',duration:200,apply:(p)=>{p.scaleBonus=1.6;p.atkMult=2;}},
  {type:'tiny',icon:'🔵',col:'#2244ff',name:'TINY',duration:250,apply:(p)=>{p.scaleBonus=0.5;p.speedMult=1.4;}},
  {type:'star',icon:'⭐',col:'#ffd700',name:'STAR!',duration:400,apply:(p)=>{p.invincible=999;p.atkMult=3;}},
  {type:'jetpack',icon:'🚀',col:'#ff8800',name:'JETPACK',duration:350,apply:(p)=>{p.jetpack=true;}},
  {type:'magnet',icon:'🧲',col:'#cc44cc',name:'MAGNET',duration:300,apply:(p)=>{p.magnet=true;}},
];

const keys={};
document.addEventListener('keydown',e=>{
  if(keys[e.code])return;
  keys[e.code]=true;
  if(e.code==='Space'){e.preventDefault();doJump();}
  if(e.code==='KeyQ'){e.preventDefault();switchChar();}
  if(e.code==='KeyZ'||e.code==='ShiftLeft'){e.preventDefault();doSpecial();}
  if(e.code==='ArrowLeft'||e.code==='ArrowRight')e.preventDefault();
  if(state==='menu'){
    if(e.code==='ArrowLeft')selectedChar=(selectedChar-1+CHARS.length)%CHARS.length;
    if(e.code==='ArrowRight')selectedChar=(selectedChar+1)%CHARS.length;
    if(e.code==='Enter')startGame();
    document.getElementById('charDisplay').textContent=CHARS[selectedChar].name;
  }
});
document.addEventListener('keyup',e=>keys[e.code]=false);

let camX=0,camY=0,state='menu',selectedChar=0;
let currentWorld=0,currentLevel=0,rings=0,lives=3,score=0;
let particles=[],platforms=[],enemies=[],ringObjs=[],exitRect=null,powerupObjs=[];
let introTimer=0,gameOver=false,levelComplete=false,completeTimer=0;
let activePowerup=null,powerupTimer=0,frameCount=0;

let player={
  x:80,y:400,w:28,h:36,vx:0,vy:0,onGround:false,dj:true,
  faceDir:1,invincible:0,rings:0,dashCd:0,dashing:false,dashTimer:0,
  shieldActive:false,flyTimer:0,speedMult:1,atkMult:1,scaleBonus:1,
  magnet:false,jetpack:false,blinkCd:0,stompActive:false,
};
let totalRings=0;

function getTheme(){return WORLD_THEMES[currentWorld%WORLD_THEMES.length];}
function getWorldNum(){return currentWorld+1;}
function getLevelNum(){return currentLevel+1;}

function generateLevel(world,lv){
  const theme=WORLD_THEMES[world%WORLD_THEMES.length];
  const platforms2=[{x:0,y:H-40,w:W*4,h:40}]; // ground
  let x=300,lastY=H-140;
  const numPlat=12+lv*3+world*2;
  for(let i=0;i<numPlat;i++){
    const pw=60+Math.random()*140;
    const jump=Math.random()<.25;
    const py=Math.min(H-100,Math.max(100,lastY+(Math.random()-.5)*(jump?200:100)));
    platforms2.push({x,y:py,w:pw,h:16});
    x+=pw+60+Math.random()*100;
    lastY=py;
  }
  const levelW=x+400;
  // moving platforms (new in p2!)
  for(let i=0;i<3+world;i++){
    const mpw=80+Math.random()*60;
    const mpx=200+Math.random()*(levelW-400);
    const mpy=100+Math.random()*(H-200);
    platforms2.push({x:mpx,y:mpy,w:mpw,h:16,moving:true,mx:mpx,mRange:80+Math.random()*120,mDir:1,mSpd:1+Math.random()*2,vertical:Math.random()<.3});
  }
  // Rings
  const rings2=[];
  platforms2.forEach(p=>{
    if(p.moving)return;
    for(let i=0;i<3;i++){
      if(Math.random()<.5)rings2.push({x:p.x+20+i*30,y:p.y-28,w:18,h:18,collected:false});
    }
  });
  // Powerups
  const pups=[];
  for(let i=0;i<2+world;i++){
    const px2=200+Math.random()*(levelW-400);
    const py2=50+Math.random()*(H-200);
    const pu=POWERUPS[Math.floor(Math.random()*POWERUPS.length)];
    pups.push({x:px2,y:py2,w:24,h:24,...pu,collected:false});
  }
  // Enemies
  const enems=[];
  const enemCount=2+lv*2+world*2;
  for(let i=0;i<enemCount;i++){
    const plat=platforms2[1+Math.floor(Math.random()*(platforms2.length-1))];
    enems.push({x:plat.x+20,y:plat.y-32,w:28,h:32,vx:1+Math.random()*1.5,
      vy:0,onGround:false,hp:1+Math.floor(world*.7),
      icon:theme.enemies[Math.floor(Math.random()*theme.enemies.length)],
      platMinX:plat.x,platMaxX:plat.x+plat.w-28});
  }
  const spawn=[80,H-130];
  const exit={x:levelW-120,y:H-80,w:48,h:48};
  return{platforms:platforms2,rings:rings2,enemies:enems,exit,spawn,levelW,powerups:pups};
}

function loadLevel(world,lv){
  const data=generateLevel(world,lv);
  platforms=data.platforms;enemies=data.enemies;
  ringObjs=data.rings;exitRect=data.exit;powerupObjs=data.powerups;
  rings=0;player.rings=0;totalRings=ringObjs.length;
  player.x=data.spawn[0];player.y=data.spawn[1];
  player.vx=0;player.vy=0;player.onGround=false;player.dj=true;
  player.invincible=0;player.dashing=false;player.dashCd=0;player.dashTimer=0;
  player.flyTimer=0;player.scaleBonus=1;player.speedMult=1;player.atkMult=1;
  player.magnet=false;player.jetpack=false;player.stompActive=false;player.blinkCd=0;
  activePowerup=null;powerupTimer=0;
  camX=0;camY=0;particles=[];introTimer=60;levelComplete=false;completeTimer=0;
  updateUI();
}

function startGame(){
  state='playing';currentWorld=0;currentLevel=0;lives=3;score=0;
  loadLevel(0,0);
}

function switchChar(){
  selectedChar=(selectedChar+1)%CHARS.length;
  document.getElementById('charDisplay').textContent=CHARS[selectedChar].name;
  for(let i=0;i<12;i++) particles.push({x:player.x+14,y:player.y+18,vx:(Math.random()-.5)*5,vy:(Math.random()-2)*4,life:30,color:CHARS[selectedChar].color});
}

function doJump(){
  if(state!=='playing')return;
  const ch=CHARS[selectedChar];
  if(player.onGround){player.vy=JUMP;player.onGround=false;}
  else if(player.dj){player.vy=DJUMP;player.dj=false;}
  else if(ch.special==='fly'&&player.flyTimer>0){player.vy=Math.min(player.vy,-5);player.flyTimer--;}
  else if(player.jetpack&&player.flyTimer>0){player.vy-=3;player.flyTimer-=2;for(let i=0;i<3;i++)particles.push({x:player.x+14,y:player.y+36,vx:(Math.random()-.5)*3,vy:2+Math.random()*3,life:15,color:'#ff8800'});}
}

function doSpecial(){
  if(state!=='playing')return;
  const ch=CHARS[selectedChar];
  if(ch.special==='dash'&&player.dashCd<=0){
    player.dashing=true;player.dashTimer=10;player.dashCd=70;
    player.vx=player.faceDir*18;player.invincible=15;
    for(let i=0;i<10;i++)particles.push({x:player.x+14,y:player.y+18,vx:-player.faceDir*3+(Math.random()-.5)*2,vy:(Math.random()-.5)*2,life:18,color:ch.color});
  }
  if(ch.special==='stomp'&&!player.onGround){
    player.vy=18;player.stompActive=true;
    for(let i=0;i<8;i++)particles.push({x:player.x+14,y:player.y+36,vx:(Math.random()-.5)*5,vy:(Math.random()-.5)*3,life:15,color:ch.color});
  }
  if(ch.special==='shield'){
    player.shieldActive=!player.shieldActive;player.invincible=player.shieldActive?180:0;
  }
  if(ch.special==='blink'&&player.blinkCd<=0){
    player.x+=player.faceDir*120;player.blinkCd=50;
    for(let i=0;i<16;i++)particles.push({x:player.x+14,y:player.y+18,vx:(Math.random()-.5)*8,vy:(Math.random()-.5)*8,life:25,color:'#ff88ff'});
  }
}

function collide(ax,ay,aw,ah,bx,by,bw,bh){return ax<bx+bw&&ax+aw>bx&&ay<by+bh&&ay+ah>by;}

function resolvePlayer(){
  const spd=CHARS[selectedChar].speed*(player.speedMult||1);
  if(player.dashing){player.vx=player.faceDir*18;player.dashTimer--;if(player.dashTimer<=0)player.dashing=false;}
  else{
    if(keys['ArrowLeft']||keys['KeyA']){player.vx=Math.max(player.vx-1.5,-spd);player.faceDir=-1;}
    else if(keys['ArrowRight']||keys['KeyD']){player.vx=Math.min(player.vx+1.5,spd);player.faceDir=1;}
    else player.vx*=0.82;
  }
  if(player.dashCd>0)player.dashCd--;
  if(player.blinkCd>0)player.blinkCd--;
  if(player.invincible>0)player.invincible--;

  player.vy+=GRAVITY;
  if(player.vy>18)player.vy=18;

  player.x+=player.vx;
  platforms.forEach(p=>{
    if(collide(player.x,player.y,player.w,player.h,p.x,p.y,p.w,p.h)){
      if(player.vx>0)player.x=p.x-player.w;else player.x=p.x+p.w;player.vx=0;
    }
  });

  player.y+=player.vy;player.onGround=false;
  platforms.forEach(p=>{
    if(collide(player.x,player.y,player.w,player.h,p.x,p.y,p.w,p.h)){
      if(player.vy>0){
        player.y=p.y-player.h;player.vy=0;player.onGround=true;player.dj=true;
        player.flyTimer=60;player.stompActive&&(player.stompActive=false);
      } else if(player.vy<0){player.y=p.y+p.h;player.vy=0;}
    }
  });
  if(player.x<0)player.x=0;
}

function updateEnemies(){
  const ch=CHARS[selectedChar];
  enemies.forEach((e,ei)=>{
    e.vy+=GRAVITY;if(e.vy>18)e.vy=18;
    e.x+=e.vx;
    // Boundary patrol
    if(e.x<e.platMinX||e.x>e.platMaxX){e.vx*=-1;e.x=Math.max(e.platMinX,Math.min(e.platMaxX,e.x));}
    e.y+=e.vy;e.onGround=false;
    platforms.forEach(p=>{
      if(collide(e.x,e.y,e.w,e.h,p.x,p.y,p.w,p.h)){
        if(e.vy>=0){e.y=p.y-e.h;e.vy=0;e.onGround=true;}
        else{e.y=p.y+p.h;e.vy=0;}
      }
    });
    // Player collision
    if(collide(player.x,player.y,player.w,player.h,e.x,e.y,e.w,e.h)){
      const fromTop=player.vy>0&&player.y+player.h<e.y+e.h*.5;
      const stompHit=player.stompActive;
      if(fromTop||stompHit||player.invincible>150||(activePowerup?.type==='star')){
        e.hp-=(player.atkMult||1)*(stompHit?3:1);
        score+=50;
        for(let i=0;i<8;i++)particles.push({x:e.x+14,y:e.y+16,vx:(Math.random()-.5)*6,vy:(Math.random()-2)*4,life:25,color:'#ffd700'});
        if(e.hp<=0){enemies.splice(ei,1);score+=100;}
        else{player.vy=-10;}
      } else if(player.invincible<=0){
        respawn();
      }
    }
  });
}

function updateMovingPlatforms(){
  platforms.forEach(p=>{
    if(!p.moving)return;
    if(p.vertical){
      p.y+=p.mDir*p.mSpd;
      if(p.y<p.mx-p.mRange||p.y>p.mx+p.mRange)p.mDir*=-1;
    } else {
      p.x+=p.mDir*p.mSpd;
      if(p.x<p.mx-p.mRange||p.x>p.mx+p.mRange)p.mDir*=-1;
    }
  });
}

function respawn(){
  if(player.shieldActive){player.shieldActive=false;player.invincible=60;return;}
  lives--;document.getElementById('livesDisplay').textContent='💀 '+lives;
  for(let i=0;i<12;i++)particles.push({x:player.x+14,y:player.y,vx:(Math.random()-.5)*9,vy:(Math.random()-2)*5,life:50,color:'#ff4444'});
  rings=Math.max(0,rings-8);player.rings=rings;
  if(lives<=0){gameOver=true;state='gameover';return;}
  player.x=80;player.y=H-120;player.vx=0;player.vy=0;player.invincible=120;
  activePowerup=null;powerupTimer=0;player.speedMult=1;player.atkMult=1;player.scaleBonus=1;player.magnet=false;player.jetpack=false;
}

function updateUI(){
  document.getElementById('lvlDisplay').textContent='World '+getWorldNum()+'-'+getLevelNum();
  document.getElementById('ringDisplay').textContent='💍 '+rings+'/'+totalRings;
  document.getElementById('livesDisplay').textContent='💀 '+lives;
  document.getElementById('scoreDisplay').textContent='⭐ '+score;
}

function update(){
  if(state!=='playing')return;
  frameCount++;
  if(introTimer>0){introTimer--;return;}
  if(levelComplete){completeTimer++;if(completeTimer>90){currentLevel++;if(currentLevel>=3){currentLevel=0;currentWorld++;}loadLevel(currentWorld,currentLevel);}return;}

  updateMovingPlatforms();
  resolvePlayer();
  updateEnemies();

  // Powerup timer
  if(activePowerup&&powerupTimer>0){
    powerupTimer--;
    if(powerupTimer<=0){
      activePowerup=null;player.speedMult=1;player.atkMult=1;player.scaleBonus=1;player.magnet=false;player.jetpack=false;
      document.getElementById('powerupDisplay').textContent='';
    } else {
      document.getElementById('powerupDisplay').textContent=activePowerup.icon+' '+activePowerup.name+' '+Math.ceil(powerupTimer/60)+'s';
    }
  }

  // Magnet pulls rings
  if(player.magnet){
    ringObjs.forEach(r=>{
      if(r.collected)return;
      const dx=player.x+14-r.x,dy=player.y+18-r.y;
      const dist=Math.hypot(dx,dy);
      if(dist<200){r.x+=dx/dist*6;r.y+=dy/dist*6;}
    });
  }

  // Collect rings
  ringObjs.forEach(r=>{
    if(r.collected)return;
    if(collide(player.x,player.y,player.w,player.h,r.x,r.y,r.w,r.h)){
      r.collected=true;rings++;player.rings=rings;score+=10;
      particles.push({x:r.x,y:r.y,vx:(Math.random()-.5)*5,vy:(Math.random()-2)*4,life:25,color:'#ffd700'});
      updateUI();
    }
  });

  // Collect powerups
  powerupObjs.forEach(pu=>{
    if(pu.collected)return;
    if(collide(player.x,player.y,player.w,player.h,pu.x,pu.y,pu.w,pu.h)){
      pu.collected=true;
      // Reset previous powerup
      player.speedMult=1;player.atkMult=1;player.scaleBonus=1;player.magnet=false;player.jetpack=false;
      if(player.invincible>120)player.invincible=0;
      pu.apply(player);activePowerup=pu;powerupTimer=pu.duration;
      for(let i=0;i<16;i++)particles.push({x:pu.x+12,y:pu.y+12,vx:(Math.random()-.5)*8,vy:(Math.random()-2)*5,life:35,color:pu.col});
      score+=200;updateUI();
    }
  });

  // Fall off
  if(player.y>H+80)respawn();

  // Exit
  if(exitRect&&collide(player.x,player.y,player.w,player.h,exitRect.x,exitRect.y,exitRect.w,exitRect.h)){
    if(!levelComplete){
      levelComplete=true;completeTimer=0;score+=500+rings*20;
      for(let i=0;i<40;i++)particles.push({x:exitRect.x+24,y:exitRect.y+24,vx:(Math.random()-.5)*14,vy:(Math.random()-2)*8,life:60,color:'#ffd700'});
    }
  }

  // Camera
  const ch=CHARS[selectedChar];
  const targetCX=player.x-W*.4,targetCY=player.y-H*.5;
  camX+=(targetCX-camX)*.1;camY+=(targetCY-camY)*.1;
  camX=Math.max(0,camX);camY=Math.max(0,camY);

  // Particles
  for(let i=particles.length-1;i>=0;i--){
    particles[i].x+=particles[i].vx;particles[i].y+=particles[i].vy;
    particles[i].vy+=.2;particles[i].life-=1;
    if(particles[i].life<=0)particles.splice(i,1);
  }
}

function drawChar(x,y,dir,ch,inv,onGround,scale){
  scale=scale||1;
  const blink=inv>0&&Math.floor(frameCount/4)%2===0;
  if(blink)return;
  ctx.save();ctx.translate(x+14*scale,y+18*scale);ctx.scale(dir*scale,scale);
  // Shield
  const curCh=CHARS[selectedChar];
  if(player.shieldActive&&x===player.x){
    ctx.fillStyle='rgba(100,200,255,.25)';ctx.beginPath();ctx.arc(0,-6,28,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='rgba(100,200,255,.6)';ctx.lineWidth=2;ctx.stroke();
  }
  // Body
  ctx.fillStyle=ch.color;ctx.fillRect(-10,-28,20,22);
  // Head
  ctx.fillStyle=ch.skin;ctx.fillRect(-9,-48,18,22);
  // Hair
  ctx.fillStyle=ch.hair;ctx.fillRect(-9,-48,18,7);
  // Eyes
  ctx.fillStyle='#000';ctx.fillRect(2,-40,4,4);
  ctx.fillStyle='#fff';ctx.fillRect(3,-39,2,2);
  // Legs
  const lsw=onGround&&Math.abs(player.vx)>.5?Math.sin(frameCount*.25)*8:0;
  ctx.fillStyle=ch.color2;ctx.fillRect(-9,0,8,14+lsw);ctx.fillRect(1,0,8,14-lsw);
  ctx.restore();
}

function draw(){
  const theme=getTheme();
  // Sky gradient
  const sky=ctx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,theme.sky);sky.addColorStop(1,theme.bg2);
  ctx.fillStyle=sky;ctx.fillRect(0,0,W,H);

  // Parallax BG details
  ctx.save();ctx.translate(-camX*.3,0);
  for(let i=0;i<8;i++){
    const tx=(i*200-camX*.1)%W;
    ctx.fillStyle='rgba(255,255,255,.04)';ctx.fillRect(tx,100+i*30,2,60+i*10);
  }
  ctx.restore();

  ctx.save();ctx.translate(-camX,-camY);

  // Platforms
  platforms.forEach(p=>{
    const mov=p.moving;
    ctx.fillStyle=mov?'#445566':theme.plat;ctx.fillRect(p.x,p.y,p.w,p.h);
    ctx.fillStyle=mov?'#88aacc':theme.platTop;ctx.fillRect(p.x,p.y,p.w,6);
    if(mov){// moving platform indicator
      ctx.fillStyle='rgba(100,200,255,.3)';ctx.fillRect(p.x,p.y,p.w,p.h);
    }
  });

  // Ring objects
  ringObjs.forEach(r=>{
    if(r.collected)return;
    const bob=Math.sin(frameCount*.1)*3;
    ctx.fillStyle='#ffd700';ctx.strokeStyle='#ff8800';ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(r.x+9,r.y+9+bob,9,0,Math.PI*2);ctx.fill();ctx.stroke();
    ctx.fillStyle='rgba(255,255,255,.5)';ctx.beginPath();ctx.arc(r.x+6,r.y+5+bob,3,0,Math.PI*2);ctx.fill();
  });

  // Powerup objects
  powerupObjs.forEach(pu=>{
    if(pu.collected)return;
    const bob=Math.sin(frameCount*.08+1)*4;
    const glow=ctx.createRadialGradient(pu.x+12,pu.y+12+bob,0,pu.x+12,pu.y+12+bob,20);
    glow.addColorStop(0,pu.col+'88');glow.addColorStop(1,'transparent');
    ctx.fillStyle=glow;ctx.fillRect(pu.x-8,pu.y-8+bob,40,40);
    ctx.fillStyle=pu.col;ctx.strokeStyle='rgba(255,255,255,.4)';ctx.lineWidth=2;
    ctx.beginPath();ctx.roundRect(pu.x,pu.y+bob,24,24,4);ctx.fill();ctx.stroke();
    ctx.font='14px serif';ctx.textAlign='center';ctx.fillText(pu.icon,pu.x+12,pu.y+18+bob);
  });

  // Enemies
  enemies.forEach(e=>{
    const bob=Math.sin(frameCount*.15+e.x)*.5;
    ctx.font='28px serif';ctx.textAlign='center';
    ctx.globalAlpha=.85;ctx.fillText(e.icon,e.x+14,e.y+28+bob);ctx.globalAlpha=1;
    // HP bar
    if(e.hp>1){
      ctx.fillStyle='#333';ctx.fillRect(e.x,e.y-8,e.w,4);
      ctx.fillStyle='#ff4444';ctx.fillRect(e.x,e.y-8,e.w*(e.hp/3),4);
    }
  });

  // Exit
  if(exitRect){
    const pulse=Math.sin(frameCount*.1)*.3+.7;
    ctx.fillStyle=`rgba(255,215,0,${pulse*.4})`;ctx.fillRect(exitRect.x,exitRect.y,exitRect.w,exitRect.h);
    ctx.strokeStyle=`rgba(255,215,0,${pulse})`;ctx.lineWidth=3;ctx.strokeRect(exitRect.x,exitRect.y,exitRect.w,exitRect.h);
    ctx.font='32px serif';ctx.textAlign='center';ctx.fillText('⭐',exitRect.x+24,exitRect.y+34);
  }

  // Player
  if(state==='playing'||state==='gameover'){
    drawChar(player.x,player.y,player.faceDir,CHARS[selectedChar],player.invincible,player.onGround,player.scaleBonus||1);
    // Star powerup glow
    if(activePowerup?.type==='star'){
      ctx.fillStyle=`rgba(255,215,0,${.3+Math.sin(frameCount*.2)*.2})`;
      ctx.beginPath();ctx.arc(player.x+14,player.y+18,30,0,Math.PI*2);ctx.fill();
    }
  }

  // Particles
  particles.forEach(p=>{
    ctx.globalAlpha=p.life/50;ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,3,0,Math.PI*2);ctx.fill();
  });ctx.globalAlpha=1;

  ctx.restore();// end camera

  // INTRO banner
  if(introTimer>0){
    ctx.fillStyle=`rgba(0,0,0,${introTimer/60})`;ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#fff';ctx.font='bold 36px monospace';ctx.textAlign='center';
    ctx.fillText('WORLD '+getWorldNum()+' — '+getTheme().name,W/2,H/2-20);
    ctx.font='22px monospace';ctx.fillStyle='#ffd700';
    ctx.fillText('LEVEL '+getLevelNum(),W/2,H/2+20);
  }
  // Level complete banner
  if(levelComplete){
    ctx.fillStyle='rgba(0,0,0,.5)';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#ffd700';ctx.font='bold 52px monospace';ctx.textAlign='center';
    ctx.fillText('LEVEL CLEAR! ⭐',W/2,H/2-20);
    ctx.fillStyle='#fff';ctx.font='22px monospace';
    ctx.fillText('Score: '+score,W/2,H/2+30);
  }

  // Menu
  if(state==='menu'){
    ctx.fillStyle='rgba(10,10,26,.95)';ctx.fillRect(0,0,W,H);
    // Title
    ctx.shadowColor='#ff5500';ctx.shadowBlur=40;
    ctx.fillStyle='#ff5500';ctx.font='bold 60px monospace';ctx.textAlign='center';
    ctx.fillText('POOPATROPAS 2',W/2,H/2-120);
    ctx.shadowBlur=0;ctx.fillStyle='#ff8800';ctx.font='16px monospace';
    ctx.fillText('CHAOS EDITION',W/2,H/2-80);
    // Character select
    ctx.fillStyle='#fff';ctx.font='14px monospace';ctx.fillText('CHOOSE YOUR CHARACTER',W/2,H/2-40);
    CHARS.forEach((ch,i)=>{
      const cx=W/2+(i-2)*130;const selected=i===selectedChar;
      ctx.fillStyle=selected?ch.color+'44':'rgba(255,255,255,.05)';
      ctx.fillRect(cx-55,H/2-20,110,160);
      if(selected){ctx.strokeStyle=ch.color;ctx.lineWidth=3;ctx.strokeRect(cx-55,H/2-20,110,160);}
      ctx.font='44px serif';ctx.textAlign='center';ctx.fillText(ch.icon,cx,H/2+48);
      ctx.fillStyle=selected?ch.color:'#888';ctx.font='bold 13px monospace';
      ctx.fillText(ch.name,cx,H/2+80);
      ctx.fillStyle='#555';ctx.font='10px monospace';
      ctx.fillText(ch.specialName,cx,H/2+96);
      if(selected){
        ctx.fillStyle=ch.color+'cc';ctx.font='10px monospace';
        const words=ch.desc.split(' ');let line='',y=H/2+120;
        words.forEach(w=>{if((line+w).length>16){ctx.fillText(line,cx,y);line=w+' ';y+=14;}else line+=w+' ';});
        ctx.fillText(line,cx,y);
        ctx.fillStyle='#ffd700';ctx.font='9px monospace';ctx.fillText('▲ SELECTED',cx,H/2+150);
      }
    });
    ctx.fillStyle='#ffe600';ctx.font='bold 16px monospace';ctx.fillText('PRESS ENTER TO START',W/2,H/2+185);
    ctx.fillStyle='#444';ctx.font='11px monospace';ctx.fillText('← → to pick character',W/2,H/2+208);
  }

  // Game over
  if(state==='gameover'){
    ctx.fillStyle='rgba(0,0,0,.85)';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#ff4444';ctx.font='bold 56px monospace';ctx.textAlign='center';
    ctx.fillText('GAME OVER',W/2,H/2-40);
    ctx.fillStyle='#fff';ctx.font='20px monospace';ctx.fillText('Score: '+score,W/2,H/2+10);
    ctx.fillStyle='#ffd700';ctx.font='16px monospace';ctx.fillText('Press ENTER to try again',W/2,H/2+60);
  }
}

document.addEventListener('keydown',e=>{
  if(e.code==='Enter'){
    if(state==='menu')startGame();
    else if(state==='gameover'){state='menu';gameOver=false;selectedChar=0;}
  }
});

function loop(){update();draw();requestAnimationFrame(loop);}
loop();
</script>
</body>
</html>
