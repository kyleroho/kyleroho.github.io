<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PIXEL BRAWLER — Pixel Forge Games</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#111;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:"Courier New",monospace;overflow:hidden;}
canvas{display:block;border:2px solid #222;}
#ui{display:flex;gap:20px;padding:8px 16px;font-size:12px;color:#aaa;align-items:center;flex-wrap:wrap;justify-content:center;}
#ui b{color:#fff;} a{color:#ff4422;text-decoration:none;font-size:11px;}a:hover{color:#fff;}
</style>
</head>
<body>
<div id="ui">
  <span>⚔️ STAGE <b id="h-stage">1</b></span>
  <span>💀 KILLS <b id="h-kills">0</b></span>
  <span>💰 COMBO <b id="h-combo">x1</b></span>
  <span>⭐ SCORE <b id="h-score">0</b></span>
  <span>🏆 BEST <b id="h-best">0</b></span>
  <span style="color:#555;">A/D: Move · J: Punch · K: Kick · L: Special · Space: Jump · I: Block</span>
  <a href="index.html">← Back</a>
</div>
<canvas id="c" width="720" height="400"></canvas>
<script>
const C=document.getElementById('c'),ctx=C.getContext('2d');
const W=720,H=400;
const GY=300; // ground y

let stage=1,kills=0,combo=0,comboTimer=0,score=0;
let hiScore=parseInt(localStorage.getItem('pixelbrawler_hi')||0);
let state='menu',tick=0;
let particles=[],enemies=[],spawnTimer=0;
let stageKills=0,stageKillGoal=5,bgScrollX=0;
let bossActive=false;

// ── PLAYER ──
let P={
  x:120,y:GY,vx:0,vy:0,onGround:true,
  hp:100,maxHp:100,
  state:'idle', // idle walk jump punch kick special hurt dead
  stateTimer:0,
  dir:1,
  punching:false,kicking:false,special:false,
  specialCd:0,
  comboCount:0,
  invTimer:0,
  hitbox:{x:0,y:0,w:40,h:80},
};

// Enemy types: grunt, heavy, fast, boss
function mkEnemy(x,forceType){
  const isBoss=forceType==='boss'||(stage%5===0&&stageKills===stageKillGoal-1);
  const isHeavy=!isBoss&&Math.random()<0.2+stage*0.02;
  const isFast=!isBoss&&!isHeavy&&Math.random()<0.15+stage*0.02;
  const type=isBoss?'boss':isHeavy?'heavy':isFast?'fast':'grunt';
  const hp={boss:150+stage*30,heavy:60+stage*15,fast:15+stage*5,grunt:20+stage*8}[type];
  const spd={boss:1.5,heavy:1.2,fast:4,grunt:2}[type];
  const atk={boss:20+stage*3,heavy:15+stage*2,fast:6+stage,grunt:8+stage*2}[type];
  return{
    x,y:GY,vx:0,vy:0,onGround:true,
    hp,maxHp:hp,type,
    state:'walk',stateTimer:0,dir:-1,
    atk,spd,
    punching:false,kicking:false,
    attackTimer:Math.random()*60+({boss:30,heavy:50,fast:20,grunt:40}[type]),
    dead:false,isBoss,
    hitbox:{x:0,y:0,w:40,h:80},
    col:{boss:'#880000',heavy:'#553300',fast:'#004488',grunt:'#442200'}[type],
    icon:{boss:'💀',heavy:'🦍',fast:'💨',grunt:''}[type],
  };
}

// ── DRAW HELPERS ──
function drawChar(e,col,isP){
  const x=e.x,y=e.y,d=e.dir;
  const flash=e.invTimer>0&&Math.floor(e.invTimer/6)%2;
  ctx.globalAlpha=flash?0.4:1;
  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.3)';ctx.beginPath();ctx.ellipse(x,y+2,20,6,0,0,Math.PI*2);ctx.fill();
  // Body
  ctx.fillStyle=col;
  // Legs
  const legOff=e.state==='walk'?Math.sin(tick*0.2)*8:0;
  ctx.fillRect(x-10,y-30,8,30); // left leg
  ctx.fillRect(x+2,y-30,8,30);  // right leg
  if(e.onGround){
    ctx.fillRect(x-12+legOff,y-1,12,8); // L shoe
    ctx.fillRect(x+2-legOff,y-1,12,8);  // R shoe
  }
  // Torso
  ctx.fillStyle=isP?'#2244aa':col;
  ctx.fillRect(x-14,y-70,28,42);
  // Arms
  const armSwing=e.punching?(d*30):e.state==='walk'?Math.sin(tick*0.2)*12:0;
  ctx.fillStyle=col;
  ctx.fillRect(x-20+armSwing,y-68,10,28); // L arm
  ctx.fillRect(x+10-armSwing,y-68,10,28); // R arm
  if(e.punching){
    ctx.fillStyle='#ffccaa';
    ctx.fillRect(x+(d*30)-5,y-62,14,14); // fist
  }
  if(e.kicking){
    ctx.fillStyle=col;
    ctx.fillRect(x+(d*40)-5,y-20,16,10); // kick
  }
  // Head
  ctx.fillStyle='#ffccaa';ctx.beginPath();ctx.arc(x,y-82,16,0,Math.PI*2);ctx.fill();
  // Eyes
  ctx.fillStyle='#000';
  ctx.beginPath();ctx.arc(x+d*5,y-85,3,0,Math.PI*2);ctx.fill();
  if(e.isBoss){
    ctx.fillStyle='#f00';ctx.beginPath();ctx.arc(x+d*5,y-85,3,0,Math.PI*2);ctx.fill();
    // Crown
    ctx.fillStyle='#ffd700';
    ctx.beginPath();ctx.moveTo(x-14,y-97);ctx.lineTo(x-8,y-107);ctx.lineTo(x,y-101);ctx.lineTo(x+8,y-107);ctx.lineTo(x+14,y-97);ctx.closePath();ctx.fill();
  }
  // HP bar
  const bw=50;
  ctx.fillStyle='#300';ctx.fillRect(x-bw/2,y-100,bw,6);
  ctx.fillStyle=isP?'#4f4':'#f44';
  ctx.fillRect(x-bw/2,y-100,bw*(e.hp/e.maxHp),6);
  ctx.globalAlpha=1;
}

function drawBG(){
  // Sky gradient
  const g=ctx.createLinearGradient(0,0,0,GY);
  g.addColorStop(0,'#1a0505');g.addColorStop(1,'#2a0a0a');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,GY);

  // Buildings (parallax)
  for(let i=0;i<8;i++){
    const bx=((i*140-bgScrollX*0.3)%W+W)%W-20;
    const bh=60+i*20;
    ctx.fillStyle=`rgba(${20+i*5},${5},${5},1)`;
    ctx.fillRect(bx,GY-bh,80,bh);
    // Windows
    for(let wy=5;wy<bh-10;wy+=18){
      for(let wx=8;wx<70;wx+=22){
        ctx.fillStyle=Math.random()<0.3?'#ff8800':'rgba(255,255,0,0.15)';
        ctx.fillRect(bx+wx,GY-bh+wy,10,10);
      }
    }
  }

  // Ground
  ctx.fillStyle='#1a0808';ctx.fillRect(0,GY,W,H-GY);
  ctx.fillStyle='#2a1010';ctx.fillRect(0,GY,W,6);
  // Ground lines
  for(let x=((bgScrollX*0.8)%80+80)%80;x<W;x+=80){
    ctx.fillStyle='rgba(255,255,255,0.04)';ctx.fillRect(x,GY+6,2,H-GY-6);
  }
  // Neon signs
  const signs=['BRAWL ST','DANGER','FIGHT CLUB'];
  signs.forEach((s,i)=>{
    const sx=((i*260-bgScrollX*0.5+20)%W+W)%W;
    ctx.shadowColor='#f44';ctx.shadowBlur=15;
    ctx.fillStyle='#f44';ctx.font='bold 14px monospace';ctx.textAlign='left';
    ctx.fillText(s,sx,GY-120);
  });ctx.shadowBlur=0;
}

// ── PHYSICS ──
const GRAV=0.6,JUMP=-14;
function applyPhysics(e){
  e.vy+=GRAV;e.y+=e.vy;e.x+=e.vx;e.vx*=0.85;
  if(e.y>=GY){e.y=GY;e.vy=0;e.onGround=true;}
  e.x=Math.max(30,Math.min(W-30,e.x));
}

// ── HITBOX CHECK ──
function getHitbox(e,isAttacking){
  if(!isAttacking) return{x:e.x-20,y:e.y-80,w:40,h:80};
  if(e.punching) return{x:e.x+(e.dir>0?10:-50),y:e.y-72,w:40,h:20};
  if(e.kicking) return{x:e.x+(e.dir>0?20:-60),y:e.y-30,w:40,h:20};
  return null;
}
function overlaps(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y;}

// ── PLAYER UPDATE ──
const keys={};
function updatePlayer(){
  if(P.state==='dead') return;
  P.invTimer=Math.max(0,P.invTimer-1);
  P.specialCd=Math.max(0,P.specialCd-1);
  comboTimer=Math.max(0,comboTimer-1);
  if(comboTimer===0) combo=0;

  P.stateTimer=Math.max(0,P.stateTimer-1);
  if(P.stateTimer===0){P.punching=false;P.kicking=false;P.special=false;}

  if(P.state==='hurt'&&P.stateTimer===0) P.state='idle';

  if(P.state!=='hurt'){
    if(keys['KeyA']||keys['ArrowLeft']){P.vx=-4;P.dir=-1;P.state='walk';}
    else if(keys['KeyD']||keys['ArrowRight']){P.vx=4;P.dir=1;P.state='walk';}
    else{P.state=P.onGround?'idle':'jump';}

    P.blocking=!!(keys['KeyI']||keys['ShiftLeft']||keys['ShiftRight']);

    if((keys['Space']||keys['ArrowUp'])&&P.onGround){P.vy=JUMP;P.onGround=false;P.state='jump';}
    if(keys['KeyJ']&&P.stateTimer===0){P.punching=true;P.stateTimer=18;P.state='punch';doAttack(8,'punch');}
    if(keys['KeyK']&&P.stateTimer===0){P.kicking=true;P.stateTimer=22;P.state='kick';doAttack(14,'kick');}
    if(keys['KeyL']&&P.specialCd===0){P.special=true;P.stateTimer=30;P.specialCd=180;doSpecial();}
  }

  applyPhysics(P);
  bgScrollX+=P.vx;
}

function doAttack(dmg,type){
  enemies.forEach(e=>{
    if(e.dead) return;
    const phb=getHitbox(P,true);
    const ehb=getHitbox(e,false);
    if(phb&&overlaps(phb,ehb)){
      e.hp-=dmg;e.vx=P.dir*5;e.vy=-3;e.state='hurt';e.stateTimer=20;
      combo++;comboTimer=90;
      score+=dmg*(combo>1?combo:1)*(e.isBoss?5:1);
      spawnHit(e.x,e.y-50);
      if(e.hp<=0){
        e.dead=true;kills++;stageKills++;
        score+=(e.isBoss?500:50+stage*10)*(combo>1?combo:1);
        updHUD();checkStage();
      }
      updHUD();
    }
  });
}

function doSpecial(){
  // Spinning roundhouse — hits all nearby
  enemies.forEach(e=>{
    if(e.dead) return;
    if(Math.abs(e.x-P.x)<120&&Math.abs(e.y-P.y)<80){
      e.hp-=30;e.vx=(e.x>P.x?1:-1)*8;e.vy=-6;e.state='hurt';e.stateTimer=25;
      spawnHit(e.x,e.y-50);
      if(e.hp<=0){e.dead=true;kills++;stageKills++;updHUD();checkStage();}
    }
  });
  for(let i=0;i<20;i++) particles.push({x:P.x,y:P.y-40,vx:(Math.random()-.5)*10,vy:(Math.random()-.5)*8,col:'#ff8800',life:25,sz:4});
}

function spawnHit(x,y){
  for(let i=0;i<8;i++) particles.push({x,y,vx:(Math.random()-.5)*6,vy:(Math.random()-.5)*6,col:['#fff','#ff8800','#ffd700'][Math.floor(Math.random()*3)],life:20,sz:3});
}

// ── ENEMY UPDATE ──
function updateEnemy(e){
  if(e.dead) return;
  e.stateTimer=Math.max(0,e.stateTimer-1);
  if(e.stateTimer===0){e.punching=false;e.state=e.state==='hurt'?'walk':'walk';}

  if(e.state!=='hurt'){
    const dx=P.x-e.x;e.dir=Math.sign(dx);
    const dist=Math.abs(dx);
    const spd=e.spd||2;
    if(dist>50) e.vx=e.dir*spd;
    else e.vx=0;

    e.attackTimer--;
    if(e.attackTimer<=0&&dist<80&&Math.abs(P.y-e.y)<40){
      e.attackTimer=50+Math.random()*40;
      e.punching=true;e.stateTimer=20;e.state='punch';
      // Hit player
      if(P.invTimer===0){
        const blocked=P.blocking&&e.dir!==P.dir; // block from front
        const dmg=blocked?Math.floor(e.atk*0.1):e.atk;
        P.hp-=dmg;
        if(blocked){
          spawnHit(P.x,P.y-50);
          for(let i=0;i<6;i++) particles.push({x:P.x,y:P.y-50,vx:(Math.random()-.5)*5,vy:-Math.random()*4,col:'#4488ff',life:18,sz:3});
        }
        P.vx=-P.dir*4;P.vy=-3;P.state='hurt';P.stateTimer=20;P.invTimer=blocked?20:60;
        if(P.hp<=0){P.hp=0;P.state='dead';state='dead';gameOver();}
        updHUD();
      }
    }
  }
  applyPhysics(e);
}

function checkStage(){
  if(stageKills>=stageKillGoal&&enemies.every(e=>e.dead)){
    setTimeout(()=>{
      stage++;stageKills=0;stageKillGoal=5+stage*2;
      P.hp=Math.min(P.maxHp,P.hp+30);
      enemies=[];spawnTimer=60;updHUD();
      showStageMsg();
    },1500);
  }
}

function showStageMsg(){
  const d=document.createElement('div');
  d.style.cssText='position:fixed;top:40%;left:50%;transform:translate(-50%,-50%);color:#ffd700;font-size:36px;font-family:Courier New,monospace;font-weight:bold;text-shadow:0 0 20px #ffd700;pointer-events:none;z-index:99;';
  d.textContent=`STAGE ${stage}`;document.body.appendChild(d);
  setTimeout(()=>d.remove(),2000);
}

function gameOver(){
  if(score>hiScore){hiScore=score;localStorage.setItem('pixelbrawler_hi',hiScore);}
}

function updHUD(){
  document.getElementById('h-stage').textContent=stage;
  document.getElementById('h-kills').textContent=kills;
  document.getElementById('h-combo').textContent=`x${combo||1}`;
  document.getElementById('h-score').textContent=score;
  document.getElementById('h-best').textContent=hiScore;
}

// ── DRAW ──
function draw(){
  ctx.clearRect(0,0,W,H);
  drawBG();

  // Particles
  particles=particles.filter(p=>{
    ctx.globalAlpha=p.life/25;ctx.fillStyle=p.col;
    ctx.beginPath();ctx.arc(p.x,p.y,p.sz,0,Math.PI*2);ctx.fill();
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.1;p.life-=2;return p.life>0;
  });ctx.globalAlpha=1;

  // Enemies
  const ECOLS=['#cc3300','#882200','#aa0044','#550088'];
  enemies.forEach((e,i)=>{
    if(!e.dead) drawChar(e,e.col||ECOLS[i%4],false);
    // Show enemy type icon above head
    if(!e.dead&&e.icon){
      ctx.font='16px serif';ctx.textAlign='center';
      ctx.fillText(e.icon,e.x,e.y-90);
    }
  });

  // Player
  if(P.state!=='dead') drawChar(P,'#334466',true);

  // Player HP bar (top)
  ctx.fillStyle='rgba(0,0,0,.6)';ctx.fillRect(8,8,180,18);
  ctx.fillStyle='rgba(0,200,80,.8)';ctx.fillRect(10,10,176*(P.hp/P.maxHp),14);
  ctx.strokeStyle='rgba(255,255,255,.2)';ctx.strokeRect(8,8,180,18);
  ctx.fillStyle='#fff';ctx.font='10px monospace';ctx.textAlign='left';ctx.fillText('PLAYER',12,21);

  // Special cooldown
  ctx.fillStyle='rgba(0,0,0,.6)';ctx.fillRect(8,30,180,10);
  ctx.fillStyle='#ff8800';ctx.fillRect(10,32,176*(1-P.specialCd/180),6);
  ctx.fillStyle='#888';ctx.font='9px monospace';ctx.fillText('SPECIAL',12,40);

  // Combo
  if(combo>1){
    ctx.shadowColor='#ffd700';ctx.shadowBlur=15;
    ctx.fillStyle='#ffd700';ctx.font='bold 22px monospace';ctx.textAlign='right';
    ctx.fillText(`${combo} HIT COMBO!`,W-12,34);ctx.shadowBlur=0;
  }

  // Enemy count
  ctx.fillStyle='#666';ctx.font='11px monospace';ctx.textAlign='right';
  ctx.fillText(`${stageKills}/${stageKillGoal} eliminated`,W-12,H-10);

  if(state==='menu') drawMenu();
  if(state==='dead') drawGameOver();
}

function drawMenu(){
  ctx.fillStyle='rgba(0,0,0,.8)';ctx.fillRect(0,0,W,H);
  ctx.shadowColor='#ff4422';ctx.shadowBlur=40;
  ctx.fillStyle='#ff4422';ctx.font='bold 56px monospace';ctx.textAlign='center';
  ctx.fillText('PIXEL',W/2,H/2-80);ctx.fillText('BRAWLER',W/2,H/2-24);
  ctx.shadowBlur=0;
  ctx.fillStyle='#555';ctx.font='11px monospace';
  ctx.fillText('Fight through stages · boss every 5 stages',W/2,H/2+14);
  const controls=[['A/D','Move'],['Space','Jump'],['J','Punch'],['K','Kick'],['L','SPECIAL (area)'],['I/Shift','BLOCK']];
  controls.forEach(([k,v],i)=>{
    const cx=i<3?W/2-130:W/2+30;
    const cy=H/2+40+(i%3)*22;
    ctx.fillStyle='#ff4422';ctx.font='10px monospace';ctx.textAlign='left';
    ctx.fillText('['+k+']',cx,cy);
    ctx.fillStyle='#888';ctx.fillText(v,cx+60,cy);
  });
  ctx.fillStyle='#888';ctx.font='9px monospace';ctx.textAlign='center';
  ctx.fillText('Grunt · Heavy 🦍 · Fast 💨 · Boss 💀',W/2,H-60);
  ctx.fillStyle='#ffe600';ctx.font='bold 14px monospace';
  ctx.fillText('PRESS ENTER TO FIGHT',W/2,H-30);
}

function drawGameOver(){
  ctx.fillStyle='rgba(0,0,0,.82)';ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#f44';ctx.font='bold 52px monospace';ctx.textAlign='center';
  ctx.fillText('K.O.',W/2,H/2-50);
  ctx.fillStyle='#fff';ctx.font='16px monospace';
  ctx.fillText('Stage '+stage+' · '+kills+' eliminated',W/2,H/2+0);
  ctx.fillStyle='#ffd700';ctx.font='14px monospace';
  ctx.fillText('Score: '+score+(score>=hiScore?' 🏆 NEW BEST!':'  Best: '+hiScore),W/2,H/2+28);
  ctx.fillStyle='#ffe600';ctx.font='13px monospace';
  ctx.fillText('PRESS ENTER TO RETRY',W/2,H/2+70);
}

function resetGame(){
  P={x:120,y:GY,vx:0,vy:0,onGround:true,hp:100,maxHp:100,state:'idle',stateTimer:0,
    dir:1,punching:false,kicking:false,special:false,blocking:false,specialCd:0,comboCount:0,invTimer:0,hitbox:{}};
  enemies=[];particles=[];stage=1;kills=0;stageKills=0;stageKillGoal=5;
  combo=0;comboTimer=0;bgScrollX=0;spawnTimer=60;score=0;bossActive=false;
  state='playing';updHUD();
}

document.addEventListener('keydown',e=>{
  keys[e.code]=true;
  if(['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault();
  if(e.code==='Enter'&&(state==='menu'||state==='dead')) resetGame();
});
document.addEventListener('keyup',e=>keys[e.code]=false);

function loop(){
  tick++;
  if(state==='playing'){
    updatePlayer();
    enemies.forEach(updateEnemy);
    enemies=enemies.filter(e=>!e.dead||e.y<H+50);
    // Spawn enemies
    if(enemies.length===0&&stageKills<stageKillGoal){
      spawnTimer--;
      if(spawnTimer<=0){
        spawnTimer=120;
        const n=Math.min(3,stageKillGoal-stageKills);
        for(let i=0;i<n;i++) enemies.push(mkEnemy(W-100-i*60));
      }
    }
  }
  draw();requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
