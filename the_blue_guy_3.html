];}
const levels=createLevels();
function loadLevel(idx){
  if(idx>=levels.length){gameCompleted=true;state='intro';introTimer=0;return;}
  currentLevel=idx;const lv=levels[idx];
  platforms=[...lv.plats];enemies=lv.enemies.map(e=>({...e}));boss=lv.boss?{...lv.boss}:null;
  gems=lv.gems.map(g=>({...g,w:16,h:16,collected:false}));spikes=lv.spikes.map(s=>({...s,w:20,h:20}));
  exitRect={x:lv.exit[0],y:lv.exit[1],w:40,h:40};projectiles=[];gemsCollected=0;combo=0;comboTimer=0;
  player.x=lv.spawn[0];player.y=lv.spawn[1];player.vx=0;player.vy=0;player.onGround=false;player.dj=true;teleportCd=0;
  if(idx===0){player.hp=player.maxHp;}camX=0;camY=0;
  document.getElementById('lvlDisplay').textContent=`Level ${idx+1}/10`;
  document.getElementById('coinDisplay').textContent=`Gems: 0/${gems.length}`;updHp();
}
function updHp(){document.getElementById('hpDisplay').textContent='HP: '+'❤'.repeat(player.hp)+'🖤'.repeat(Math.max(0,player.maxHp-player.hp));}
function respawn(){player.hp--;updHp();combo=0;comboTimer=0;if(player.hp<=0){player.hp=player.maxHp;updHp();loadLevel(currentLevel);return;}const lv=levels[currentLevel];player.x=lv.spawn[0];player.y=lv.spawn[1];player.vx=0;player.vy=0;player.onGround=false;player.dj=true;for(let i=0;i<12;i++)particles.push({x:player.x+10,y:player.y+10,vx:(Math.random()-0.5)*6,vy:(Math.random()-2)*5,life:55,color:RED});}
function doJump(){if(state!=='playing')return;if(player.onGround){player.vy=JUMP;player.onGround=false;}else if(player.dj){player.vy=DJUMP;player.dj=false;}}
function doTeleport(){
  if(state!=='playing'||teleportCd>0)return;
  // Teleport in movement direction
  let tx=player.x,ty=player.y;
  let dx=0,dy=0;
  if(keys['ArrowLeft']||keys['KeyA'])dx=-1;
  else if(keys['ArrowRight']||keys['KeyD'])dx=1;
  if(keys['ArrowUp']||keys['KeyW'])dy=-1;
  else if(keys['ArrowDown']||keys['KeyS'])dy=1;
  if(dx===0&&dy===0)dx=player.vx>=0?1:-1;
  const len=Math.sqrt(dx*dx+dy*dy);dx/=len;dy/=len;
  // Ghost through to target
  const tx2=player.x+dx*teleportRange,ty2=player.y+dy*teleportRange;
  // Particles at start
  for(let i=0;i<10;i++)particles.push({x:player.x+10,y:player.y+10,vx:(Math.random()-0.5)*4,vy:(Math.random()-0.5)*4,life:25,color:GEM});
  player.x=tx2;player.y=ty2;player.vy=0;
  // Particles at end
  for(let i=0;i<10;i++)particles.push({x:player.x+10,y:player.y+10,vx:(Math.random()-0.5)*4,vy:(Math.random()-0.5)*4,life:25,color:WHITE});
  teleportCd=teleportCdBase;
}
function collide(ax,ay,aw,ah,bx,by,bw,bh){return ax<bx+bw&&ax+aw>bx&&ay<by+bh&&ay+ah>by;}
function resolvePlayer(){
  player.x+=player.vx;
  for(const p of platforms)if(collide(player.x,player.y,player.w,player.h,p.x,p.y,p.w,p.h)){if(player.vx>0)player.x=p.x-player.w;else if(player.vx<0)player.x=p.x+p.w;player.vx=0;}
  player.y+=player.vy;player.onGround=false;
  for(const p of platforms)if(collide(player.x,player.y,player.w,player.h,p.x,p.y,p.w,p.h)){if(player.vy>0){player.y=p.y-player.h;player.vy=0;player.onGround=true;player.dj=true;}else if(player.vy<0){player.y=p.y+p.h;player.vy=0;}}
}
function updatePlayer(){
  if(teleportCd>0)teleportCd--;
  if(keys['ArrowLeft']||keys['KeyA'])player.vx=Math.max(player.vx-1,-SPEED);else if(keys['ArrowRight']||keys['KeyD'])player.vx=Math.min(player.vx+1,SPEED);else{player.vx*=0.8;if(Math.abs(player.vx)<0.5)player.vx=0;}
  player.vy+=GRAVITY;resolvePlayer();
  if(comboTimer>0){comboTimer--;if(comboTimer<=0)combo=0;}
}
function updateEnemies(){
  for(const e of enemies){
    const spd=e.type==='f'?3:2;e.x+=spd*e.dir;if(Math.abs(e.x-e.sx)>=e.pd)e.dir*=-1;
    for(const p of platforms)if(collide(e.x,e.y,e.w,e.h,p.x,p.y,p.w,p.h)){if(e.dir>0)e.x=p.x-e.w;else e.x=p.x+p.w;e.dir*=-1;}
  }
}
function updateBoss(){
  if(!boss)return;
  const spd=boss.rage?4:2;boss.x+=spd*boss.dir;if(Math.abs(boss.x-boss.sx)>=boss.pd)boss.dir*=-1;
  if(boss.hp<=boss.maxHp/2&&!boss.rage){boss.rage=true;for(let i=0;i<20;i++)particles.push({x:boss.x+40,y:boss.y+40,vx:(Math.random()-0.5)*10,vy:(Math.random()-0.5)*10,life:70,color:PINK});}
  boss.sTimer++;const fr=boss.rage?55:85;
  if(boss.sTimer>=fr){const dx=player.x-boss.x,dy=player.y-boss.y,d=Math.sqrt(dx*dx+dy*dy)||1,spd2=boss.rage?7:5;
    projectiles.push({x:boss.x+boss.w/2,y:boss.y,vx:dx/d*spd2,vy:dy/d*spd2,w:10,h:10,c:boss.rage?PINK:GEM});
    if(boss.rage){const ang=Math.PI/8;for(let a=-1;a<=1;a+=2)projectiles.push({x:boss.x+boss.w/2,y:boss.y,vx:(dx/d*Math.cos(a*ang)-dy/d*Math.sin(a*ang))*spd2,vy:(dx/d*Math.sin(a*ang)+dy/d*Math.cos(a*ang))*spd2,w:10,h:10,c:PINK});}
    boss.sTimer=0;}
}
function updateProjectiles(){for(let i=projectiles.length-1;i>=0;i--){const p=projectiles[i];p.x+=p.vx;p.y+=p.vy;if(p.x<-100||p.x>3000||p.y<-100||p.y>2000){projectiles.splice(i,1);continue;}if(collide(p.x,p.y,p.w,p.h,player.x,player.y,player.w,player.h)){projectiles.splice(i,1);respawn();}}}
function checkCollisions(){
  for(const g of gems)if(!g.collected&&collide(player.x,player.y,player.w,player.h,g.x,g.y,g.w,g.h)){g.collected=true;gemsCollected++;totalGems++;combo++;comboTimer=120;const pts=combo>=5?3:combo>=3?2:1;gemPoints+=pts;document.getElementById('coinDisplay').textContent=`Gems: ${gemsCollected}/${gems.length}`;document.getElementById('comboDisplay').textContent=combo>=2?`COMBO x${combo}!`:'';for(let i=0;i<10;i++)particles.push({x:g.x+8,y:g.y+8,vx:(Math.random()-0.5)*5,vy:(Math.random()-3)*3,life:45,color:GEM});}
  for(const s of spikes)if(collide(player.x,player.y,player.w,player.h,s.x,s.y,s.w,s.h))respawn();
  for(let i=enemies.length-1;i>=0;i--){const e=enemies[i];if(collide(player.x,player.y,player.w,player.h,e.x,e.y,e.w,e.h)){if(player.vy>0&&player.y+player.h<=e.y+10){e.hp--;player.vy=JUMP;combo++;comboTimer=120;document.getElementById('comboDisplay').textContent=combo>=2?`COMBO x${combo}!`:'';if(e.hp<=0){enemies.splice(i,1);gemPoints+=2;for(let j=0;j<8;j++)particles.push({x:e.x+10,y:e.y+10,vx:(Math.random()-0.5)*6,vy:(Math.random()-2)*5,life:40,color:ORANGE});}}else respawn();}}
  if(boss&&collide(player.x,player.y,player.w,player.h,boss.x,boss.y,boss.w,boss.h)){if(player.vy>0&&player.y+player.h<=boss.y+20){boss.hp--;player.vy=JUMP;for(let j=0;j<12;j++)particles.push({x:boss.x+40,y:boss.y+40,vx:(Math.random()-0.5)*7,vy:(Math.random()-2)*5,life:50,color:PINK});if(boss.hp<=0)boss=null;}else respawn();}
  if(exitRect&&collide(player.x,player.y,player.w,player.h,exitRect.x,exitRect.y,exitRect.w,exitRect.h)){loadLevel(currentLevel+1);state='playing';}
  if(player.y>1500)respawn();
}
function updateCamera(){const tx=player.x-W/2,ty=player.y-H/2;camX+=(tx-camX)*0.1;camY+=(ty-camY)*0.1;if(camY<-200)camY=-200;}
function wx(x){return x-camX;}function wy(y){return y-camY;}
function drawBg(){
  ctx.fillStyle='#050510';ctx.fillRect(0,0,W,H);
  // purple nebula
  const g=ctx.createRadialGradient(W/2,H/3,0,W/2,H/3,W/2);
  g.addColorStop(0,'rgba(100,50,200,0.06)');g.addColorStop(1,'transparent');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  // stars
  for(let i=0;i<80;i++){const sx=((i*113+camX*0.015)%W+W)%W,sy=((i*71+camY*0.015)%H+H)%H;const br=i%7===0?0.8:0.3;ctx.fillStyle=`rgba(${150+i%100},${100+i%80},${255},${br})`;ctx.fillRect(sx,sy,i%7===0?2:1,i%7===0?2:1);}
}
function drawPlatforms(){for(const p of platforms){const g=ctx.createLinearGradient(wx(p.x),wy(p.y),wx(p.x),wy(p.y+p.h));g.addColorStop(0,'#2a1a5a');g.addColorStop(1,'#1a0a3a');ctx.fillStyle=g;ctx.fillRect(wx(p.x),wy(p.y),p.w,p.h);ctx.strokeStyle='#7a5aff';ctx.lineWidth=2;ctx.strokeRect(wx(p.x),wy(p.y),p.w,p.h);ctx.fillStyle='rgba(167,139,250,0.3)';ctx.fillRect(wx(p.x),wy(p.y),p.w,4);}}
function drawPlayer(){const b=player.onGround?Math.sin(Date.now()*0.01)*2:0,px=wx(player.x),py=wy(player.y+b);ctx.shadowColor='#4fc3f7';ctx.shadowBlur=12;ctx.fillStyle=rgb(BLUE);ctx.fillRect(px,py,player.w,player.h);ctx.shadowBlur=0;ctx.fillStyle='white';ctx.beginPath();ctx.arc(px+6,py+6,2.5,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(px+14,py+6,2.5,0,Math.PI*2);ctx.fill();if(teleportCd>0){ctx.fillStyle='rgba(167,139,250,0.5)';ctx.fillRect(px,py+player.h+2,player.w*(1-teleportCd/teleportCdBase),3);}}
function drawEnemies(){const t=Date.now();for(const e of enemies){const w=Math.sin(t*0.025)*1.5,col=e.type==='f'?PINK:ORANGE;ctx.shadowColor=rgb(col);ctx.shadowBlur=8;ctx.fillStyle=rgb(col);ctx.fillRect(wx(e.x),wy(e.y+w),e.w,e.h);ctx.shadowBlur=0;ctx.fillStyle='white';ctx.beginPath();ctx.arc(wx(e.x+5),wy(e.y+5+w),2,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(wx(e.x+13),wy(e.y+5+w),2,0,Math.PI*2);ctx.fill();if(e.hp>1){ctx.fillStyle='#400';ctx.fillRect(wx(e.x),wy(e.y-8+w),e.w,4);ctx.fillStyle='#f0f';ctx.fillRect(wx(e.x),wy(e.y-8+w),e.w*(e.hp===3?0.33:0.66),4);}}}
function drawBoss(){if(!boss)return;const t=Date.now(),w=Math.sin(t*0.015)*3;ctx.shadowColor=boss.rage?rgb(PINK):rgb(GEM);ctx.shadowBlur=boss.rage?30:15;ctx.fillStyle=boss.rage?rgb(PINK):rgb(GEM);ctx.fillRect(wx(boss.x),wy(boss.y+w),boss.w,boss.h);ctx.shadowBlur=0;ctx.fillStyle='white';ctx.beginPath();ctx.arc(wx(boss.x+20),wy(boss.y+24+w),9,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(wx(boss.x+50),wy(boss.y+24+w),9,0,Math.PI*2);ctx.fill();ctx.fillStyle=boss.rage?rgb(PINK):'#330';ctx.beginPath();ctx.arc(wx(boss.x+22),wy(boss.y+25+w),4,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(wx(boss.x+52),wy(boss.y+25+w),4,0,Math.PI*2);ctx.fill();ctx.fillStyle='#400';ctx.fillRect(wx(boss.x),wy(boss.y-14+w),boss.w,6);ctx.fillStyle=boss.rage?rgb(PINK):rgb(GEM);ctx.fillRect(wx(boss.x),wy(boss.y-14+w),boss.w*(boss.hp/boss.maxHp),6);if(boss.rage){ctx.fillStyle='rgba(255,100,200,0.9)';ctx.font='10px monospace';ctx.textAlign='center';ctx.fillText('DARK RAGE',wx(boss.x+boss.w/2),wy(boss.y-20+w));}}
function drawGems(){const t=Date.now();for(const g of gems){if(g.collected)continue;const sc=Math.abs(Math.sin(t*0.008))*0.3+0.7;ctx.save();ctx.translate(wx(g.x+g.w/2),wy(g.y+g.h/2));ctx.rotate(t*0.002);ctx.scale(sc,sc);ctx.shadowColor=rgb(GEM);ctx.shadowBlur=12;ctx.fillStyle=rgb(GEM);ctx.beginPath();ctx.moveTo(0,-8);ctx.lineTo(5,0);ctx.lineTo(0,8);ctx.lineTo(-5,0);ctx.closePath();ctx.fill();ctx.shadowBlur=0;ctx.restore();}}
function drawSpikes(){for(const s of spikes){ctx.fillStyle='#3a1a6a';ctx.beginPath();ctx.moveTo(wx(s.x),wy(s.y+s.h));ctx.lineTo(wx(s.x+s.w/2),wy(s.y));ctx.lineTo(wx(s.x+s.w),wy(s.y+s.h));ctx.fill();ctx.strokeStyle='#a78bfa';ctx.lineWidth=1;ctx.stroke();}}
function drawProjectiles(){for(const p of projectiles){ctx.fillStyle=rgb(p.c||GEM);ctx.shadowColor=ctx.fillStyle;ctx.shadowBlur=10;ctx.beginPath();ctx.moveTo(wx(p.x+5),wy(p.y));ctx.lineTo(wx(p.x+10),wy(p.y+5));ctx.lineTo(wx(p.x+5),wy(p.y+10));ctx.lineTo(wx(p.x),wy(p.y+5));ctx.closePath();ctx.fill();ctx.shadowBlur=0;}}
function drawExit(){if(!exitRect)return;ctx.shadowColor='#64ff64';ctx.shadowBlur=20;ctx.fillStyle=rgb(GREEN);ctx.fillRect(wx(exitRect.x),wy(exitRect.y),exitRect.w,exitRect.h);ctx.shadowBlur=0;ctx.fillStyle='white';ctx.font='10px monospace';ctx.textAlign='center';ctx.fillText('EXIT',wx(exitRect.x+20),wy(exitRect.y+24));}
function drawParticles(){for(let i=particles.length-1;i>=0;i--){const p=particles[i];ctx.fillStyle=`rgba(${p.color[0]},${p.color[1]},${p.color[2]},${p.life/55})`;ctx.beginPath();ctx.arc(wx(p.x),wy(p.y),3,0,Math.PI*2);ctx.fill();p.x+=p.vx;p.y+=p.vy;p.vy+=0.2;p.life--;if(p.life<=0)particles.splice(i,1);}}
function drawMenu(){menuGrad=(menuGrad||0)+0.008;for(let y=0;y<H;y++){const t=Math.sin(menuGrad+y*0.006)*0.5+0.5;ctx.fillStyle=`rgb(${10+t*10|0},${5+t*10|0},${25+t*50|0})`;ctx.fillRect(0,y,W,1);}ctx.font='bold 64px monospace';ctx.fillStyle='white';ctx.textAlign='center';ctx.fillText('The Blue Guy 3',W/2+2,192);ctx.shadowColor='#a78bfa';ctx.shadowBlur=20;ctx.fillStyle=`rgba(167,139,250,${0.8+Math.sin(Date.now()*0.005)*0.2})`;ctx.fillText('The Blue Guy 3',W/2,190);ctx.shadowBlur=0;ctx.font='22px monospace';ctx.fillStyle='rgba(255,255,255,0.5)';ctx.fillText('Dark World',W/2,238);const opts=['Start Game','Exit'];ctx.font='32px monospace';opts.forEach((o,i)=>{const sel=i===selectedOpt;ctx.fillStyle=sel?rgb(GEM):'white';ctx.fillText(o,W/2,340+i*60);if(sel)ctx.fillText('>',W/2-220,340+i*60);});ctx.font='14px monospace';ctx.fillStyle='rgba(255,255,255,0.4)';ctx.fillText('NEW: Teleport (X key) · Combo gems · Diamond projectiles · Dark bosses',W/2,570);ctx.fillText('WASD/Arrows: Move  ·  Space: Jump  ·  X: Teleport  ·  ESC: Menu',W/2,598);}
function drawIntro(){ctx.fillStyle='#050510';ctx.fillRect(0,0,W,H);const prog=introTimer/180;ctx.save();ctx.translate(W/2,H/2);const scale=0.5+prog*0.5;ctx.scale(scale,scale);ctx.rotate((introTimer*2)*Math.PI/180);ctx.font='bold 64px monospace';ctx.textAlign='center';if(gameCompleted){ctx.fillStyle=rgb(GEM);ctx.fillText('YOU WIN!',0,0);ctx.font='22px monospace';ctx.fillStyle='white';ctx.fillText('The Dark World is saved!',0,55);}else{ctx.fillStyle=rgb(GEM);ctx.shadowColor=rgb(GEM);ctx.shadowBlur=20;ctx.fillText('The Blue Guy 3',0,0);ctx.shadowBlur=0;}ctx.restore();if(introTimer%3===0)for(let i=0;i<2;i++)particles.push({x:W/2+camX,y:H/2+camY,vx:(Math.random()-0.5)*6,vy:(Math.random()-3)*3,life:60,color:GEM});drawParticles();}
document.addEventListener('keydown',e=>{if(state==='menu'){if(e.code==='ArrowUp')selectedOpt=(selectedOpt-1+2)%2;if(e.code==='ArrowDown')selectedOpt=(selectedOpt+1)%2;if(e.code==='Enter'){if(selectedOpt===0){loadLevel(0);state='playing';particles=[];}else document.title='Bye!';}}if(e.code==='Escape'){if(state==='playing'){state='intro';introTimer=0;gameCompleted=false;particles=[];}else state='menu';}});
function gameLoop(){requestAnimationFrame(gameLoop);if(state==='intro'){introTimer++;drawIntro();if(introTimer>180&&!gameCompleted){state='menu';particles=[];}return;}if(state==='menu'){drawMenu();return;}if(state==='playing'){updatePlayer();updateEnemies();updateBoss();updateProjectiles();checkCollisions();updateCamera();drawBg();drawPlatforms();drawExit();drawGems();drawSpikes();drawEnemies();drawBoss();drawProjectiles();drawParticles();drawPlayer();if(gameCompleted){ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(0,0,W,H);ctx.font='44px monospace';ctx.fillStyle=rgb(GEM);ctx.textAlign='center';ctx.fillText('Dark World Cleared!',W/2,H/2);ctx.font='22px monospace';ctx.fillStyle='white';ctx.fillText('Press ESC for menu',W/2,H/2+50);}}}
state='intro';introTimer=0;gameCompleted=false;loadLevel(0);gameLoop();
</script>
</body>
</html>
