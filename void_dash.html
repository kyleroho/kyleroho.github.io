<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VOID DASH — Pixel Forge Games</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;overflow:hidden;font-family:"Courier New",monospace;}
canvas{display:block;}
#ui{position:fixed;top:8px;left:0;right:0;display:flex;justify-content:center;gap:30px;font-size:13px;color:#aaa;pointer-events:none;}
#ui b{color:#fff;}
a{color:#ff3fa4;font-size:11px;text-decoration:none;pointer-events:all;}a:hover{color:#fff;}
</style>
</head>
<body>
<div id="ui">
  <span>SCORE <b id="sc">0</b></span>
  <span>BEST <b id="bs">0</b></span>
  <span>LIVES <b id="lv">3</b></span>
  <span>LEVEL <b id="lv2">1</b></span>
  <a href="index.html">Back</a>
</div>
<canvas id="c"></canvas>
<script>
const C=document.getElementById('c'),ctx=C.getContext('2d');
const W=600,H=700;C.width=W;C.height=H;

// Player
let px=W/2,py=H-80,pdx=0,pdy=0,pR=10,pInv=0,pTrail=[],pDash=0,pDashCD=0;
let lives=3,score=0,best=parseInt(localStorage.getItem('vd_best')||'0'),level=1,phase=0,dead=false,started=false;
let bullets=[],particles=[],stars=[],rings=[];
let keys={};

// Stars
for(let i=0;i<120;i++)stars.push({x:Math.random()*W,y:Math.random()*H,s:Math.random()*1.5+.3,spd:Math.random()*1+.3});

// Patterns
const PATTERNS=[
  // Spiral
  (t)=>{for(let i=0;i<6;i++){const a=t*.04+i/6*Math.PI*2;bullets.push({x:W/2,y:H/2,vx:Math.cos(a)*3,vy:Math.sin(a)*3,r:5,col:'#ff3fa4',life:200});}},
  // Rain
  ()=>{for(let i=0;i<3;i++)bullets.push({x:Math.random()*W,y:-10,vx:(Math.random()-.5),vy:2+level*.3,r:6,col:'#00fff5',life:300});},
  // Fan from sides
  (t)=>{if(t%60===0){const side=Math.random()<.5?0:W;for(let i=0;i<5;i++){const a=(-Math.PI/2)+((i-2)/4)*(Math.PI*.6)+(side?Math.PI:0);bullets.push({x:side,y:Math.random()*H*.6+50,vx:Math.cos(a)*4,vy:Math.sin(a)*4,r:7,col:'#ffe600',life:220});}}},
  // Aimed burst
  ()=>{const a=Math.atan2(py-H/3,px-W/2);for(let i=-2;i<=2;i++){const aa=a+i*.18;bullets.push({x:W/2,y:H/3,vx:Math.cos(aa)*4.5,vy:Math.sin(aa)*4.5,r:6,col:'#ff6600',life:200});}},
  // Ring expand
  ()=>{const n=12;for(let i=0;i<n;i++){const a=i/n*Math.PI*2;bullets.push({x:W/2,y:H/2,vx:Math.cos(a)*2.5,vy:Math.sin(a)*2.5,r:6,col:'#7fff00',life:250});}},
];

let phaseTick=0,patternIdx=0;

function spawnBullets(){
  phaseTick++;
  const rate=Math.max(8,30-level*2);
  if(phaseTick%rate===0){
    PATTERNS[patternIdx%PATTERNS.length](phaseTick);
    if(phaseTick%80===0)patternIdx++;
  }
  // Boss ring occasionally
  if(level>=3&&phaseTick%200===0)rings.push({x:W/2,y:H/2,r:20,maxR:300,spd:4,col:'#ff3fa4'});
}

function exhaust(){
  pTrail.push({x:px,y:py,a:1});
  if(pTrail.length>18)pTrail.shift();
}

function pEmit(col){
  for(let i=0;i<16;i++)particles.push({x:px,y:py,vx:(Math.random()-.5)*7,vy:(Math.random()-.5)*7,col,life:35,sz:3});
}

function update(){
  if(dead||!started)return;
  phase++;
  score++;
  if(score>best){best=score;localStorage.setItem('vd_best',best);}
  if(score%600===0)level=Math.min(10,level+1);

  // Stars
  stars.forEach(s=>{s.y+=s.spd;if(s.y>H)s.y=0;});

  // Move player
  const spd=pDash>0?14:3.8;
  if(keys['ArrowLeft']||keys['KeyA'])pdx=Math.max(-spd,pdx-.6);
  if(keys['ArrowRight']||keys['KeyD'])pdx=Math.min(spd,pdx+.6);
  if(keys['ArrowUp']||keys['KeyW'])pdy=Math.max(-spd,pdy-.6);
  if(keys['ArrowDown']||keys['KeyS'])pdy=Math.min(spd,pdy+.6);
  if(!(keys['ArrowLeft']||keys['KeyA'])&&!(keys['ArrowRight']||keys['KeyD']))pdx*=0.85;
  if(!(keys['ArrowUp']||keys['KeyW'])&&!(keys['ArrowDown']||keys['KeyS']))pdy*=0.85;
  px=Math.max(pR,Math.min(W-pR,px+pdx));
  py=Math.max(pR,Math.min(H-pR,py+pdy));
  if(pDash>0)pDash--;
  if(pDashCD>0)pDashCD--;
  exhaust();

  // Bullets
  spawnBullets();
  bullets=bullets.filter(b=>b.life>0);
  bullets.forEach(b=>{b.x+=b.vx;b.y+=b.vy;b.life--;});

  // Rings
  rings=rings.filter(r=>r.r<r.maxR);
  rings.forEach(r=>r.r+=r.spd);

  // Collide
  if(pInv===0){
    bullets.forEach(b=>{
      if(Math.hypot(b.x-px,b.y-py)<b.r+pR-3){
        b.life=0;hit();
      }
    });
    rings.forEach(r=>{
      const d=Math.hypot(r.x-px,r.y-py);
      if(Math.abs(d-r.r)<pR+3)hit();
    });
  }
  if(pInv>0)pInv--;

  // Particles
  particles=particles.filter(p=>p.life>0);
  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vx*=.92;p.vy*=.92;p.life-=2;});

  document.getElementById('sc').textContent=score;
  document.getElementById('bs').textContent=best;
  document.getElementById('lv').textContent=lives;
  document.getElementById('lv2').textContent=level;
}

function hit(){
  if(pInv>0||dead)return;
  pInv=90;lives--;pEmit('#ff3fa4');
  if(lives<=0){dead=true;pEmit('#fff');pEmit('#ff3fa4');}
}

function draw(){
  ctx.fillStyle='#020008';ctx.fillRect(0,0,W,H);

  // Stars
  stars.forEach(s=>{ctx.fillStyle=`rgba(255,255,255,${s.s*.5})`;ctx.fillRect(s.x,s.y,s.s,s.s);});

  // Rings
  rings.forEach(r=>{
    ctx.strokeStyle=r.col;ctx.lineWidth=3;
    ctx.globalAlpha=Math.max(0,1-r.r/r.maxR);
    ctx.beginPath();ctx.arc(r.x,r.y,r.r,0,Math.PI*2);ctx.stroke();
    ctx.globalAlpha=1;
  });

  // Bullets
  bullets.forEach(b=>{
    ctx.shadowColor=b.col;ctx.shadowBlur=10;
    ctx.fillStyle=b.col;ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.fill();
  });
  ctx.shadowBlur=0;

  // Particles
  particles.forEach(p=>{
    ctx.globalAlpha=p.life/35;ctx.fillStyle=p.col;
    ctx.beginPath();ctx.arc(p.x,p.y,p.sz,0,Math.PI*2);ctx.fill();
  });ctx.globalAlpha=1;

  // Player trail
  pTrail.forEach((t,i)=>{
    const a=(i/pTrail.length)*.5;
    ctx.fillStyle=pDash>0?`rgba(255,100,0,${a})`:`rgba(180,0,255,${a})`;
    ctx.beginPath();ctx.arc(t.x,t.y,(i/pTrail.length)*pR*.7,0,Math.PI*2);ctx.fill();
  });

  // Player
  if(!dead&&(pInv===0||Math.floor(pInv/5)%2===0)){
    ctx.shadowColor=pDash>0?'#ff8800':'#cc00ff';ctx.shadowBlur=25;
    ctx.fillStyle=pDash>0?'#ffaa00':'#dd00ff';
    ctx.beginPath();ctx.arc(px,py,pR,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;
    ctx.fillStyle='rgba(255,255,255,.8)';ctx.beginPath();ctx.arc(px-3,py-3,3,0,Math.PI*2);ctx.fill();
  }

  // Dash meter
  const dashPct=1-pDashCD/60;
  ctx.fillStyle='rgba(0,0,0,.5)';ctx.fillRect(10,H-22,100,10);
  ctx.fillStyle=dashPct>=1?'#cc00ff':'#553388';ctx.fillRect(10,H-22,100*dashPct,10);
  ctx.fillStyle='#cc00ff';ctx.font='9px monospace';ctx.textAlign='left';ctx.fillText('DASH [SPACE]',10,H-26);

  if(!started){drawScreen('VOID DASH','DODGE EVERYTHING\n\nARROWS / WASD = Move\nSPACE = Dash through bullets\n\nPRESS SPACE TO START','#cc00ff');}
  else if(dead){drawScreen('DEAD','Score: '+score+'\nBest: '+best+'\n\nPRESS SPACE TO RETRY','#ff3fa4');}
}

function drawScreen(title,sub,col){
  ctx.fillStyle='rgba(0,0,0,.75)';ctx.fillRect(0,0,W,H);
  ctx.shadowColor=col;ctx.shadowBlur=40;
  ctx.fillStyle=col;ctx.font='bold 60px monospace';ctx.textAlign='center';ctx.fillText(title,W/2,H/2-80);
  ctx.shadowBlur=0;ctx.fillStyle='#aaa';ctx.font='16px monospace';
  sub.split('\n').forEach((line,i)=>ctx.fillText(line,W/2,H/2+i*28));
}

function loop(){update();draw();requestAnimationFrame(loop);}

document.addEventListener('keydown',e=>{
  keys[e.code]=true;
  if(e.code==='Space'){
    e.preventDefault();
    if(!started){started=true;return;}
    if(dead){dead=false;lives=3;score=0;level=1;bullets=[];rings=[];particles=[];pTrail=[];pDash=0;pDashCD=0;pInv=0;px=W/2;py=H-80;pdx=0;pdy=0;return;}
    if(pDashCD===0){pDash=12;pDashCD=60;pInv=12;pEmit('#8800ff');}
  }
});
document.addEventListener('keyup',e=>keys[e.code]=false);
loop();
</script>
</body>
</html>
