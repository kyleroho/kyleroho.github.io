<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pixel Drift 2 — Pixel Forge Games</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:'Press Start 2P', "Courier New", Courier, monospace,monospace;color:#00fff5;overflow:hidden;}
#wrapper{position:relative;display:inline-block;}
canvas{display:block;border:2px solid #00fff5;box-shadow:0 0 40px rgba(0,255,245,0.4),0 0 80px rgba(0,255,245,0.15);image-rendering:pixelated;}
#hud{display:flex;gap:32px;margin-bottom:10px;font-size:10px;color:#00fff5;flex-wrap:wrap;justify-content:center;}
#hud span{padding:4px 10px;border:1px solid rgba(0,255,245,.3);background:rgba(0,0,0,.5);}
#hud .red{color:#ff1744;border-color:rgba(255,23,68,.3);}
#hud .gold{color:#ffe100;border-color:rgba(255,225,0,.3);}
#hud .purple{color:#d500f9;border-color:rgba(213,0,249,.3);}
#instructions{margin-top:10px;font-size:7px;color:#334;text-align:center;line-height:2.2;}
#instructions a{color:#00fff5;}
#upgrade-panel{display:none;position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.92);color:#00fff5;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:10;}
#upgrade-panel.show{display:flex;}
#upgrade-panel h2{font-size:18px;color:#ffe100;text-shadow:0 0 20px rgba(255,225,0,.5);}
#upgrade-panel p{font-size:8px;color:#667;letter-spacing:2px;}
.upg-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;max-width:700px;width:90%;}
.upg-btn{padding:16px 10px;border:2px solid #00fff5;background:rgba(0,255,245,.05);cursor:pointer;text-align:center;transition:all .15s;font-family:'Press Start 2P', "Courier New", Courier, monospace,monospace;}
.upg-btn:hover{background:rgba(0,255,245,.15);transform:translateY(-2px);box-shadow:0 4px 0 rgba(0,255,245,.3);}
.upg-btn.maxed{border-color:#555;color:#555;cursor:default;}
.upg-btn:hover.maxed{transform:none;box-shadow:none;background:rgba(0,255,245,.02);}
.upg-title{font-size:9px;color:#ffe100;margin-bottom:6px;}
.upg-desc{font-size:6px;color:#889;line-height:1.8;margin-bottom:8px;}
.upg-cost{font-size:8px;color:#00fff5;}
#skip-btn{font-family:'Press Start 2P', "Courier New", Courier, monospace,monospace;font-size:8px;padding:10px 20px;background:transparent;border:1px solid #444;color:#666;cursor:pointer;}
#skip-btn:hover{border-color:#00fff5;color:#00fff5;}
</style>
</head>
<body>
<div id="hud">
  <span>SCORE: <span id="score">0</span></span>
  <span class="red">LIVES: <span id="lives">3</span> ❤️</span>
  <span>WAVE: <span id="wave">1</span></span>
  <span class="gold">COINS: <span id="coins">0</span></span>
  <span class="purple">SHIELD: <span id="shield">0</span>%</span>
</div>
<div id="wrapper">
  <canvas id="c" width="900" height="620"></canvas>
  <div id="upgrade-panel">
    <h2>⚡ WAVE COMPLETE!</h2>
    <p>CHOOSE AN UPGRADE</p>
    <div class="upg-grid" id="upg-grid"></div>
    <button id="skip-btn" onclick="skipUpgrade()">SKIP →</button>
  </div>
</div>
<div id="instructions">
  ARROWS / WASD — MOVE &nbsp;·&nbsp; SPACE — SHOOT &nbsp;·&nbsp; SHIFT — BOOST &nbsp;·&nbsp; Z — BOMB (if owned)
  <br><a href="index.html">← BACK TO PIXEL FORGE GAMES</a>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;
const W=900, H=620;

// ── STATE ──
let score=0, lives=3, waveNum=1, coins=0, dead=false, started=false;
let inUpgrade=false, invincible=0, bossActive=false;
let screenShake=0;

// Upgrades
const upgrades = {
  fireRate: {level:0, max:4, name:'FIRE RATE', desc:'Shoot faster', cost:[80,160,280,450], icon:'🔥'},
  spread:   {level:0, max:3, name:'SPREAD SHOT', desc:'More bullets per shot', cost:[100,220,400], icon:'💥'},
  shield:   {level:0, max:3, name:'SHIELD', desc:'Absorbs 1 hit (regenerates)', cost:[120,240,400], icon:'🛡️'},
  speed:    {level:0, max:3, name:'ENGINE', desc:'Move faster', cost:[60,140,260], icon:'⚡'},
  bombs:    {level:0, max:2, name:'BOMBS', desc:'Z key = screen nuke', cost:[150,300], icon:'💣'},
  multishot:{level:0, max:2, name:'MULTISHOT', desc:'Side cannons added', cost:[180,350], icon:'🎯'},
};
let bombCount=0, shieldHP=0, maxShield=0;

const ship={x:W/2,y:H-60,vx:0,vy:0,invincible:0};
const bullets=[];
const asteroids=[];
const particles=[];
const powerdrops=[];
let shootCooldown=0;
const keys={};
let waveAsteroidCount=0, waveAsteroidsLeft=0, bossHP=0, maxBossHP=0;
let boss=null;

// ── INPUT ──
window.addEventListener('keydown',e=>{
  keys[e.code]=true;
  if(!started&&(e.code==='Space'||e.code.startsWith('Arrow')||e.code==='KeyW')){started=true;startWave();}
  if(e.code==='Space'&&!dead&&!inUpgrade) shoot();
  if(e.code==='KeyZ'&&bombCount>0&&started&&!dead&&!inUpgrade) useBomb();
  e.preventDefault();
});
window.addEventListener('keyup',e=>{keys[e.code]=false;});

// ── WAVE SYSTEM ──
function startWave(){
  waveJustStarted=80;
  asteroids.length=0;
  bullets.length=0;
  powerdrops.length=0;
  boss=null; bossActive=false;
  waveAsteroidCount = 5 + waveNum * 3;
  waveAsteroidsLeft = waveAsteroidCount;
  // Boss every 5 waves
  if(waveNum%5===0){
    spawnBoss();
    waveAsteroidsLeft=0;
  } else {
    for(let i=0;i<Math.min(waveAsteroidCount,8);i++) spawnAsteroid();
  }
}

function spawnAsteroid(x,y,r,speed){
  const edge=Math.floor(Math.random()*4);
  let ax,ay;
  if(x!==undefined){ax=x;ay=y;}
  else{
    ax=edge===0?Math.random()*W:edge===1?W+20:Math.random()*W;
    ay=edge===0?-20:edge===1?Math.random()*H:edge===2?H+20:Math.random()*H;
  }
  const sz=(r||20)+Math.random()*(r?0:18);
  const spd=(speed||0.8)+Math.random()*1.2+(waveNum*0.12);
  const angle=Math.atan2(H/2-ay,W/2-ax)+( Math.random()-.5)*1.2;
  const hp=sz>30?3:sz>22?2:1;
  asteroids.push({x:ax,y:ay,vx:Math.cos(angle)*spd,vy:Math.sin(angle)*spd,r:sz,ang:Math.random()*6.28,av:(Math.random()-.5)*.05,hp,maxHp:hp,shape:genShape(sz)});
}

function genShape(r){
  const pts=[];
  const n=7+Math.floor(Math.random()*4);
  for(let i=0;i<n;i++){pts.push(r*(.65+Math.random()*.35));}
  return pts;
}

function spawnBoss(){
  bossActive=true;
  maxBossHP=30+waveNum*8;
  bossHP=maxBossHP;
  boss={x:W/2,y:-60,vy:1.2,vx:0,phase:0,shootTimer:0,r:55,ang:0};
}

// ── SHOOT ──
function getFireRate(){return Math.max(4, 14-upgrades.fireRate.level*2.5);}
function shoot(){
  if(shootCooldown>0) return;
  const baseCost=getFireRate();
  shootCooldown=baseCost;
  const spread=upgrades.spread.level;
  const multi=upgrades.multishot.level;
  // Main shot
  addBullet(ship.x, ship.y-14, 0, -10);
  if(spread>=1){addBullet(ship.x-8, ship.y-10, -0.8, -9.5);addBullet(ship.x+8, ship.y-10, 0.8, -9.5);}
  if(spread>=2){addBullet(ship.x-16, ship.y-8, -1.8, -9);addBullet(ship.x+16, ship.y-8, 1.8, -9);}
  if(spread>=3){addBullet(ship.x, ship.y-12, -0.4, -10);addBullet(ship.x, ship.y-12, 0.4, -10);}
  if(multi>=1){addBullet(ship.x-22, ship.y, -8, -3);addBullet(ship.x+22, ship.y, 8, -3);}
  if(multi>=2){addBullet(ship.x-28, ship.y+5, -9, 0);addBullet(ship.x+28, ship.y+5, 9, 0);}
}
function addBullet(x,y,vx,vy){bullets.push({x,y,vx,vy,life:90});}

function useBomb(){
  bombCount--;
  screenShake=20;
  // Destroy all asteroids
  [...asteroids].forEach(a=>{
    for(let i=0;i<8;i++) spawnParticle(a.x,a.y,'#ff6d00',8);
    score+=50;coins+=10;
  });
  asteroids.length=0;
  if(boss) bossHP=Math.max(1,bossHP-40);
  updateHUD();
  for(let i=0;i<60;i++) spawnParticle(Math.random()*W, Math.random()*H, `hsl(${Math.random()*360},100%,70%)`, 10);
}

// ── PARTICLES ──
function spawnParticle(x,y,color,count){
  for(let i=0;i<(count||5);i++){
    particles.push({x,y,vx:(Math.random()-.5)*5,vy:(Math.random()-.5)*5,color,life:30+Math.random()*20,size:2+Math.random()*3});
  }
}

// ── POWER DROPS ──
const DROPS=['shield','bomb','coin5','life'];
function spawnDrop(x,y){
  if(Math.random()>.35) return;
  const t=DROPS[Math.floor(Math.random()*DROPS.length)];
  powerdrops.push({x,y,t,life:240,bob:Math.random()*Math.PI*2});
}

// ── UPDATE ──
function update(){
  if(dead||inUpgrade||!started) return;
  shootCooldown=Math.max(0,shootCooldown-1);
  if(invincible>0) invincible--;
  if(screenShake>0) screenShake--;

  // Ship movement
  const spd=2.8+(upgrades.speed.level*0.8);
  const boost=(keys['ShiftLeft']||keys['ShiftRight'])?1.6:1;
  if(keys['ArrowLeft']||keys['KeyA']){ship.vx-=0.3;} 
  if(keys['ArrowRight']||keys['KeyD']){ship.vx+=0.3;}
  if(keys['ArrowUp']||keys['KeyW']){ship.vy-=0.3;}
  if(keys['ArrowDown']||keys['KeyS']){ship.vy+=0.3;}
  ship.vx*=0.88; ship.vy*=0.88;
  ship.vx=Math.max(-spd*boost,Math.min(spd*boost,ship.vx));
  ship.vy=Math.max(-spd*boost,Math.min(spd*boost,ship.vy));
  ship.x=Math.max(14,Math.min(W-14,ship.x+ship.vx));
  ship.y=Math.max(14,Math.min(H-14,ship.y+ship.vy));

  // Bullets
  for(let i=bullets.length-1;i>=0;i--){
    const b=bullets[i];
    b.x+=b.vx; b.y+=b.vy; b.life--;
    if(b.life<=0||b.x<-10||b.x>W+10||b.y<-10||b.y>H+10){bullets.splice(i,1);}
  }

  // Asteroids
  for(let i=asteroids.length-1;i>=0;i--){
    const a=asteroids[i];
    a.x+=a.vx; a.y+=a.vy; a.ang+=a.av;
    // Wrap
    if(a.x<-a.r-20) a.x=W+a.r; if(a.x>W+a.r+20) a.x=-a.r;
    if(a.y<-a.r-20) a.y=H+a.r; if(a.y>H+a.r+20) a.y=-a.r;

    // Bullet collision
    for(let j=bullets.length-1;j>=0;j--){
      const b=bullets[j];
      const dx=b.x-a.x, dy=b.y-a.y;
      if(dx*dx+dy*dy<a.r*a.r){
        bullets.splice(j,1);
        a.hp--;
        spawnParticle(b.x,b.y,'#ff6d00',3);
        if(a.hp<=0){
          score+=Math.floor(a.r*2)+waveNum*5;
          coins+=Math.floor(a.r/10)+1;
          spawnParticle(a.x,a.y,'#ff6d00',10);
          spawnDrop(a.x,a.y);
          // Split large ones
          if(a.r>24){
            spawnAsteroid(a.x-15,a.y-15,a.r*.55,a.r*.07);
            spawnAsteroid(a.x+15,a.y+15,a.r*.55,a.r*.07);
          }
          asteroids.splice(i,1);
          waveAsteroidsLeft--;
          // Spawn more if wave not done
          if(waveAsteroidsLeft>0 && asteroids.length<10) spawnAsteroid();
          updateHUD();
          break;
        }
      }
    }

    // Ship collision
    if(invincible<=0){
      const dx=ship.x-a.x, dy=ship.y-a.y;
      if(dx*dx+dy*dy<(a.r+10)*(a.r+10)){
        hitShip();
        break;
      }
    }
  }

  // Boss
  if(boss){
    boss.ang+=0.02;
    if(boss.y<120) boss.y+=boss.vy;
    else{
      boss.x+=Math.sin(boss.ang*1.5)*2.5;
      boss.phase++;
      boss.shootTimer--;
      if(boss.shootTimer<=0){
        boss.shootTimer=40-Math.min(30,waveNum*3);
        // Boss shoots at player
        const angle=Math.atan2(ship.y-boss.y,ship.x-boss.x);
        const spd2=3+waveNum*.3;
        const nShots=2+Math.floor(waveNum/3);
        for(let s=0;s<nShots;s++){
          const ang2=angle+(s-(nShots-1)/2)*.25;
          asteroids.push({x:boss.x+Math.cos(ang2)*60,y:boss.y+Math.sin(ang2)*60,vx:Math.cos(ang2)*spd2,vy:Math.sin(ang2)*spd2,r:8,ang:0,av:.08,hp:1,maxHp:1,shape:genShape(8),isBossShot:true});
        }
      }
    }
    // Boss bullet hit
    for(let j=bullets.length-1;j>=0;j--){
      const b=bullets[j];
      const dx=b.x-boss.x, dy=b.y-boss.y;
      if(dx*dx+dy*dy<boss.r*boss.r){
        bullets.splice(j,1);
        bossHP--;
        spawnParticle(b.x,b.y,'#d500f9',4);
        screenShake=3;
        if(bossHP<=0){
          // Boss dead
          spawnParticle(boss.x,boss.y,'#ff1744',40);
          for(let k=0;k<6;k++) spawnDrop(boss.x+(Math.random()-.5)*80,boss.y+(Math.random()-.5)*60);
          score+=500+waveNum*100;
          coins+=50;
          boss=null; bossActive=false;
          screenShake=20;
          endWave();
        }
      }
    }
    // Boss ship collision
    if(boss&&invincible<=0){
      const dx=ship.x-boss.x, dy=ship.y-boss.y;
      if(dx*dx+dy*dy<(boss.r+12)*(boss.r+12)) hitShip();
    }
  }

  // Wave done check
  if(!bossActive && waveAsteroidsLeft<=0 && asteroids.length===0 && started && !dead){
    endWave();
  }

  // Power drops
  for(let i=powerdrops.length-1;i>=0;i--){
    const p=powerdrops[i];
    p.bob+=0.08; p.life--;
    if(p.life<=0){powerdrops.splice(i,1);continue;}
    const dx=ship.x-p.x, dy=ship.y-p.y;
    if(dx*dx+dy*dy<24*24){
      if(p.t==='shield'){shieldHP=Math.max(shieldHP,1); maxShield=Math.max(maxShield,1);}
      else if(p.t==='bomb'){bombCount=Math.min(bombCount+1,9);}
      else if(p.t==='coin5'){coins+=5;}
      else if(p.t==='life'){lives=Math.min(lives+1,5);}
      spawnParticle(p.x,p.y,'#ffe100',8);
      powerdrops.splice(i,1);
      updateHUD();
    }
  }

  // Particles
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx; p.y+=p.vy; p.vx*=.92; p.vy*=.92; p.life--;
    if(p.life<=0) particles.splice(i,1);
  }

  // Continuous shooting
  if(keys['Space']&&!dead&&!inUpgrade) shoot();
  
  updateHUD();
}

let lastWaveEnd = -999;
function endWave(){
  if(inUpgrade) return;
  if(Date.now()-lastWaveEnd<500) return;
  lastWaveEnd=Date.now();
  waveNum++;
  inUpgrade=true;
  showUpgradePanel();
  updateHUD();
}

function hitShip(){
  if(invincible>0) return;
  if(shieldHP>0){
    shieldHP--;
    invincible=80;
    screenShake=10;
    spawnParticle(ship.x,ship.y,'#00fff5',12);
    updateHUD();
    return;
  }
  lives--;
  invincible=120;
  screenShake=15;
  spawnParticle(ship.x,ship.y,'#ff1744',20);
  updateHUD();
  if(lives<=0) gameover();
}

function gameover(){
  dead=true;
}

// ── UPGRADE PANEL ──
function showUpgradePanel(){
  const panel=document.getElementById('upgrade-panel');
  panel.classList.add('show');
  const grid=document.getElementById('upg-grid');
  grid.innerHTML='';
  // Show 3 random upgrades
  const avail=Object.entries(upgrades).filter(([k,v])=>v.level<v.max);
  const shown=avail.sort(()=>Math.random()-.5).slice(0,3);
  shown.forEach(([k,v])=>{
    const cost=v.cost[v.level];
    const canAfford=coins>=cost;
    const div=document.createElement('div');
    div.className='upg-btn'+(canAfford?'':' maxed');
    div.innerHTML=`<div class="upg-title">${v.icon} ${v.name}</div><div class="upg-desc">${v.desc}<br>Level ${v.level+1}/${v.max}</div><div class="upg-cost">${canAfford?cost+' coins':'NOT ENOUGH COINS'}</div>`;
    if(canAfford){
      div.onclick=()=>{
        coins-=cost;
        v.level++;
        // Apply effects
        if(k==='shield'){maxShield=v.level*2;shieldHP=Math.min(shieldHP+1,maxShield);}
        if(k==='bombs'){bombCount+=2;}
        closeUpgrade();
      };
    }
    grid.appendChild(div);
  });
  if(shown.length===0){
    grid.innerHTML='<div style="grid-column:1/-1;text-align:center;color:#555;font-size:8px;padding:20px;">ALL UPGRADES MAXED!</div>';
  }
}

function skipUpgrade(){closeUpgrade();}
function closeUpgrade(){
  document.getElementById('upgrade-panel').classList.remove('show');
  inUpgrade=false;
  startWave();
}

// ── HUD ──
function updateHUD(){
  document.getElementById('score').textContent=score.toLocaleString();
  document.getElementById('lives').textContent=lives;
  document.getElementById('wave').textContent=waveNum;
  document.getElementById('coins').textContent=coins;
  document.getElementById('shield').textContent=maxShield>0?Math.round(shieldHP/maxShield*100):0;
}

// ── DRAW ──
function draw(){
  const shk=screenShake>0?Math.floor((Math.random()-.5)*screenShake):0;
  ctx.save();
  if(screenShake>0) ctx.translate(shk,shk);

  // Background
  ctx.fillStyle='#000508';
  ctx.fillRect(-20,-20,W+40,H+40);

  // Stars
  ctx.fillStyle='rgba(0,255,245,.15)';
  for(let i=0;i<40;i++){
    const sx=((i*173)%W+W)%W, sy=((i*71)%H+H)%H;
    ctx.fillRect(sx,sy,i%3===0?2:1,i%3===0?2:1);
  }

  // Grid lines
  ctx.strokeStyle='rgba(0,255,245,.04)';ctx.lineWidth=1;
  for(let x=0;x<W;x+=80){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<H;y+=80){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}

  // Power drops
  powerdrops.forEach(p=>{
    const icons={'shield':'🛡️','bomb':'💣','coin5':'💰','life':'❤️'};
    const bob=Math.sin(p.bob)*5;
    ctx.globalAlpha=Math.min(1,p.life/30);
    ctx.shadowColor='#ffe100'; ctx.shadowBlur=12;
    ctx.font='18px serif'; ctx.textAlign='center';
    ctx.fillText(icons[p.t], p.x, p.y+bob+6);
    ctx.shadowBlur=0; ctx.globalAlpha=1;
  });

  // Particles
  particles.forEach(p=>{
    ctx.globalAlpha=Math.max(0,p.life/40);
    ctx.fillStyle=p.color;
    ctx.shadowColor=p.color; ctx.shadowBlur=6;
    ctx.fillRect(p.x-p.size/2,p.y-p.size/2,p.size,p.size);
    ctx.shadowBlur=0;
  });
  ctx.globalAlpha=1;

  // Asteroids
  asteroids.forEach(a=>{
    ctx.save();ctx.translate(a.x,a.y);ctx.rotate(a.ang);
    const hpFrac=a.hp/a.maxHp;
    const col=a.isBossShot?'#d500f9':hpFrac>.5?'#00fff5':'#ff6d00';
    ctx.fillStyle=a.isBossShot?'#200030':'#051010';
    ctx.strokeStyle=col; ctx.lineWidth=1.5;
    ctx.shadowColor=col; ctx.shadowBlur=8;
    ctx.beginPath();
    const n=a.shape.length;
    for(let i=0;i<=n;i++){
      const r=a.shape[i%n];
      const ang=i/n*Math.PI*2;
      i===0?ctx.moveTo(Math.cos(ang)*r,Math.sin(ang)*r):ctx.lineTo(Math.cos(ang)*r,Math.sin(ang)*r);
    }
    ctx.closePath(); ctx.fill(); ctx.stroke();
    ctx.shadowBlur=0;
    // HP bar for big ones
    if(a.maxHp>1){
      const bw=a.r*2; ctx.fillStyle='#111';ctx.fillRect(-a.r,-a.r-10,bw,5);
      ctx.fillStyle=hpFrac>.5?'#39ff14':'#ff1744';
      ctx.fillRect(-a.r,-a.r-10,bw*hpFrac,5);
    }
    ctx.restore();
  });

  // Boss
  if(boss){
    ctx.save();ctx.translate(boss.x,boss.y);ctx.rotate(boss.ang);
    const bFrac=bossHP/maxBossHP;
    ctx.shadowColor='#d500f9'; ctx.shadowBlur=30+Math.sin(boss.ang*3)*10;
    // Body
    ctx.fillStyle='#1a0030'; ctx.strokeStyle='#d500f9'; ctx.lineWidth=3;
    ctx.beginPath();
    for(let i=0;i<12;i++){
      const ang=i/12*Math.PI*2;
      const r=boss.r*(0.7+Math.sin(i*2.1+boss.ang*5)*.3);
      i===0?ctx.moveTo(Math.cos(ang)*r,Math.sin(ang)*r):ctx.lineTo(Math.cos(ang)*r,Math.sin(ang)*r);
    }
    ctx.closePath(); ctx.fill(); ctx.stroke();
    // Eye
    ctx.fillStyle='#d500f9'; ctx.beginPath();ctx.arc(0,0,18,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#000'; ctx.beginPath();ctx.arc(0,0,10,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#d500f9'; ctx.beginPath();ctx.arc(5,-5,4,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0; ctx.restore();
    // Boss HP bar
    const bw=200;
    ctx.fillStyle='#111'; ctx.fillRect(W/2-bw/2,8,bw,14);
    ctx.fillStyle=bFrac>.5?'#d500f9':'#ff1744';
    ctx.fillRect(W/2-bw/2,8,bw*bFrac,14);
    ctx.strokeStyle='#d500f9'; ctx.lineWidth=1.5;
    ctx.strokeRect(W/2-bw/2,8,bw,14);
    ctx.fillStyle='#fff'; ctx.font='7px monospace'; ctx.textAlign='center';
    ctx.fillText(`BOSS — ${bossHP}/${maxBossHP}`, W/2, 19);
  }

  // Bullets
  bullets.forEach(b=>{
    ctx.fillStyle='#ffe100'; ctx.shadowColor='#ffe100'; ctx.shadowBlur=8;
    ctx.fillRect(b.x-2,b.y-6,4,12);
    ctx.shadowBlur=0;
  });

  // Ship
  if(!dead){
    const flash=invincible>0&&Math.floor(invincible/4)%2===1;
    if(!flash){
      ctx.save(); ctx.translate(ship.x,ship.y);
      ctx.shadowColor='#00fff5'; ctx.shadowBlur=20;
      // Engine glow
      if(keys['ShiftLeft']||keys['ShiftRight']||keys['ArrowUp']||keys['KeyW']){
        ctx.fillStyle='rgba(0,255,245,.4)';
        ctx.beginPath();ctx.moveTo(-10,12);ctx.lineTo(10,12);ctx.lineTo(0,30+Math.random()*10);ctx.closePath();ctx.fill();
      }
      ctx.fillStyle='#00fff5';
      ctx.beginPath();ctx.moveTo(0,-18);ctx.lineTo(13,14);ctx.lineTo(-13,14);ctx.closePath();ctx.fill();
      // Cockpit
      ctx.fillStyle='#ffe100'; ctx.fillRect(-5,-8,10,10);
      // Wing accents
      ctx.fillStyle='rgba(0,200,210,.6)';
      ctx.beginPath();ctx.moveTo(13,14);ctx.lineTo(22,14);ctx.lineTo(15,22);ctx.closePath();ctx.fill();
      ctx.beginPath();ctx.moveTo(-13,14);ctx.lineTo(-22,14);ctx.lineTo(-15,22);ctx.closePath();ctx.fill();
      // Side cannons
      if(upgrades.multishot.level>=1){
        ctx.fillStyle='#888';
        ctx.fillRect(-26,-2,6,14); ctx.fillRect(20,-2,6,14);
      }
      // Shield ring
      if(shieldHP>0){
        ctx.strokeStyle='rgba(0,255,245,.6)'; ctx.lineWidth=2.5;
        ctx.shadowColor='#00fff5'; ctx.shadowBlur=15;
        ctx.beginPath();ctx.arc(0,0,26,0,Math.PI*2);ctx.stroke();
        ctx.shadowBlur=0;
      }
      ctx.shadowBlur=0; ctx.restore();
    }
  }

  // UI overlays
  if(!started){
    ctx.fillStyle='rgba(0,0,0,.7)'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#00fff5'; ctx.font='20px monospace'; ctx.textAlign='center';
    ctx.fillText('PIXEL DRIFT 2',W/2,H/2-60);
    ctx.fillStyle='#ffe100'; ctx.font='10px monospace';
    ctx.fillText('PRESS SPACE OR ARROW KEYS TO START',W/2,H/2-20);
    ctx.fillStyle='#667'; ctx.font='8px monospace';
    ctx.fillText('SPACE=SHOOT · SHIFT=BOOST · Z=BOMB',W/2,H/2+20);
    ctx.fillText('COLLECT COINS TO BUY UPGRADES BETWEEN WAVES',W/2,H/2+44);
  }

  if(dead){
    ctx.fillStyle='rgba(0,0,0,.85)'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#ff1744'; ctx.font='24px monospace'; ctx.textAlign='center';
    ctx.fillText('GAME OVER',W/2,H/2-50);
    ctx.fillStyle='#ffe100'; ctx.font='11px monospace';
    ctx.fillText('SCORE: '+score.toLocaleString(),W/2,H/2-10);
    ctx.fillText('WAVE: '+waveNum,W/2,H/2+20);
    ctx.fillStyle='#00fff5'; ctx.font='9px monospace';
    ctx.fillText('PRESS F5 TO RETRY',W/2,H/2+55);
  }

  // Wave announcement
  if(waveJustStarted>0){
    waveJustStarted--;
    ctx.globalAlpha=Math.min(1,waveJustStarted/20);
    ctx.fillStyle=bossActive?'#d500f9':'#ffe100';
    ctx.font='18px monospace'; ctx.textAlign='center';
    ctx.fillText(bossActive?`⚠️ BOSS WAVE!`:`WAVE ${waveNum}`,W/2,H/2);
    ctx.globalAlpha=1;
  }

  // Bomb count
  if(bombCount>0){
    ctx.fillStyle='rgba(0,0,0,.5)'; ctx.fillRect(6,H-24,60,18);
    ctx.fillStyle='#ffe100'; ctx.font='8px monospace'; ctx.textAlign='left';
    ctx.fillText(`BOMBS: ${bombCount}`,10,H-10);
  }

  ctx.restore();
}

let waveJustStarted=0;

// ── LOOP ──
function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

updateHUD();
loop();
</script>
</body>
</html>
