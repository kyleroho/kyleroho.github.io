<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Sound Balls</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #111; overflow: hidden; color: white; font-family: 'Courier New', monospace; touch-action: none; }
#ui {
  position: fixed; top: 0; left: 0; right: 0; z-index: 10;
  background: rgba(0,0,0,0.75); display: flex; align-items: center;
  gap: 10px; padding: 8px 12px; flex-wrap: wrap;
  border-bottom: 1px solid rgba(105,255,148,0.2);
}
.stat { color: #69ff94; font-size: 12px; font-weight: bold; white-space: nowrap; }
.stat span { color: #ffd700; }
#shop-btn { background: #ffd700; color: #000; border: none; padding: 5px 12px;
  font-family:'Courier New',monospace; font-weight:bold; font-size:12px; cursor:pointer;
  border-radius:3px; margin-left:auto; letter-spacing:1px; }
#shop-btn:hover { background:#fff; }
#clear-btn { background:#ff4444; color:#fff; border:none; padding:5px 10px;
  font-family:'Courier New',monospace; font-weight:bold; font-size:12px;
  cursor:pointer; border-radius:3px; letter-spacing:1px; }
#hint { position:fixed; bottom:12px; left:50%; transform:translateX(-50%);
  color:rgba(255,255,255,0.3); font-size:12px; pointer-events:none; text-align:center; }
#shop { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.88);
  z-index:100; align-items:center; justify-content:center; }
#shop.open { display:flex; }
#shop-box { background:#0a0a12; border:2px solid #4fc3f7; padding:22px;
  max-width:500px; width:95%; max-height:90vh; overflow-y:auto; }
#shop h2 { color:#ffd700; font-size:18px; letter-spacing:3px; margin-bottom:4px; text-align:center; }
.coins-disp { color:#69ff94; text-align:center; margin-bottom:14px; font-size:13px; }
.upg-item { display:flex; align-items:center; justify-content:space-between;
  border:1px solid rgba(255,255,255,0.1); padding:10px 12px; margin-bottom:7px;
  background:rgba(255,255,255,0.03); }
.upg-info { flex:1; }
.upg-name { color:#4fc3f7; font-size:13px; font-weight:bold; }
.upg-desc { color:rgba(255,255,255,0.5); font-size:11px; margin-top:2px; }
.upg-level { color:#ffd700; font-size:11px; margin-top:2px; }
.buy-btn { background:#4fc3f7; color:#000; border:none; padding:6px 14px;
  font-family:'Courier New',monospace; font-weight:bold; font-size:12px;
  cursor:pointer; white-space:nowrap; margin-left:12px; }
.buy-btn:disabled { background:#333; color:#666; cursor:not-allowed; }
.buy-btn:not(:disabled):hover { background:#fff; }
#close-shop { display:block; width:100%; margin-top:14px;
  background:transparent; border:1px solid rgba(255,255,255,0.2);
  color:#fff; padding:8px; font-family:'Courier New',monospace;
  font-size:12px; cursor:pointer; letter-spacing:2px; }
#close-shop:hover { background:rgba(255,255,255,0.08); }
</style>
</head>
<body>
<div id="ui">
  <div class="stat">🎵 Balls: <span id="ballCount">0</span></div>
  <div class="stat">💰 Coins: <span id="coinCount">0</span></div>
  <div class="stat">🎼 <span id="scaleName">Pentatonic</span></div>
  <div class="stat">🔁 Bounces: <span id="bounceCount">0</span></div>
  <button id="clear-btn">CLEAR</button>
  <button id="shop-btn">⬆ UPGRADES</button>
</div>
<canvas id="canvas"></canvas>
<div id="hint">Tap / click anywhere to add a sound ball</div>

<div id="shop">
  <div id="shop-box">
    <h2>⬆ UPGRADES</h2>
    <div class="coins-disp">💰 <span id="shopCoins">0</span> coins</div>
    <div id="upg-list"></div>
    <button id="close-shop">✕ CLOSE</button>
  </div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

let balls = [], coins = 0, totalBounces = 0, particles = [];
let autoSpawnTimer = 0;

// Upgrade-controlled vars
let ballSizeBonus=0, speedMult=1, trailAlpha=0.2, coinsPerBounce=1;
let currentScaleIdx=0, gravityStrength=0;
let rainbowMode=false, echoMode=false, burstMode=false, autoSpawnCount=0;

const SCALES = {
  Pentatonic: [261.63,293.66,329.63,392.00,440.00],
  Blues:      [261.63,311.13,349.23,369.99,392.00,466.16],
  Minor:      [261.63,293.66,311.13,349.23,392.00,415.30,466.16],
  Major:      [261.63,293.66,329.63,349.23,392.00,440.00,493.88],
  Whole:      [261.63,293.66,329.63,369.99,415.30,466.16],
  Chromatic:  [261.63,277.18,293.66,311.13,329.63,349.23,369.99,392.00,415.30,440.00,466.16,493.88],
};
const SCALE_KEYS = Object.keys(SCALES);

const upgrades = [
  { id:'size',    name:'Mega Balls',    desc:'Bigger ball radius (+5 each)',       baseCost:10,  costMult:1.6,  level:0, maxLevel:8,  effect:v=>{ ballSizeBonus=v*5; } },
  { id:'speed',   name:'Hyperspeed',    desc:'All balls move faster',              baseCost:15,  costMult:1.8,  level:0, maxLevel:6,  effect:v=>{ speedMult=1+v*0.12; } },
  { id:'trail',   name:'Ghost Trails',  desc:'Longer glowing trails',              baseCost:20,  costMult:1.5,  level:0, maxLevel:5,  effect:v=>{ trailAlpha=Math.max(0.04,0.22-v*0.04); } },
  { id:'coins',   name:'Gold Rush',     desc:'Earn more coins per bounce',         baseCost:25,  costMult:2.0,  level:0, maxLevel:10, effect:v=>{ coinsPerBounce=1+v; } },
  { id:'scale',   name:'New Scale',     desc:'Unlock a new musical scale',         baseCost:40,  costMult:2.5,  level:0, maxLevel:SCALE_KEYS.length-1, effect:v=>{ currentScaleIdx=Math.min(v,SCALE_KEYS.length-1); document.getElementById('scaleName').textContent=SCALE_KEYS[currentScaleIdx]; } },
  { id:'gravity', name:'Gravity',       desc:'Gentle downward pull on all balls',  baseCost:35,  costMult:2.0,  level:0, maxLevel:5,  effect:v=>{ gravityStrength=v*0.045; } },
  { id:'rainbow', name:'Rainbow Mode',  desc:'Balls cycle colors as they move',    baseCost:50,  costMult:999,  level:0, maxLevel:1,  effect:v=>{ rainbowMode=v>0; } },
  { id:'echo',    name:'Echo Reverb',   desc:'Sound gets a cool reverb effect',    baseCost:60,  costMult:999,  level:0, maxLevel:1,  effect:v=>{ echoMode=v>0; } },
  { id:'burst',   name:'Bounce Burst',  desc:'Particle burst every bounce',        baseCost:45,  costMult:999,  level:0, maxLevel:1,  effect:v=>{ burstMode=v>0; } },
  { id:'auto',    name:'Auto Spawn',    desc:'Auto-add a ball every 8 seconds',    baseCost:80,  costMult:3.0,  level:0, maxLevel:5,  effect:v=>{ autoSpawnCount=v; } },
];

function upgCost(u){ return Math.floor(u.baseCost*Math.pow(u.costMult,u.level)); }

// Audio
let convolver=null;
function mkConvolver(){
  if(convolver)return convolver;
  const len=audioCtx.sampleRate*1.5;
  const buf=audioCtx.createBuffer(2,len,audioCtx.sampleRate);
  for(let c=0;c<2;c++){const d=buf.getChannelData(c);for(let i=0;i<len;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/len,2);}
  convolver=audioCtx.createConvolver(); convolver.buffer=buf; convolver.connect(audioCtx.destination);
  return convolver;
}
function playTone(freq){
  if(audioCtx.state==='suspended')return;
  const osc=audioCtx.createOscillator(), gain=audioCtx.createGain();
  osc.type='sine'; osc.frequency.setValueAtTime(freq,audioCtx.currentTime);
  gain.gain.setValueAtTime(0.18,audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.0001,audioCtx.currentTime+1.3);
  osc.connect(gain); gain.connect(audioCtx.destination);
  if(echoMode){const eg=audioCtx.createGain();eg.gain.value=0.28;osc.connect(eg);eg.connect(mkConvolver());}
  osc.start(); osc.stop(audioCtx.currentTime+1.3);
}
function pickNote(){ const s=SCALES[SCALE_KEYS[currentScaleIdx]]; return s[Math.floor(Math.random()*s.length)]; }

// Canvas
function resize(){ canvas.width=window.innerWidth; canvas.height=window.innerHeight; }
resize(); window.addEventListener('resize',resize);

// Ball
class Ball {
  constructor(x,y){
    this.x=x; this.y=y;
    const spd=(5+Math.random()*5);
    const ang=Math.random()*Math.PI*2;
    this.vx=Math.cos(ang)*spd; this.vy=Math.sin(ang)*spd;
    this.hue=Math.random()*360; this.trail=[];
  }
  get radius(){ return 15+ballSizeBonus; }
  update(){
    this.vy+=gravityStrength;
    const sm=speedMult;
    this.vx=Math.max(-25,Math.min(25,this.vx*(sm>1?sm*0.999:1)));
    this.vy=Math.max(-25,Math.min(25,this.vy*(sm>1?sm*0.999:1)));
    this.trail.push({x:this.x,y:this.y});
    if(this.trail.length>22)this.trail.shift();
    this.x+=this.vx*sm; this.y+=this.vy*sm;
    if(rainbowMode)this.hue=(this.hue+1.2)%360;
    const r=this.radius; let bounced=false;
    if(this.x-r<0){this.x=r;this.vx=Math.abs(this.vx);bounced=true;}
    if(this.x+r>canvas.width){this.x=canvas.width-r;this.vx=-Math.abs(this.vx);bounced=true;}
    if(this.y-r<0){this.y=r;this.vy=Math.abs(this.vy);bounced=true;}
    if(this.y+r>canvas.height){this.y=canvas.height-r;this.vy=-Math.abs(this.vy);bounced=true;}
    if(bounced){
      playTone(pickNote());
      totalBounces++; coins+=coinsPerBounce;
      if(burstMode)spawnBurst(this.x,this.y,this.hue);
      updateStats();
    }
  }
  draw(){
    const r=this.radius;
    this.trail.forEach((t,i)=>{
      const a=(i/this.trail.length)*0.28;
      ctx.beginPath(); ctx.arc(t.x,t.y,r*(i/this.trail.length),0,Math.PI*2);
      ctx.fillStyle=`hsla(${this.hue},90%,60%,${a})`; ctx.fill();
    });
    ctx.shadowColor=`hsl(${this.hue},90%,60%)`; ctx.shadowBlur=20;
    ctx.beginPath(); ctx.arc(this.x,this.y,r,0,Math.PI*2);
    ctx.fillStyle=`hsl(${this.hue},90%,60%)`; ctx.fill();
    ctx.shadowBlur=0;
    ctx.font=`${Math.max(9,r*0.6)}px serif`; ctx.textAlign='center';
    ctx.fillStyle='rgba(255,255,255,0.7)';
    ctx.fillText('♪',this.x,this.y+r*0.3);
  }
}

function spawnBurst(x,y,hue){
  for(let i=0;i<14;i++){
    const ang=Math.random()*Math.PI*2, spd=2+Math.random()*4;
    particles.push({x,y,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,life:30,maxLife:30,hue:hue+Math.random()*40-20});
  }
}

function updateStats(){
  document.getElementById('ballCount').textContent=balls.length;
  document.getElementById('coinCount').textContent=Math.floor(coins);
  document.getElementById('bounceCount').textContent=totalBounces;
  document.getElementById('shopCoins').textContent=Math.floor(coins);
}

// Shop
function renderShop(){
  const list=document.getElementById('upg-list');
  list.innerHTML='';
  upgrades.forEach((u,idx)=>{
    if(u.level>=u.maxLevel){
      list.innerHTML+=`<div class="upg-item"><div class="upg-info"><div class="upg-name">✅ ${u.name}</div><div class="upg-desc">${u.desc}</div><div class="upg-level">MAXED</div></div></div>`;
      return;
    }
    const cost=upgCost(u), can=coins>=cost;
    list.innerHTML+=`<div class="upg-item"><div class="upg-info"><div class="upg-name">${u.name}</div><div class="upg-desc">${u.desc}</div><div class="upg-level">Lv ${u.level}/${u.maxLevel} · 💰${cost}</div></div><button class="buy-btn" data-idx="${idx}" ${can?'':'disabled'}>BUY</button></div>`;
  });
  list.querySelectorAll('.buy-btn').forEach(btn=>{
    btn.onclick=()=>{
      const u=upgrades[+btn.dataset.idx], cost=upgCost(u);
      if(coins>=cost&&u.level<u.maxLevel){coins-=cost;u.level++;u.effect(u.level);updateStats();renderShop();}
    };
  });
}
document.getElementById('shop-btn').onclick=()=>{
  document.getElementById('shopCoins').textContent=Math.floor(coins);
  renderShop(); document.getElementById('shop').classList.add('open');
};
document.getElementById('close-shop').onclick=()=>document.getElementById('shop').classList.remove('open');
document.getElementById('clear-btn').onclick=()=>{balls=[];updateStats();};

// Input
function addBall(x,y){
  if(audioCtx.state==='suspended')audioCtx.resume();
  balls.push(new Ball(x,y)); updateStats();
}
canvas.addEventListener('mousedown',e=>{if(e.target===canvas)addBall(e.clientX,e.clientY);});
canvas.addEventListener('touchstart',e=>{
  if(audioCtx.state==='suspended')audioCtx.resume();
  e.preventDefault();
  for(const t of e.changedTouches)addBall(t.clientX,t.clientY);
},{passive:false});

// Loop
let lastTime=0;
function animate(ts){
  const dt=Math.min(ts-lastTime,50); lastTime=ts;
  ctx.fillStyle=`rgba(17,17,17,${trailAlpha})`; ctx.fillRect(0,0,canvas.width,canvas.height);
  if(autoSpawnCount>0){ autoSpawnTimer+=dt; if(autoSpawnTimer>=8000){autoSpawnTimer=0;for(let i=0;i<autoSpawnCount;i++)addBall(Math.random()*canvas.width,Math.random()*canvas.height);} }
  balls.forEach(b=>{b.update();b.draw();});
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i]; p.x+=p.vx; p.y+=p.vy; p.vy+=0.15; p.life--;
    ctx.globalAlpha=p.life/p.maxLife; ctx.fillStyle=`hsl(${p.hue},90%,65%)`; ctx.fillRect(p.x-2,p.y-2,4,4);
    if(p.life<=0)particles.splice(i,1);
  }
  ctx.globalAlpha=1;
  requestAnimationFrame(animate);
}
requestAnimationFrame(animate);
updateStats();
</script>
</body>
</html>
