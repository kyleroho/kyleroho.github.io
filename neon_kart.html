<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NEON KART — Pixel Forge Games</title>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;overflow:hidden;font-family:"Courier New",monospace;}
canvas{display:block;border:2px solid #111;}
#hud{display:flex;gap:20px;padding:8px 16px;font-size:13px;align-items:center;flex-wrap:wrap;justify-content:center;color:#eee;}
#hud b{color:#00fff5;}
a{color:#00fff5;font-size:11px;text-decoration:none;}a:hover{color:#fff;}
#overlay{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;pointer-events:none;}
#menu-panel{pointer-events:all;display:flex;flex-direction:column;align-items:center;gap:14px;margin-top:200px;}
.mbtn{font-family:"Courier New",monospace;font-size:14px;padding:12px 28px;cursor:pointer;letter-spacing:2px;}
.mbtn:hover{filter:brightness(1.4);}
#join-row{display:none;gap:8px;align-items:center;flex-wrap:wrap;justify-content:center;}
#code-input{font-family:"Courier New",monospace;font-size:20px;letter-spacing:6px;background:#000;color:#00fff5;border:2px solid #00fff5;padding:8px 14px;width:170px;text-align:center;text-transform:uppercase;}
#status-line{color:#ffe600;font-family:"Courier New",monospace;font-size:13px;letter-spacing:2px;min-height:20px;text-align:center;}
#code-box{display:none;background:rgba(0,0,0,.9);border:2px solid #00fff5;padding:16px 32px;text-align:center;flex-direction:column;align-items:center;gap:8px;}
#code-display{color:#00fff5;font-size:32px;font-family:"Courier New",monospace;letter-spacing:10px;text-shadow:0 0 20px #00fff5;}
#players-list{color:#aaa;font-size:12px;}
</style>
</head>
<body>
<div id="hud">
  <span>LAP <b id="h-lap">0/3</b></span>
  <span>TIME <b id="h-time">0.00</b>s</span>
  <span>BEST <b id="h-best">--</b></span>
  <span>SPEED <b id="h-spd">0</b></span>
  <span>POS <b id="h-pos">1/4</b></span>
  <a href="index.html">Back</a>
</div>
<canvas id="c"></canvas>
<div id="overlay">
  <div id="menu-panel">
    <div style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center;">
      <button class="mbtn" id="host-btn" onclick="hostOnline()" style="background:#003333;border:2px solid #00fff5;color:#00fff5;">HOST RACE</button>
      <button class="mbtn" onclick="toggleJoin()" style="background:#330033;border:2px solid #ff3fa4;color:#ff3fa4;">JOIN RACE</button>
      <button class="mbtn" onclick="startSolo()" style="background:#111;border:2px solid #555;color:#aaa;">VS BOTS</button>
    </div>
    <div id="join-row">
      <input id="code-input" maxlength="6" placeholder="XXXXXX" onkeydown="if(event.key==='Enter')joinOnline()">
      <button class="mbtn" onclick="joinOnline()" style="background:#003333;border:2px solid #00fff5;color:#00fff5;padding:10px 18px;">JOIN</button>
    </div>
    <div id="status-line"></div>
    <div id="code-box">
      <div style="color:#888;font-size:11px;letter-spacing:2px;">YOUR HOST CODE</div>
      <div id="code-display"></div>
      <div id="players-list"></div>
      <button class="mbtn" onclick="startOnlineRace()" style="background:#00fff5;color:#000;border:none;padding:8px 24px;">START RACE</button>
    </div>
  </div>
</div>
<script>
const C=document.getElementById('c'),ctx=C.getContext('2d');
const W=800,H=500;C.width=W;C.height=H;
const LAPS=3,NEON=['#00fff5','#ff3fa4','#ffe600','#7fff00'],NAMES=['YOU','BLAZE','SPARK','VOLT'];

function makeTrack(){
  const pts=[],n=60;
  for(let i=0;i<n;i++){
    const t=i/n*Math.PI*2;
    const r=155+Math.cos(t*2)*60+Math.cos(t*5)*20+Math.sin(t*3)*28;
    pts.push({x:W/2+Math.cos(t)*r*1.5,y:H/2+Math.sin(t)*r*0.68});
  }
  return pts;
}
const TRACK=makeTrack(),TW=52;

function distSeg(px,py,ax,ay,bx,by){
  const dx=bx-ax,dy=by-ay,l2=dx*dx+dy*dy;
  if(!l2)return Math.hypot(px-ax,py-ay);
  const t=Math.max(0,Math.min(1,((px-ax)*dx+(py-ay)*dy)/l2));
  return Math.hypot(px-(ax+t*dx),py-(ay+t*dy));
}
function onTrack(x,y){
  let m=Infinity;
  for(let i=0;i<TRACK.length;i++){const a=TRACK[i],b=TRACK[(i+1)%TRACK.length];m=Math.min(m,distSeg(x,y,a.x,a.y,b.x,b.y));}
  return m<=TW;
}
function nearWP(x,y){
  let b=0,bd=Infinity;
  TRACK.forEach((p,i)=>{const d=Math.hypot(p.x-x,p.y-y);if(d<bd){bd=d;b=i;}});
  return b;
}

function makeCar(wi,col,isP,nm){
  const p=TRACK[wi%TRACK.length],n2=TRACK[(wi+1)%TRACK.length];
  return{x:p.x,y:p.y,angle:Math.atan2(n2.y-p.y,n2.x-p.x),speed:0,vx:0,vy:0,
    col,isP,wt:(wi+1)%TRACK.length,lap:0,done:false,offT:0,spin:0,rank:1,
    name:nm||(isP?'YOU':NAMES[wi%4]),lapStart:0,nf:0};
}

let cars=[],P=null,particles=[],state='menu',tick=0,raceT=0,bestLap=null,cdTick=0,keys={};

function initCars(n){
  cars=[];
  [0,15,30,45].slice(0,n).forEach((s,i)=>cars.push(makeCar(s,NEON[i],i===0)));
  P=cars[0];
}

function updBot(c){
  if(c.done||c.spin>0){c.spin=Math.max(0,c.spin-1);return;}
  const t=TRACK[c.wt],dx=t.x-c.x,dy=t.y-c.y;
  let da=Math.atan2(dy,dx)-c.angle;
  while(da>Math.PI)da-=Math.PI*2;while(da<-Math.PI)da+=Math.PI*2;
  c.angle+=Math.sign(da)*Math.min(Math.abs(da),0.075);
  if(c.speed<3.5)c.speed+=0.08;else c.speed*=0.98;
  if(Math.hypot(dx,dy)<24){
    c.wt=(c.wt+1)%TRACK.length;
    if(c.wt===0){c.lap++;if(c.lap>=LAPS)c.done=true;}
  }
}

function updPlayer(){
  if(!P||P.done)return;
  if(P.spin>0){P.spin--;P.angle+=0.13;return;}
  const max=6,tr=0.05;
  if(keys['ArrowUp']||keys['KeyW'])P.speed=Math.min(max,P.speed+0.15);
  else if(keys['ArrowDown']||keys['KeyS'])P.speed=Math.max(-2,P.speed-0.25);
  else P.speed*=0.97;
  const sf=0.25+Math.abs(P.speed)/max*0.75;
  if(keys['ArrowLeft']||keys['KeyA'])P.angle-=tr*sf;
  if(keys['ArrowRight']||keys['KeyD'])P.angle+=tr*sf;
  if((keys['ShiftLeft']||keys['ShiftRight'])&&P.speed>1){P.speed=Math.min(10,P.speed+0.5);P.nf=8;exhaust(P);exhaust(P);}
}

function updCar(c){
  c.x+=Math.cos(c.angle)*c.speed;c.y+=Math.sin(c.angle)*c.speed;
  if(!onTrack(c.x,c.y)){
    c.speed*=0.90;c.offT++;
    const nw=TRACK[nearWP(c.x,c.y)];c.x+=(nw.x-c.x)*0.05;c.y+=(nw.y-c.y)*0.05;
  }else c.offT=0;
  if(c.isP){
    const t=TRACK[c.wt];
    if(Math.hypot(t.x-c.x,t.y-c.y)<28){
      c.wt=(c.wt+1)%TRACK.length;
      if(c.wt===0){
        const lt=raceT-c.lapStart;
        if(bestLap===null||lt<bestLap)bestLap=lt;
        c.lapStart=raceT;c.lap++;
        if(c.lap>=LAPS){c.done=true;state='finish';}
      }
    }
  }
  if(c.nf>0)c.nf--;
}

function collide(){
  for(let i=0;i<cars.length;i++)for(let j=i+1;j<cars.length;j++){
    const a=cars[i],b=cars[j],d=Math.hypot(a.x-b.x,a.y-b.y);
    if(d<26&&d>0){
      const nx=(b.x-a.x)/d,ny=(b.y-a.y)/d,ov=(26-d)/2;
      a.x-=nx*ov;a.y-=ny*ov;b.x+=nx*ov;b.y+=ny*ov;
      const rs=Math.abs(a.speed-b.speed);
      if(rs>1.8){a.spin=rs*4|0;b.spin=rs*4|0;spark(a.x,a.y);}
      a.speed*=0.7;b.speed*=0.7;
    }
  }
}

function ranks(){
  cars.map((c,i)=>({i,p:c.lap*TRACK.length+c.wt+(c.done?99999:0)}))
    .sort((a,b)=>b.p-a.p).forEach((p,r)=>cars[p.i].rank=r+1);
}

function exhaust(c){
  const col=c.nf>0?'#ff7700':c.col;
  particles.push({x:c.x-Math.cos(c.angle)*14,y:c.y-Math.sin(c.angle)*14,
    vx:(Math.random()-.5)*.8,vy:(Math.random()-.5)*.8,col,life:22,sz:c.nf>0?5:3});
}
function spark(x,y){
  for(let i=0;i<12;i++)particles.push({x,y,vx:(Math.random()-.5)*6,vy:(Math.random()-.5)*6,col:'#fff',life:28,sz:2});
}

const grass=[];for(let i=0;i<300;i++)grass.push([Math.random()*W,Math.random()*H]);

function drawTrack(){
  ctx.fillStyle='#050a06';ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#0b120c';grass.forEach(([x,y])=>ctx.fillRect(x,y,2,2));
  [[TW*2+12,'#0d0d1a'],[TW*2+4,'#14142a'],[TW*2,'#1a1a35'],[TW*2-6,'#1e1e3d']].forEach(([lw,col])=>{
    ctx.strokeStyle=col;ctx.lineWidth=lw;
    ctx.beginPath();TRACK.forEach((p,i)=>i?ctx.lineTo(p.x,p.y):ctx.moveTo(p.x,p.y));
    ctx.closePath();ctx.stroke();
  });
  for(let s=0;s<2;s++){ctx.lineWidth=5;
    for(let i=0;i<TRACK.length;i++){
      const p=TRACK[i],q=TRACK[(i+1)%TRACK.length];
      const nx=-(q.y-p.y),ny=q.x-p.x,nl=Math.hypot(nx,ny)||1,d=(TW-4)*(s?1:-1);
      ctx.strokeStyle=i%2===0?'#aa0000':'#ffffff';
      ctx.beginPath();ctx.moveTo(p.x+nx/nl*d,p.y+ny/nl*d);ctx.lineTo(q.x+nx/nl*d,q.y+ny/nl*d);ctx.stroke();
    }
  }
  [['rgba(0,255,245,0.2)',1],['rgba(255,0,180,0.14)',-1]].forEach(([col,side])=>{
    ctx.strokeStyle=col;ctx.lineWidth=2;ctx.beginPath();
    TRACK.forEach((p,i)=>{
      const a=TRACK[(i+1)%TRACK.length],nx=-(a.y-p.y),ny=a.x-p.x,nl=Math.hypot(nx,ny)||1;
      i?ctx.lineTo(p.x+nx/nl*(TW-2)*side,p.y+ny/nl*(TW-2)*side):ctx.moveTo(p.x+nx/nl*(TW-2)*side,p.y+ny/nl*(TW-2)*side);
    });ctx.closePath();ctx.stroke();
  });
  ctx.strokeStyle='rgba(255,255,255,0.05)';ctx.lineWidth=1;ctx.setLineDash([12,20]);
  ctx.beginPath();TRACK.forEach((p,i)=>i?ctx.lineTo(p.x,p.y):ctx.moveTo(p.x,p.y));
  ctx.closePath();ctx.stroke();ctx.setLineDash([]);
  const sp=TRACK[0],nxt=TRACK[1],nx2=-(nxt.y-sp.y),ny2=nxt.x-sp.x,nl2=Math.hypot(nx2,ny2)||1;
  for(let ci=0;ci<10;ci++){ctx.fillStyle=ci%2?'#fff':'#222';const f=-1+ci*0.22;ctx.fillRect(sp.x+nx2/nl2*(TW-2)*f-3,sp.y+ny2/nl2*(TW-2)*f-8,6,16);}
}

function drawCar(c){
  ctx.save();ctx.translate(c.x,c.y);ctx.rotate(c.angle+Math.PI/2);
  ctx.fillStyle='rgba(0,0,0,.4)';ctx.beginPath();ctx.ellipse(3,4,9,5,0,0,Math.PI*2);ctx.fill();
  ctx.shadowColor=c.nf>0?'#ff8800':c.col;ctx.shadowBlur=c.isP?22:12;
  ctx.fillStyle=c.col;ctx.beginPath();ctx.roundRect(-8,-12,16,24,3);ctx.fill();
  ctx.shadowBlur=0;
  ctx.fillStyle='rgba(0,0,0,.6)';ctx.fillRect(-5,-8,10,9);
  ctx.fillStyle='#0a0a0a';[[-10,-8],[6,-8],[-10,6],[6,6]].forEach(([wx,wy])=>ctx.fillRect(wx,wy,5,8));
  if(c.isP){ctx.fillStyle='#fff';ctx.font='bold 7px monospace';ctx.textAlign='center';ctx.fillText('YOU',0,21);}
  ctx.restore();
  ctx.fillStyle=c.col;ctx.font='8px monospace';ctx.textAlign='center';ctx.fillText(c.name,c.x,c.y-20);
}

function drawMinimap(){
  ctx.fillStyle='rgba(0,0,0,.8)';ctx.fillRect(W-90,H-68,82,60);
  ctx.strokeStyle='#333';ctx.strokeRect(W-90,H-68,82,60);
  const sx=74/W,sy=52/H,ox=W-86,oy=H-64;
  ctx.strokeStyle='#2a2a4a';ctx.lineWidth=4;
  ctx.beginPath();TRACK.forEach((p,i)=>i?ctx.lineTo(ox+p.x*sx,oy+p.y*sy):ctx.moveTo(ox+p.x*sx,oy+p.y*sy));
  ctx.closePath();ctx.stroke();
  cars.forEach(c=>{ctx.fillStyle=c.col;ctx.beginPath();ctx.arc(ox+c.x*sx,oy+c.y*sy,c.isP?3.5:2,0,Math.PI*2);ctx.fill();});
}

function drawHUD(){
  if(!P)return;
  const spd=Math.abs(P.speed);
  ctx.fillStyle='rgba(0,0,0,.65)';ctx.fillRect(8,8,140,50);
  ctx.fillStyle=P.nf>0?'rgba(255,102,0,.35)':'rgba(0,255,245,.12)';ctx.fillRect(8,8,140*(spd/10),50);
  ctx.strokeStyle='rgba(0,255,245,.3)';ctx.strokeRect(8,8,140,50);
  ctx.fillStyle=P.nf>0?'#ff8800':'#00fff5';ctx.font='bold 13px monospace';ctx.textAlign='left';
  ctx.fillText(`${(spd*42)|0} km/h`,16,28);
  ctx.fillStyle='#aaa';ctx.font='11px monospace';
  ctx.fillText(`P${P.rank}/${cars.length}  LAP ${Math.min(P.lap+1,LAPS)}/${LAPS}`,16,46);
  if(P.offT>30){
    ctx.fillStyle=`rgba(255,40,0,${0.2+Math.sin(tick*.25)*.1})`;ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#ff4444';ctx.font='bold 22px monospace';ctx.textAlign='center';ctx.fillText('OFF TRACK',W/2,H/2);
  }
}

function drawMenu(){
  ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='rgba(0,255,245,0.05)';ctx.lineWidth=1;
  for(let x=0;x<W;x+=40){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<H;y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  ctx.shadowColor='#00fff5';ctx.shadowBlur=50;ctx.fillStyle='#00fff5';ctx.font='bold 72px monospace';ctx.textAlign='center';ctx.fillText('NEON KART',W/2,140);
  ctx.shadowColor='#ff3fa4';ctx.shadowBlur=20;ctx.fillStyle='#ff3fa4';ctx.font='16px monospace';ctx.fillText('PIXEL FORGE RACING',W/2,175);ctx.shadowBlur=0;
  ctx.fillStyle='rgba(255,255,255,.05)';ctx.fillRect(W/2-175,205,350,36);
  ctx.fillStyle='#444';ctx.font='12px monospace';ctx.fillText('ARROWS/WASD = Steer   SHIFT = Nitro Boost',W/2,228);
}

function drawFinish(){
  drawTrack();
  particles.forEach(p=>{ctx.globalAlpha=p.life/30;ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(p.x,p.y,p.sz,0,Math.PI*2);ctx.fill();p.x+=p.vx;p.y+=p.vy;p.life-=2;});ctx.globalAlpha=1;
  cars.forEach(drawCar);
  ctx.fillStyle='rgba(0,0,0,.78)';ctx.fillRect(0,0,W,H);
  ctx.shadowColor='#ffe600';ctx.shadowBlur=40;ctx.fillStyle='#ffe600';ctx.font='bold 58px monospace';ctx.textAlign='center';ctx.fillText('FINISH!',W/2,H/2-70);ctx.shadowBlur=0;
  const med=['1st','2nd','3rd','4th'];
  ctx.fillStyle='#fff';ctx.font='26px monospace';ctx.fillText(`${med[P.rank-1]}  —  Position ${P.rank}/${cars.length}`,W/2,H/2);
  if(bestLap){ctx.fillStyle='#00fff5';ctx.font='15px monospace';ctx.fillText(`Best Lap: ${(bestLap/60).toFixed(2)}s`,W/2,H/2+44);}
  [...cars].sort((a,b)=>a.rank-b.rank).forEach((c,i)=>{ctx.fillStyle=c.col;ctx.font='13px monospace';ctx.fillText(`${i+1}. ${c.name}`,W/2,H/2+90+i*22);});
  ctx.fillStyle='#555';ctx.font='12px monospace';ctx.fillText('ENTER to play again',W/2,H/2+195);
}

function updHUD(){
  if(!P)return;
  document.getElementById('h-lap').textContent=`${Math.min(P.lap,LAPS)}/${LAPS}`;
  document.getElementById('h-time').textContent=(raceT/60).toFixed(2);
  document.getElementById('h-best').textContent=bestLap?`${(bestLap/60).toFixed(2)}s`:'--';
  document.getElementById('h-spd').textContent=(Math.abs(P.speed)*42)|0;
  document.getElementById('h-pos').textContent=`${P.rank}/${cars.length}`;
}

function loop(){
  tick++;
  if(state==='menu'){drawMenu();}
  else if(state==='countdown'){
    cdTick++;drawTrack();cars.forEach(drawCar);
    ctx.fillStyle='rgba(0,0,0,.55)';ctx.fillRect(0,0,W,H);
    const n=3-Math.floor(cdTick/60);
    ctx.shadowColor=n>0?'#ffe600':'#00ff88';ctx.shadowBlur=60;
    ctx.fillStyle=n>0?'#ffe600':'#00ff88';ctx.font='bold 130px monospace';ctx.textAlign='center';
    ctx.fillText(n>0?n:'GO!',W/2,H/2+50);ctx.shadowBlur=0;
    if(cdTick>=240){state='racing';raceT=0;}
  }
  else if(state==='racing'){
    raceT++;updPlayer();cars.forEach(c=>{if(!c.isP)updBot(c);});cars.forEach(updCar);collide();ranks();
    if(tick%3===0)cars.forEach(c=>{if(Math.abs(c.speed)>0.3)exhaust(c);});
    drawTrack();
    particles=particles.filter(p=>p.life>0);
    particles.forEach(p=>{ctx.globalAlpha=p.life/28;ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(p.x,p.y,p.sz,0,Math.PI*2);ctx.fill();p.x+=p.vx;p.y+=p.vy;p.life-=2;});ctx.globalAlpha=1;
    cars.forEach(drawCar);drawMinimap();drawHUD();updHUD();
  }
  else if(state==='finish'){
    drawFinish();
    if(tick%5===0)spark(Math.random()*W,Math.random()*(H/2));
  }
  requestAnimationFrame(loop);
}

document.addEventListener('keydown',e=>{
  keys[e.code]=true;
  if(['ArrowUp','ArrowDown','Space'].includes(e.code))e.preventDefault();
  if(e.code==='Enter'&&state==='finish'){state='menu';cdTick=0;document.getElementById('overlay').style.display='flex';}
});
document.addEventListener('keyup',e=>keys[e.code]=false);
loop();

// ── MENU ──
function setStatus(t){document.getElementById('status-line').textContent=t;}

function startSolo(){
  document.getElementById('overlay').style.display='none';
  initCars(4);particles=[];bestLap=null;raceT=0;cdTick=0;state='countdown';tick=0;
}

function toggleJoin(){
  const r=document.getElementById('join-row');
  r.style.display=r.style.display==='none'?'flex':'none';
  if(r.style.display==='flex')document.getElementById('code-input').focus();
}

// ── ONLINE ──
let peer=null,hostConns=[],clientConn=null,myIdx=0,onlinePlayers=[];

function hostOnline(){
  document.getElementById('host-btn').textContent='Creating...';
  peer=new Peer();
  peer.on('open',id=>{
    const code=id.slice(0,6).toUpperCase();
    document.getElementById('code-display').textContent=code;
    document.getElementById('code-box').style.display='flex';
    onlinePlayers=[{name:'HOST',col:NEON[0],slot:0}];
    updatePList();
    peer.on('connection',conn=>{
      const idx=hostConns.length+1;
      hostConns.push(conn);
      conn.on('open',()=>{
        conn.send({type:'assign',idx,col:NEON[idx%4],slot:idx*15});
        onlinePlayers.push({name:'P'+(idx+1),col:NEON[idx%4],slot:idx*15});
        updatePList();broadcast({type:'players',list:onlinePlayers});
      });
      conn.on('data',msg=>{
        if(msg.type==='input'&&cars[idx])applyInput(cars[idx],msg);
        try{conn.send({type:'state',cars:cars.map(c=>({x:c.x,y:c.y,angle:c.angle,lap:c.lap,rank:c.rank,done:c.done}))});}catch(e){}
      });
    });
    setStatus('Waiting for players...');
  });
  peer.on('error',e=>setStatus('Error: '+e.message));
}

function updatePList(){
  document.getElementById('players-list').textContent=onlinePlayers.map((p,i)=>(i===0?'[HOST] ':'[JOIN] ')+p.name).join('  ');
}

function startOnlineRace(){
  broadcast({type:'start',players:onlinePlayers});
  document.getElementById('overlay').style.display='none';
  cars=onlinePlayers.map((p,i)=>makeCar(p.slot,p.col,i===myIdx,i===0?'HOST':'P'+(i+1)));
  P=cars[0];particles=[];bestLap=null;raceT=0;cdTick=0;state='countdown';tick=0;
}

function broadcast(msg){hostConns.forEach(c=>{try{c.send(msg);}catch(e){}});}

function joinOnline(){
  const code=document.getElementById('code-input').value.trim().toUpperCase();
  if(code.length<6){setStatus('Need full 6-letter code!');return;}
  setStatus('Connecting...');
  peer=new Peer();
  peer.on('open',()=>{
    clientConn=peer.connect(code);
    clientConn.on('open',()=>setStatus('Connected! Waiting for host...'));
    clientConn.on('data',msg=>{
      if(msg.type==='assign'){myIdx=msg.idx;}
      if(msg.type==='players'){setStatus('Lobby: '+msg.list.length+' player(s). Waiting for host...');}
      if(msg.type==='start'){
        onlinePlayers=msg.players;
        document.getElementById('overlay').style.display='none';
        cars=onlinePlayers.map((p,i)=>makeCar(p.slot,p.col,i===myIdx,i===0?'HOST':'P'+(i+1)));
        P=cars[myIdx];particles=[];bestLap=null;raceT=0;cdTick=0;state='countdown';tick=0;
      }
      if(msg.type==='state'){
        msg.cars.forEach((sc,i)=>{
          if(i===myIdx||!cars[i])return;
          cars[i].x=sc.x;cars[i].y=sc.y;cars[i].angle=sc.angle;cars[i].lap=sc.lap;cars[i].rank=sc.rank;cars[i].done=sc.done;
        });
      }
    });
    clientConn.on('error',()=>setStatus('Could not connect. Check code.'));
    setInterval(()=>{
      if(clientConn&&clientConn.open&&P&&state==='racing'){
        try{clientConn.send({type:'input',
          up:!!(keys['ArrowUp']||keys['KeyW']),down:!!(keys['ArrowDown']||keys['KeyS']),
          left:!!(keys['ArrowLeft']||keys['KeyA']),right:!!(keys['ArrowRight']||keys['KeyD']),
          boost:!!(keys['ShiftLeft']||keys['ShiftRight'])});}catch(e){}
      }
    },33);
  });
  peer.on('error',()=>setStatus('Could not connect. Check code.'));
  setTimeout(()=>{if(!clientConn||!clientConn.open)setStatus('Timed out. Double-check the code.');},9000);
}

function applyInput(c,msg){
  if(c.done)return;
  const max=6,tr=0.05;
  if(msg.up)c.speed=Math.min(max,c.speed+0.15);else if(msg.down)c.speed=Math.max(-2,c.speed-0.25);else c.speed*=0.97;
  const sf=0.25+Math.abs(c.speed)/max*0.75;
  if(msg.left)c.angle-=tr*sf;if(msg.right)c.angle+=tr*sf;
  if(msg.boost&&c.speed>1){c.speed=Math.min(10,c.speed+0.5);c.nf=8;}
}
</script>
